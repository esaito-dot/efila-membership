<!DOCTYPE html>
<!-- POLICY_DOCS_MODIFIED_TIME: 2026-05-20T01:27:37.944Z -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンバーシップマニュアル | エフィラグループ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #1a5276;
  --primary-light: #2471a3;
  --primary-dark: #0e2f44;
  --accent: #e67e22;
  --accent-light: #f39c12;
  --bg: #ffffff;
  --bg-sidebar: #ffffff;
  --bg-content: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --text-inverse: #ffffff;
  --border: #e0e4e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 8px;
  --sidebar-w: 340px;
  --header-h: 64px;
  --transition: 0.2s ease;
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  overflow: hidden;
  height: 100vh;
}

/* ========== Header ========== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background var(--transition);
}
.menu-toggle:hover { background: #f0f0f0; }

/* Mobile-only sidebar FAB — hidden on PC by default */
.mobile-sidebar-fab { display: none; }

/* Title logo image */
.header-logo-img {
  height: 60px;
  width: auto;
  max-width: 240px;
  display: block;
  object-fit: contain;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.updated-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-light);
  background: var(--bg);
  padding: 4px 12px;
  border-radius: 20px;
}

.updated-badge::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: #2ecc71;
  border-radius: 50%;
}

.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.8rem;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: all var(--transition);
}
.doc-link:hover {
  background: var(--bg);
  border-color: var(--primary-light);
  color: var(--primary);
}
.doc-link svg { width: 14px; height: 14px; }

/* ========== Layout ========== */
.layout {
  display: flex;
  margin-top: var(--header-h);
  height: calc(100vh - var(--header-h));
}

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.search-box {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}

.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 12px;
  color: var(--text-light);
  pointer-events: none;
}
.search-icon svg { width: 16px; height: 16px; display: block; }

.search-input {
  width: 100%;
  padding: 10px 40px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--bg);
  transition: all var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(36,113,163,0.15);
}
.search-input::placeholder { color: #bdc3c7; }

.search-shortcut {
  position: absolute;
  right: 10px;
  font-size: 0.65rem;
  color: var(--text-light);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}

.search-results-count {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 8px;
  display: none;
}

.nav-list {
  flex: 1;
  min-height: 0;        /* ← flex子要素がコンテンツサイズ以下に縮められるよう */
  overflow-y: auto;
  padding: 8px 0;
}

.nav-list::-webkit-scrollbar { width: 5px; }
.nav-list::-webkit-scrollbar-track { background: transparent; }
.nav-list::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 3px; }
.nav-list::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

.nav-section {
  border-bottom: 1px solid var(--border);
}

.nav-section:last-child { border-bottom: none; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  user-select: none;
  position: relative;
}

.nav-item:hover {
  background: #eef2f7;
}

.nav-item.active {
  background: linear-gradient(90deg, rgba(26,82,118,0.08) 0%, transparent 100%);
  color: var(--primary);
  font-weight: 600;
}

.nav-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.nav-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  font-size: 0.7rem;
  font-weight: 700;
  background: var(--bg);
  color: var(--text-light);
  border-radius: 6px;
  flex-shrink: 0;
}

.nav-item.active .nav-num {
  background: var(--primary);
  color: var(--text-inverse);
}

.nav-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-item .expand-icon {
  font-size: 0.7rem;
  color: var(--text-light);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.nav-item.expanded .expand-icon { transform: rotate(90deg); }

.sub-nav {
  display: none;
  padding: 0 0 8px 0;
  background: #fafbfc;
}

.sub-nav.open { display: block; }

.sub-nav-item {
  padding: 8px 20px 8px 56px;
  font-size: 0.82rem;
  color: var(--text-light);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.sub-nav-item::before {
  content: "";
  position: absolute;
  left: 44px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 4px;
  background: #d0d4d8;
  border-radius: 50%;
}

.sub-nav-item:hover {
  color: var(--primary);
  background: #eef2f7;
}

.sub-nav-item:hover::before {
  background: var(--primary);
}

.sub-nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.sub-nav-item.active::before {
  background: var(--accent);
}

.nav-section.search-hidden { display: none; }

/* ========== Main Content ========== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 4px; }
.main::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

/* Welcome state */
.welcome {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-light);
}

.welcome-icon {
  width: 80px;
  height: 80px;
  margin-bottom: 24px;
  opacity: 0.25;
}

.welcome h2 {
  font-size: 1.5rem;
  color: var(--text);
  margin-bottom: 8px;
  font-weight: 600;
}

.welcome p {
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.welcome .shortcut-hint {
  margin-top: 16px;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.welcome .shortcut-hint kbd {
  background: #eee;
  border: 1px solid #ddd;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.75rem;
}

/* Content card */
.content-card {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

/* All-sections continuous view */
.all-sections-container {
  max-width: 900px;
  margin: 0 auto;
}
.section-block {
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 32px;
}
.section-block .content-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
}
.section-block .content-body {
  padding: 32px 40px 40px;
  font-size: 0.95rem;
  line-height: 2;
}

.content-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
}

.content-section-num {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.content-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary-dark);
  line-height: 1.4;
}

.content-sub-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.content-sub-nav:empty { margin-top: 0; }

.content-sub-nav-item {
  font-size: 0.8rem;
  color: var(--primary-light);
  background: rgba(36,113,163,0.06);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.content-sub-nav-item:hover {
  background: rgba(36,113,163,0.12);
  border-color: rgba(36,113,163,0.2);
}

.content-body {
  padding: 32px 40px 40px;
  font-size: 0.95rem;
  line-height: 2;
}

.content-body .policy-line {
  margin-bottom: 4px;
}

.content-body .policy-doc-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  position: relative;
}

.content-body .policy-doc-bullet::before {
  content: '●';
  font-size: 0.45em;
  vertical-align: middle;
  margin-right: 0.3em;
  margin-left: -1em;
  display: inline-block;
  width: 1em;
  color: var(--text);
}

.content-body .policy-key-title {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 16px 0 20px;
  letter-spacing: 0.05em;
}

.content-body .policy-heading-1 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}

.content-body .policy-heading-1:first-child { margin-top: 0; }

.content-body .policy-heading-2 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--primary);
  margin: 24px 0 8px;
}

.content-body .policy-heading-3 {
  font-weight: 600;
  color: var(--text);
  margin: 16px 0 4px;
}

.content-body .policy-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  color: var(--text);
}

.content-body .policy-indent-1 { padding-left: 1.5em; }
.content-body .policy-indent-2 { padding-left: 3em; }

.content-body .policy-empty { height: 0.8em; }

.content-body .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.content-body .search-highlight.search-highlight-focus {
  background: #f39c12;
  color: #fff;
  outline: 2px solid #e67e22;
  outline-offset: 1px;
  animation: highlight-pulse 1.5s ease-in-out;
}

@keyframes highlight-pulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.08); }
  60% { transform: scale(1); }
  100% { transform: scale(1); }
}

.content-body .placeholder-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-light);
  text-align: center;
  gap: 12px;
}

.content-body .placeholder-msg .placeholder-icon {
  font-size: 2.5rem;
  opacity: 0.3;
}

/* Search results panel */
.search-results-panel {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

.search-results-header {
  padding: 24px 40px;
  border-bottom: 1px solid var(--border);
}

.search-results-header h2 {
  font-size: 1.2rem;
  color: var(--primary-dark);
}

.search-results-header p {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}

.search-result-item {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.search-result-item:hover { background: #fafbfc; }
.search-result-item:last-child { border-bottom: none; }

.search-result-section {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}

.search-result-snippet {
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.7;
}

.search-result-snippet .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.search-no-results {
  padding: 60px 40px;
  text-align: center;
  color: var(--text-light);
}

.search-no-results p:first-child {
  font-size: 2rem;
  opacity: 0.3;
  margin-bottom: 12px;
}

/* ========== Overlay (mobile) ========== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 899;
}

/* (mobile-back-btn removed) */

/* ========== Responsive ========== */
@media (max-width: 900px) {
  /* デスクトップ専用要素を非表示 */
  .menu-toggle         { display: none !important; }
  .sidebar-overlay     { display: none !important; }
  .shortcut-hint       { display: none !important; }
  #searchShortcut      { display: none !important; }
  .updated-badge       { display: none; }
  .header-right .doc-link span.doc-link-text { display: none; }
  .header-logo-img     { height: 50px; max-width: 180px; }

  /* 検索結果パネルはモバイル非表示（ナビリストでフィルタリング） */
  .search-results-panel { display: none !important; }

  /* ２パネル横スライドレイアウト */
  .layout {
    overflow: hidden;
    position: relative;
  }

  /* パネル①：サイドバー = 全幅ホーム画面 */
  .sidebar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    min-width: unset;
    transform: translateX(0);
    transition: transform 0.3s ease;
    box-shadow: none;
    z-index: 1;
  }

  /* パネル②：メインコンテンツ = 右に隠れている */
  .main {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 0 !important;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  /* コンテンツ表示時：パネルをスライド */
  body.mobile-content-open .sidebar { transform: translateX(-100%); }
  body.mobile-content-open .main    { transform: translateX(0); }

  /* サイドバーオーバーレイ表示時（FABタップ後） */
  body.mobile-sidebar-overlay .sidebar {
    transform: translateX(0) !important;
    width: 85%;
    max-width: 320px;
    z-index: 300;
    box-shadow: 4px 0 32px rgba(0,0,0,0.35);
  }
  body.mobile-sidebar-overlay .sidebar-overlay {
    display: block !important;
    z-index: 299;
  }

  /* ヘッダー右上メニューボタン（コンテンツ表示中のみ） */
  .mobile-sidebar-fab {
    display: none;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    padding: 0;
    background: var(--primary);
    color: var(--text-inverse);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .mobile-sidebar-fab svg { width: 20px; height: 20px; flex-shrink: 0; }
  .mobile-sidebar-fab:active { background: var(--primary-light); }
  body.mobile-content-open .mobile-sidebar-fab { display: flex; }
  body.mobile-sidebar-overlay .mobile-sidebar-fab { display: none; }

  /* ナビリスト下部に余白を追加（末尾の項目をタッチしやすくする） */
  .nav-list { padding-bottom: 80px; }

  /* ロゴをクリック可能に */
  .header-logo-link { cursor: pointer; display: flex; align-items: center; }

  /* (mobile-back-btn removed) */

  /* コンテンツカードを全画面に（.visibleクラス付与時のみ表示） */
  .content-card {
    border-radius: 0;
    box-shadow: none;
    flex: 1;
    display: none;
    flex-direction: column;
  }
  .content-card.visible {
    display: flex;
  }
  .content-body { flex: 1; }
  .content-header { padding: 20px 16px 12px; }
  .content-body   { padding: 16px; font-size: 0.9rem; }
  .search-result-item { padding: 14px 16px; }

  /* 全セクションコンテナもモバイル対応 */
  .section-block {
    border-radius: 0;
    box-shadow: none;
    margin-bottom: 8px;
    border-bottom: 4px solid var(--border);
  }
  .section-block .content-header { padding: 20px 16px 12px; }
  .section-block .content-body   { padding: 16px; font-size: 0.9rem; }
  .all-sections-container { padding: 0; }
}

@media (max-width: 600px) {
  :root { --header-h: 60px; }
  .content-title { font-size: 1.2rem; }
  .header-logo-img { height: 44px; max-width: 160px; }
  .header { padding: 0 10px; }
  .header-right .doc-link { padding: 4px 10px; font-size: 0.75rem; }
  .nav-item { padding: 10px 16px; font-size: 0.9rem; }
}

/* ========== Scroll to top button ========== */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
  transition: all var(--transition);
  z-index: 100;
  font-size: 1.2rem;
}
.scroll-top:hover { background: var(--primary-light); transform: translateY(-2px); }
.scroll-top.visible { display: flex; }

/* ========== Print ========== */
@media print {
  .header, .sidebar, .scroll-top, .sidebar-overlay { display: none !important; }
  .layout { display: block; }
  .main { padding: 0; overflow: visible; height: auto; }
  body { overflow: visible; height: auto; }
  .content-card { box-shadow: none; border: 1px solid #ddd; }
}

/* ========== Animations ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.content-card.visible,
.search-results-panel.visible {
  display: block;
  animation: fadeIn 0.3s ease;
}

/* ========== Glossary Tooltip ========== */
.glossary-term {
  border-bottom: 1.5px dotted var(--accent);
  color: inherit;
  cursor: help;
  position: relative;
  transition: background var(--transition);
}
.glossary-term:hover {
  background: rgba(230, 126, 34, 0.08);
}

.glossary-popup-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1999;
}

.glossary-popup {
  position: fixed;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 0;
  max-width: 380px;
  min-width: 260px;
  z-index: 2000;
  animation: glossaryFadeIn 0.15s ease;
  overflow: hidden;
}

@keyframes glossaryFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.glossary-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--primary);
  color: var(--text-inverse);
}

.glossary-popup-title {
  font-size: 0.85rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.glossary-popup-title::before {
  content: '\1F4D6';
  font-size: 0.95rem;
}

.glossary-popup-close {
  background: none;
  border: none;
  color: var(--text-inverse);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  opacity: 0.8;
  transition: opacity var(--transition);
}
.glossary-popup-close:hover { opacity: 1; }

.glossary-popup-body {
  padding: 12px 14px;
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text);
  max-height: 240px;
  overflow-y: auto;
}

.glossary-popup-category {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--text-light);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
}

.glossary-popup-footer {
  padding: 6px 14px 10px;
  font-size: 0.72rem;
  color: var(--text-light);
  border-top: 1px solid var(--border);
  text-align: right;
}

.glossary-popup-footer a {
  color: var(--primary-light);
  text-decoration: none;
  cursor: pointer;
}
.glossary-popup-footer a:hover { text-decoration: underline; }

@media (max-width: 900px) {
  .glossary-popup {
    max-width: calc(100vw - 32px);
    left: 16px !important;
    right: 16px !important;
  }
}

/* ===== Structured renderer (blocks) v3 ===== */
.content-body .policy-h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 0 0 24px;
  padding-bottom: 12px;
  border-bottom: 3px solid var(--accent);
  letter-spacing: 0.04em;
}
.content-body .policy-h2 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--primary);
  margin: 28px 0 10px;
  padding-left: 12px;
  border-left: 4px solid var(--accent);
  line-height: 1.5;
}
.content-body .policy-h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary-dark);
  margin: 18px 0 6px;
  line-height: 1.5;
}
.content-body .policy-p {
  margin: 0 0 8px;
  line-height: 1.85;
  color: var(--text);
}
.content-body .policy-bullet {
  position: relative;
  padding-left: 1.4em;
  margin: 0 0 4px;
  line-height: 1.85;
  color: var(--text);
}
.content-body .policy-bullet::before {
  position: absolute;
  left: 0.2em;
  display: inline-block;
  width: 1em;
  text-align: center;
  color: var(--accent);
  font-weight: 700;
}
.content-body .policy-bullet-l0::before { content: '●'; font-size: 0.55em; top: 0.55em; }
.content-body .policy-bullet-l1 { padding-left: 2.6em; }
.content-body .policy-bullet-l1::before { content: '○'; font-size: 0.6em; left: 1.4em; top: 0.55em; }
.content-body .policy-bullet-l2 { padding-left: 3.8em; }
.content-body .policy-bullet-l2::before { content: '■'; font-size: 0.55em; left: 2.6em; top: 0.6em; }
.content-body .policy-bullet-l3 { padding-left: 5em; }
.content-body .policy-bullet-l3::before { content: '◦'; font-size: 0.7em; left: 3.8em; top: 0.45em; }
.content-body .policy-spacer { height: 0.8em; }

/* Images (from Google Docs original) */
.content-body .policy-img-wrap {
  margin: 16px 0;
  text-align: center;
}
.content-body .policy-img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* Tables (from Google Docs original) */
.content-body .policy-table-wrap {
  margin: 16px 0 20px;
  overflow-x: auto;
}
.content-body .policy-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.9rem;
  background: #fff;
}
.content-body .policy-table td {
  border: 1px solid var(--border);
  padding: 10px 12px;
  vertical-align: top;
  line-height: 1.7;
  color: var(--text);
}
.content-body .policy-table td:first-child {
  font-weight: 700;
  color: var(--primary-dark);
  background: rgba(36,113,163,0.06);
  white-space: nowrap;
}
.content-body .policy-table tr:nth-child(odd) td:not(:first-child) {
  background: #fafbfc;
}

/* Hardcoded key titles in 前提 section */
.content-body .policy-kt {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  margin: 28px 0 32px;
  letter-spacing: 0.06em;
  line-height: 1.4;
}
@media (max-width: 600px) {
  .content-body .policy-kt { font-size: 1.6rem; }
}

const POLICY_DATA = [{"title": "はじめに", "blocks": [{"t": "p", "x": "エフィラグループには2,500人を超えるメンバーの皆さんが働いています。当然、常識は人によって異なり、皆がそれぞれの価値観でバラバラに動いていては、組織の運営は滞ってしまいます。そして、グループが目指すミッションの実現も遠ざかってしまうことになります。"}, {"t": "p", "x": "そこで、ミッションの達成にスピード感をもって進んでいくため、エフィラグループのメンバーとしての仕事における正しい考え方・働き方について統一をするため、メンバーシップマニュアルを策定しました。"}], "subsections": [], "text": "エフィラグループには2,500人を超えるメンバーの皆さんが働いています。当然、常識は人によって異なり、皆がそれぞれの価値観でバラバラに動いていては、組織の運営は滞ってしまいます。そして、グループが目指すミッションの実現も遠ざかってしまうことになります。 そこで、ミッションの達成にスピード感をもって進んでいくため、エフィラグループのメンバーとしての仕事における正しい考え方・働き方について統一をするため、メンバーシップマニュアルを策定しました。"}, {"title": "0. 基本的な考え方", "blocks": [{"t": "h2", "x": "0-1. 組織"}, {"t": "p", "x": "組織とは何かの目的のために複数の人が集まったものを指しています。会社も事業部も拠点も、それぞれ目的があり、それを達成するために集まっている組織です。"}, {"t": "p", "x": "会社は理念を達成するために集まっている組織であり、一人一人は会社の目指すべき姿の達成に貢献し、それを通して個人が対価を得ることができます。"}, {"t": "p", "x": "例えば、狩りをするための組織。獲物を捕まえるという共通の目的があり、それを達成することで、自身の分前にたどり着ける。肉をくれたら狩にいくというのは順序としては成立しません。"}, {"t": "p", "x": "メンバーが組織の目指すことに貢献する、その結果でその組織のメンバーは対価を得られるという流れが組織の正しいあり方です。貢献することなく、いるだけで対価を得られるという考えのメンバーだらけの組織は崩壊してしまう、ということです。"}, {"t": "img", "src": "images/image5.png", "w": 452, "h": 244}, {"t": "h2", "x": "0-2. ルール"}, {"t": "p", "x": "組織には組織ごとのルールが存在しています。"}, {"t": "p", "x": "日本には日本の法律があり、会社には会社のルールがあり、事業部や拠点にもそれぞれルールがあります。"}, {"t": "p", "x": "会社という組織にいる以上は、ルールを守ることが求められます。ルールを守らない人は、その組織にはふさわしくない人ということになります。ルールに納得することができているならそれが望ましいですが、納得できる・できないは、ルールを守る上では関係のないことです。"}, {"t": "p", "x": "例えば、交通ルール（車が左側通行であること、赤信号が止まれであることなど）は、納得しようがしまいが守らなければなりません。アメリカは右側通行だから私もそうしたいとか、私は赤でも事故を起こさないからスピード落とさなくても平気、などの理屈は通らないのと同じです。"}, {"t": "p", "x": "このように説明すると、ルールが存在することで自由を奪われ窮屈な気がしてしまうかもしれませんが、むしろルールがあることで、日々迷うことなく業務に集中できるものです。赤信号が止まれだから、事故が起こらないし、交差点で一時停車することなく、青信号の車はスピードを落とさずに交差点に進入することができます。"}, {"t": "p", "x": "会社という組織においては、上長や会社の判断が毎回変わったり、人によって対応が変わることの方が不公平です。ルールがあることで余計なストレスなく仕事をすることができます。"}, {"t": "p", "x": "ゆえに、エフィラでは、ルールを大事にし、どんどん新しいルールが生まれていきます。エフィラグループのメンバーである皆さんは、そのルールに従っていただくことで、自身の業務に集中して取り組める環境で、公平な評価の元、ストレスなく仕事をしていっていただきたいと考えています。"}, {"t": "img", "src": "images/image8.jpg", "w": 453, "h": 255}, {"t": "h2", "x": "0-3. 責任と決定権"}, {"t": "p", "x": "組織にはそれぞれ責任者が存在していますが、彼らは組織の出す結果に対して責任があります。組織においては、責任がある人（責任者）が決定権を持っています。"}, {"t": "p", "x": "例えば、「社長」であれば会社全体の結果に対して責任を負うため、すべてに決定権を持っています。「拠点長」は拠点ごとの結果に対して責任を負うため、拠点における活動に決定権があります。拠点のメンバーは拠点の結果に対して責任を負う立場ではないため、決定権を持っていません。"}, {"t": "p", "x": "また、他拠点のメンバーも、他拠点の拠点長も、自拠点に対しては責任がありません。"}, {"t": "p", "x": "ただし、拠点のメンバーが決定権がないからといって、意見を言ってはいけないというわけではありません。最終的に責任をもって拠点ごとの結果を出すのが「拠点長」ということですので、拠点に所属するメンバーの皆さんの意見を聞き、拠点長が責任を持って決定をすることは望ましいことです。拠点長が決定をするために必要な情報や意見は積極的に伝えましょう。"}, {"t": "img", "src": "images/image3.jpg", "w": 452, "h": 255}, {"t": "h2", "x": "0-4. 責任の大きさ"}, {"t": "p", "x": "責任の大きさによって、見ている未来が異なります。責任の大きい人ほど先を見ています。したがって、見えている未来が異なるため、上長の判断が合っているか間違っているかは部下には判断できないものであることが多いです。"}, {"t": "p", "x": "例えば、毎日チョコレートを食べたいと子供が言ったとしても親はそれを止めます。子供は今うれしいことを求めるが、未来に責任を負っている親は未来の子供のことを考えて、与えないという判断するものです。"}, {"t": "p", "x": "拠点の未来を考え、責任を持って上長が決定したことに対しては、たとえ自分が納得いかなくても、前向きに取り組みましょう。"}, {"t": "img", "src": "images/image2.png", "w": 452, "h": 250}, {"t": "h2", "x": "0-5. 指示"}, {"t": "p", "x": "指示とは責任を果たすためにその組織の責任者に許されている権限です。上長から部下に対して行うことができ、同僚や上長に対してすることはできません。責任を負っている以上、上長の発言は指示であり、依頼ではありません。"}, {"t": "h2", "x": "0-6.上長と部下の関係"}, {"t": "p", "x": "友達でも家族でもなく、上長と部下という仕事上の関係です。上長と部下が友達のように仲良くなってしまうと、上長は部下に指示がしづらくなり、適切な判断をすることができなくなってしまうことがあります。そのため、上長と部下の関係は仲良しこよしではなく、一定の距離をとっている方が良いでしょう。"}, {"t": "p", "x": "上長と仲良くなりたい、と思うことは悪いことではありません。とはいえ、上長は複数の部下と平等に接しなければならない立場なのだということを理解した上で、一定の距離感を保った上長と部下の関係を作りましょう。"}], "subsections": ["0-1. 組織", "0-2. ルール", "0-3. 責任と決定権", "0-4. 責任の大きさ", "0-5. 指示", "0-6.上長と部下の関係"], "text": "0-1. 組織 組織とは何かの目的のために複数の人が集まったものを指しています。会社も事業部も拠点も、それぞれ目的があり、それを達成するために集まっている組織です。 会社は理念を達成するために集まっている組織であり、一人一人は会社の目指すべき姿の達成に貢献し、それを通して個人が対価を得ることができます。 例えば、狩りをするための組織。獲物を捕まえるという共通の目的があり、それを達成することで、自身の分前にたどり着ける。肉をくれたら狩にいくというのは順序としては成立しません。 メンバーが組織の目指すことに貢献する、その結果でその組織のメンバーは対価を得られるという流れが組織の正しいあり方です。貢献することなく、いるだけで対価を得られるという考えのメンバーだらけの組織は崩壊してしまう、ということです。 0-2. ルール 組織には組織ごとのルールが存在しています。 日本には日本の法律があり、会社には会社のルールがあり、事業部や拠点にもそれぞれルールがあります。 会社という組織にいる以上は、ルールを守ることが求められます。ルールを守らない人は、その組織にはふさわしくない人ということになります。ルールに納得することができているならそれが望ましいですが、納得できる・できないは、ルールを守る上では関係のないことです。 例えば、交通ルール（車が左側通行であること、赤信号が止まれであることなど）は、納得しようがしまいが守らなければなりません。アメリカは右側通行だから私もそうしたいとか、私は赤でも事故を起こさないからスピード落とさなくても平気、などの理屈は通らないのと同じです。 このように説明すると、ルールが存在することで自由を奪われ窮屈な気がしてしまうかもしれませんが、むしろルールがあることで、日々迷うことなく業務に集中できるものです。赤信号が止まれだから、事故が起こらないし、交差点で一時停車することなく、青信号の車はスピードを落とさずに交差点に進入することができます。 会社という組織においては、上長や会社の判断が毎回変わったり、人によって対応が変わることの方が不公平です。ルールがあることで余計なストレスなく仕事をすることができます。 ゆえに、エフィラでは、ルールを大事にし、どんどん新しいルールが生まれていきます。エフィラグループのメンバーである皆さんは、そのルールに従っていただくことで、自身の業務に集中して取り組める環境で、公平な評価の元、ストレスなく仕事をしていっていただきたいと考えています。 0-3. 責任と決定権 組織にはそれぞれ責任者が存在していますが、彼らは組織の出す結果に対して責任があります。組織においては、責任がある人（責任者）が決定権を持っています。 例えば、「社長」であれば会社全体の結果に対して責任を負うため、すべてに決定権を持っています。「拠点長」は拠点ごとの結果に対して責任を負うため、拠点における活動に決定権があります。拠点のメンバーは拠点の結果に対して責任を負う立場ではないため、決定権を持っていません。 また、他拠点のメンバーも、他拠点の拠点長も、自拠点に対しては責任がありません。 ただし、拠点のメンバーが決定権がないからといって、意見を言ってはいけないというわけではありません。最終的に責任をもって拠点ごとの結果を出すのが「拠点長」ということですので、拠点に所属するメンバーの皆さんの意見を聞き、拠点長が責任を持って決定をすることは望ましいことです。拠点長が決定をするために必要な情報や意見は積極的に伝えましょう。 0-4. 責任の大きさ 責任の大きさによって、見ている未来が異なります。責任の大きい人ほど先を見ています。したがって、見えている未来が異なるため、上長の判断が合っているか間違っているかは部下には判断できないものであることが多いです。 例えば、毎日チョコレートを食べたいと子供が言ったとしても親はそれを止めます。子供は今うれしいことを求めるが、未来に責任を負っている親は未来の子供のことを考えて、与えないという判断するものです。 拠点の未来を考え、責任を持って上長が決定したことに対しては、たとえ自分が納得いかなくても、前向きに取り組みましょう。 0-5. 指示 指示とは責任を果たすためにその組織の責任者に許されている権限です。上長から部下に対して行うことができ、同僚や上長に対してすることはできません。責任を負っている以上、上長の発言は指示であり、依頼ではありません。 0-6.上長と部下の関係 友達でも家族でもなく、上長と部下という仕事上の関係です。上長と部下が友達のように仲良くなってしまうと、上長は部下に指示がしづらくなり、適切な判断をすることができなくなってしまうことがあります。そのため、上長と部下の関係は仲良しこよしではなく、一定の距離をとっている方が良いでしょう。 上長と仲良くなりたい、と思うことは悪いことではありません。とはいえ、上長は複数の部下と平等に接しなければならない立場なのだということを理解した上で、一定の距離感を保った上長と部下の関係を作りましょう。"}, {"title": "１. エフィラメンバーの心得", "blocks": [{"t": "h2", "x": "1-1. フォアザチームでいること"}, {"t": "p", "x": "私たちの仕事は、チームでの仕事であり、連携を取りながら進める仕事です。"}, {"t": "p", "x": "ですので、自分さえ良ければ、他のメンバーやチームがどうなっても知らない、ということではいけません。自己の満足度を考える前に、まずはチームやチームメンバーへの貢献をすることを考えましょう。"}, {"t": "p", "x": "チームの仕事が最初にあって、そのうえで自分の仕事が存在していることを忘れてはいけません。"}, {"t": "p", "x": "利己的・自己中心的な考えではなく、常にチーム優先で考えましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "書類をケアマネに渡しておくように指示を受けたが、その書類の内容が間違っていることに気づいたので、上長に間違えがあるのではないか、と伝えた。", "l": 0}, {"t": "b", "x": "拠点長宛に来客があったが、手が離せない様子だったので、「来客の方のご用件をおうかがいしておきましょうか？」と申し出た。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自分は先ほどまでパートナーの対応で忙しくしていたから、現在手が空いているが他のメンバーのフォローはしない。", "l": 0}, {"t": "b", "x": "見学にいらっしゃったパートナーとご家族様が玄関に立っていたが、自分の担当ではないし、頼まれていないので、相談室への案内をしなかった。", "l": 0}, {"t": "h2", "x": "1-2. 全員でパートナーとメンバーを増やす"}, {"t": "p", "x": "パートナーやメンバーを増やすのは、特定の担当者だけの仕事ではありません。"}, {"t": "p", "x": "全員が営業マンであり、会社を作っていく存在であるということを認識した行動をしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "パートナーから利用希望の問い合わせが拠点宛にあり、おそらくグループ内他事業と間違えての問い合わせだと思われる内容だったが、丁寧に要件をお聞きした上で、「お問い合わせいただきありがとうございます。おそらく弊社の運営している〇〇へのお問い合わせかと存じます。担当者から折り返しいたしますのでお待ちいただけますでしょうか。」と伝え、連絡先とお名前をお聞きして他事業へ引き継いだ。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "メンバー募集の問い合わせが拠点宛にあったが、本部で採用業務は一括して行っているので、「本部にお電話ください」とぶっきらぼうな対応をしてしまった。", "l": 0}, {"t": "h2", "x": "1-3. もしイライラしたら６秒数えましょう"}, {"t": "p", "x": "3-1. 上長・同僚に対して、感情的にならない という項目にもあるように、感情的に怒ったりする人とワンチームで働いていくことは難しいでしょう。"}, {"t": "p", "x": "とはいえ、人間ですのでイライラしてしまうこともあると思います。イライラしない人になろう、とするのではなく、イライラとしてしまった気持ちをコントロールできるようにしましょう。"}, {"t": "p", "x": "反射的についイライラしてしまったときの対処法としては、『６秒間数える』が有効とされています。実践してみましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "支援中、パートナーに挑発的な言葉を言われてしまい、ついカッとなってしまいそうになったが、６秒間数えることで、落ち着くことができた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "支援中、パートナーに挑発的な言葉を言われてしまい、ついカッとなってしまい感情を抑えられずに怒ってしまった。", "l": 0}, {"t": "h2", "x": "1-4. 誰が見ていても、見ていなくても、変わらない行動・言動をとる"}, {"t": "p", "x": "私たちの行動や発言は、パートナーや上長、同僚など「誰かが見ている時」と「誰も見ていない時」で変わってはいけません。"}, {"t": "p", "x": "見られている時だけ丁寧に対応し、誰も見ていないからといって行動を変える（手を抜いたり、言葉遣いが乱暴になったりする）というのは、その行動の裏に「人に見られたらまずい」という後ろめたさがある証拠です。 そのような後ろめたさのある行動は、エフィラメンバーとして「人格を磨く」という姿勢に反します。"}, {"t": "p", "x": "また、「今は誰も見ていない」と思っても、ちょっとしたズルや不適切な言動は必ずどこかで誰かに見られており、それが組織全体の評判を下げることにつながります。 常に「今この瞬間を、パートナーやご家族、地域の方々に見られても胸を張れるか」という基準を持ち、裏表のない行動を心がけましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "誰も見ていない場所での裏方の作業（清掃や事務作業など）であったが、パートナーに見られても恥ずかしくないよう、マニュアル通りに丁寧に行った。", "l": 0}, {"t": "b", "x": "休憩時間中、メンバーしかいない場であっても、コミュニケーション基本ルールを守り、パートナーや同僚に対する愚痴や品のない言葉遣いをしなかった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "パートナーやご家族の前では丁寧な言葉遣いをしているが、バックヤードに戻った途端、パートナーを「あの人」と呼んだり、乱暴な言葉遣いで同僚と話したりしている。", "l": 0}, {"t": "b", "x": "「上長が見ていないから少しサボってもバレないだろう」と考え、決められた手順を省略して自分の楽な方法で業務を済ませた。", "l": 0}], "subsections": ["1-1. フォアザチームでいること", "1-2. 全員でパートナーとメンバーを増やす", "1-3. もしイライラしたら６秒数えましょう", "1-4. 誰が見ていても、見ていなくても、変わらない行動・言動をとる"], "text": "1-1. フォアザチームでいること 私たちの仕事は、チームでの仕事であり、連携を取りながら進める仕事です。 ですので、自分さえ良ければ、他のメンバーやチームがどうなっても知らない、ということではいけません。自己の満足度を考える前に、まずはチームやチームメンバーへの貢献をすることを考えましょう。 チームの仕事が最初にあって、そのうえで自分の仕事が存在していることを忘れてはいけません。 利己的・自己中心的な考えではなく、常にチーム優先で考えましょう。 よくあるOK事例 書類をケアマネに渡しておくように指示を受けたが、その書類の内容が間違っていることに気づいたので、上長に間違えがあるのではないか、と伝えた。 拠点長宛に来客があったが、手が離せない様子だったので、「来客の方のご用件をおうかがいしておきましょうか？」と申し出た。 よくあるNG事例 自分は先ほどまでパートナーの対応で忙しくしていたから、現在手が空いているが他のメンバーのフォローはしない。 見学にいらっしゃったパートナーとご家族様が玄関に立っていたが、自分の担当ではないし、頼まれていないので、相談室への案内をしなかった。 1-2. 全員でパートナーとメンバーを増やす パートナーやメンバーを増やすのは、特定の担当者だけの仕事ではありません。 全員が営業マンであり、会社を作っていく存在であるということを認識した行動をしましょう。 よくあるOK事例 パートナーから利用希望の問い合わせが拠点宛にあり、おそらくグループ内他事業と間違えての問い合わせだと思われる内容だったが、丁寧に要件をお聞きした上で、「お問い合わせいただきありがとうございます。おそらく弊社の運営している〇〇へのお問い合わせかと存じます。担当者から折り返しいたしますのでお待ちいただけますでしょうか。」と伝え、連絡先とお名前をお聞きして他事業へ引き継いだ。 よくあるNG事例 メンバー募集の問い合わせが拠点宛にあったが、本部で採用業務は一括して行っているので、「本部にお電話ください」とぶっきらぼうな対応をしてしまった。 1-3. もしイライラしたら６秒数えましょう 3-1. 上長・同僚に対して、感情的にならない という項目にもあるように、感情的に怒ったりする人とワンチームで働いていくことは難しいでしょう。 とはいえ、人間ですのでイライラしてしまうこともあると思います。イライラしない人になろう、とするのではなく、イライラとしてしまった気持ちをコントロールできるようにしましょう。 反射的についイライラしてしまったときの対処法としては、『６秒間数える』が有効とされています。実践してみましょう。 よくあるOK事例 支援中、パートナーに挑発的な言葉を言われてしまい、ついカッとなってしまいそうになったが、６秒間数えることで、落ち着くことができた。 よくあるNG事例 支援中、パートナーに挑発的な言葉を言われてしまい、ついカッとなってしまい感情を抑えられずに怒ってしまった。 1-4. 誰が見ていても、見ていなくても、変わらない行動・言動をとる 私たちの行動や発言は、パートナーや上長、同僚など「誰かが見ている時」と「誰も見ていない時」で変わってはいけません。 見られている時だけ丁寧に対応し、誰も見ていないからといって行動を変える（手を抜いたり、言葉遣いが乱暴になったりする）というのは、その行動の裏に「人に見られたらまずい」という後ろめたさがある証拠です。 そのような後ろめたさのある行動は、エフィラメンバーとして「人格を磨く」という姿勢に反します。 また、「今は誰も見ていない」と思っても、ちょっとしたズルや不適切な言動は必ずどこかで誰かに見られており、それが組織全体の評判を下げることにつながります。 常に「今この瞬間を、パートナーやご家族、地域の方々に見られても胸を張れるか」という基準を持ち、裏表のない行動を心がけましょう。 よくあるOK事例 誰も見ていない場所での裏方の作業（清掃や事務作業など）であったが、パートナーに見られても恥ずかしくないよう、マニュアル通りに丁寧に行った。 休憩時間中、メンバーしかいない場であっても、コミュニケーション基本ルールを守り、パートナーや同僚に対する愚痴や品のない言葉遣いをしなかった。 よくあるNG事例 パートナーやご家族の前では丁寧な言葉遣いをしているが、バックヤードに戻った途端、パートナーを「あの人」と呼んだり、乱暴な言葉遣いで同僚と話したりしている。 「上長が見ていないから少しサボってもバレないだろう」と考え、決められた手順を省略して自分の楽な方法で業務を済ませた。"}, {"title": "２. ルールを守る", "blocks": [{"t": "h2", "x": "2-1. 組織のルールを守る"}, {"t": "p", "x": "組織に所属する以上、組織のルールは必ず守らなければなりません。それゆえ、ルールの内容に理解、納得できていることが望ましいですが、たとえ理解、納得できないことがあっても守らなければいけません。"}, {"t": "p", "x": "本紙の「基本的な考え方」＞「ルール」の項目参照"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "基本ルールに、支援メンバーのアクセサリーは禁止、とされていたので、おしゃれをしたいと思っていたが、勤務時間中は外して勤務した。", "l": 0}, {"t": "b", "x": "基本ルールに、一人称は「私」「僕」「自分」のいずれかを使用する、とあるので、勤務時間中は自分のことを「僕」と言っている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "基本ルールで支援中の結婚指輪着用が禁止されているが、なぜだめなのか納得できない。注意されたが無視し、いつも結婚指輪をつけて業務をしている。", "l": 0}, {"t": "b", "x": "「成人以上のパートナーとの会話は敬語で接し、呼称は”さん”付けとする」というルールがあるが、前の会社では”ちゃん”付けで業務しており、その方が距離感が近くなっていいと個人的には感じているため、ルールを守らない。", "l": 0}, {"t": "h2", "x": "2-2. 「少しくらい守らなくていいか」はNG"}, {"t": "p", "x": "決められたルールや決定に対して、「少しくらい守らなくていいか」をしていくと、組織の風土はどんどん悪化していってしまいます。ルールを守っている人と、守っていない人の間に不公平も生じてしまうことでしょう。だからこそ、会社も上長も、少しだとしても許容することはないし、改善を求めていきます。"}, {"t": "p", "x": "少しでもダメなものはダメなので、「少しくらい」という甘い気持ちを持たず、全員がルールを守ったうえで気持ちよく働ける環境を守りましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点のメンバーとは仲がいいのでつい、普段使っている一人称「俺」を使ってしまいそうになるが、ルールにあるとおり「私」や「僕」という一人称をつかうように気を付けている。", "l": 0}, {"t": "b", "x": "忙しかった日はついついその日の状況について愚痴を言いたくなってしまうし、少しくらいならバレないかなと思うが、周りのメンバーにも良い影響は与えないし、ルールでも禁止されているので、忙しくても乗り越えられたことを前向きにとらえられるよう努力している。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "シフトは８時開始になっているが、テキパキやれば朝の準備は早く終わるだろうから、少しくらい遅れて行ってもいいや。", "l": 0}, {"t": "b", "x": "挨拶は午前中は「おはようございます」だが、「お疲れ様です」で挨拶をしてしまっている。挨拶はしているし、気にしなくていいか。", "l": 0}, {"t": "h2", "x": "2-3. 同僚のルール違反を黙認しない"}, {"t": "p", "x": "ルール違反が常態化してしまうと、ルールを守っている人が損をする風土になってしまいます。"}, {"t": "p", "x": "自分自身がルールを守るのは当然ですが、メンバーが違反していても、それを黙認してはならず、本人に指摘するか、上長に報告しましょう。指摘や報告をすることは、気が引けることもあると思いますが、組織のメンバーとして皆が平等に働く上で大切なことだと認識して行動しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新人メンバーの挨拶の声が小さくて、周りのメンバーに聞こえていないようだった。環境に慣れておらず緊張しているからかもしれないので指摘するのは気が引けたが、ルールにもあるし、皆が平等に気持ちの良い挨拶ができた方が良いと思ったのでその新人メンバーに「緊張していますか？がんばってフロアの皆に聞こえるように挨拶をしましょうね。」と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "メンバーAが業務中に「おまえさー」と、ふざけた感じでメンバーBと話していた。", "l": 0}, {"t": "p", "x": "Bは「おまえ」は基本ルールAで使ってはいけない言葉として記載されていることは知っていたが、上長に報告してメンバー同士の関係性が悪化するのを恐れて何も言わなかった。"}, {"t": "b", "x": "メンバーAが個人のSNS内でパートナーに関する内容を発信しているのを見たが、これくらい大丈夫かと思い本人への指摘や上長への報告もしなかった。", "l": 0}, {"t": "h2", "x": "2-4. 上長ができていないからできなくていいとはならない"}, {"t": "p", "x": "上長がたとえルール違反していたとしても、自分もルール違反してもいいんだ、ということにはなりません。"}, {"t": "p", "x": "総理大臣が飲酒運転するなら、自分も飲酒運転してもいい、ということにはならないのと同様に、上長がまず守らないと、部下が守れないのは仕方ない、ということにはなりません。"}, {"t": "p", "x": "ルールは他人がどうであっても、組織の全員が守らないといけないものです。"}, {"t": "p", "x": "仮に、上長がルール違反している場合は、本人に指摘する、または通報して知らせましょう。（飲酒運転の例に置き換えてもわかるとおり、上長だからルール違反してよい、ということにもなりません）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長がネックレスを外し忘れて支援に入っていた。「ネックレスを外し忘れていますよ。」と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長が業務中にユニフォームを着用してないのを目撃した。", "l": 0}, {"t": "p", "x": "顧客の前に出る際はユニフォームを着用しないとならないことは分かっていたが、上長が守っていないため自身も良いかと思いユニフォーム以外の服を着用した。"}, {"t": "b", "x": "電車遅延により数分遅刻をしそうなため上長及び当日シフトに入っているメンバーへ連絡しようとしたが、以前に上長も数分遅刻をした際連絡を入れてなかったことを思い出し自身もこれくらいなら良いだろうと思い、連絡を入れなかった。", "l": 0}], "subsections": ["2-1. 組織のルールを守る", "2-2. 「少しくらい守らなくていいか」はNG", "2-3. 同僚のルール違反を黙認しない", "2-4. 上長ができていないからできなくていいとはならない"], "text": "2-1. 組織のルールを守る 組織に所属する以上、組織のルールは必ず守らなければなりません。それゆえ、ルールの内容に理解、納得できていることが望ましいですが、たとえ理解、納得できないことがあっても守らなければいけません。 本紙の「基本的な考え方」＞「ルール」の項目参照 よくあるOK事例 基本ルールに、支援メンバーのアクセサリーは禁止、とされていたので、おしゃれをしたいと思っていたが、勤務時間中は外して勤務した。 基本ルールに、一人称は「私」「僕」「自分」のいずれかを使用する、とあるので、勤務時間中は自分のことを「僕」と言っている。 よくあるNG事例 基本ルールで支援中の結婚指輪着用が禁止されているが、なぜだめなのか納得できない。注意されたが無視し、いつも結婚指輪をつけて業務をしている。 「成人以上のパートナーとの会話は敬語で接し、呼称は”さん”付けとする」というルールがあるが、前の会社では”ちゃん”付けで業務しており、その方が距離感が近くなっていいと個人的には感じているため、ルールを守らない。 2-2. 「少しくらい守らなくていいか」はNG 決められたルールや決定に対して、「少しくらい守らなくていいか」をしていくと、組織の風土はどんどん悪化していってしまいます。ルールを守っている人と、守っていない人の間に不公平も生じてしまうことでしょう。だからこそ、会社も上長も、少しだとしても許容することはないし、改善を求めていきます。 少しでもダメなものはダメなので、「少しくらい」という甘い気持ちを持たず、全員がルールを守ったうえで気持ちよく働ける環境を守りましょう。 よくあるOK事例 拠点のメンバーとは仲がいいのでつい、普段使っている一人称「俺」を使ってしまいそうになるが、ルールにあるとおり「私」や「僕」という一人称をつかうように気を付けている。 忙しかった日はついついその日の状況について愚痴を言いたくなってしまうし、少しくらいならバレないかなと思うが、周りのメンバーにも良い影響は与えないし、ルールでも禁止されているので、忙しくても乗り越えられたことを前向きにとらえられるよう努力している。 よくあるNG事例 シフトは８時開始になっているが、テキパキやれば朝の準備は早く終わるだろうから、少しくらい遅れて行ってもいいや。 挨拶は午前中は「おはようございます」だが、「お疲れ様です」で挨拶をしてしまっている。挨拶はしているし、気にしなくていいか。 2-3. 同僚のルール違反を黙認しない ルール違反が常態化してしまうと、ルールを守っている人が損をする風土になってしまいます。 自分自身がルールを守るのは当然ですが、メンバーが違反していても、それを黙認してはならず、本人に指摘するか、上長に報告しましょう。指摘や報告をすることは、気が引けることもあると思いますが、組織のメンバーとして皆が平等に働く上で大切なことだと認識して行動しましょう。 よくあるOK事例 新人メンバーの挨拶の声が小さくて、周りのメンバーに聞こえていないようだった。環境に慣れておらず緊張しているからかもしれないので指摘するのは気が引けたが、ルールにもあるし、皆が平等に気持ちの良い挨拶ができた方が良いと思ったのでその新人メンバーに「緊張していますか？がんばってフロアの皆に聞こえるように挨拶をしましょうね。」と伝えた。 よくあるNG事例 メンバーAが業務中に「おまえさー」と、ふざけた感じでメンバーBと話していた。 Bは「おまえ」は基本ルールAで使ってはいけない言葉として記載されていることは知っていたが、上長に報告してメンバー同士の関係性が悪化するのを恐れて何も言わなかった。 メンバーAが個人のSNS内でパートナーに関する内容を発信しているのを見たが、これくらい大丈夫かと思い本人への指摘や上長への報告もしなかった。 2-4. 上長ができていないからできなくていいとはならない 上長がたとえルール違反していたとしても、自分もルール違反してもいいんだ、ということにはなりません。 総理大臣が飲酒運転するなら、自分も飲酒運転してもいい、ということにはならないのと同様に、上長がまず守らないと、部下が守れないのは仕方ない、ということにはなりません。 ルールは他人がどうであっても、組織の全員が守らないといけないものです。 仮に、上長がルール違反している場合は、本人に指摘する、または通報して知らせましょう。（飲酒運転の例に置き換えてもわかるとおり、上長だからルール違反してよい、ということにもなりません） よくあるOK事例 上長がネックレスを外し忘れて支援に入っていた。「ネックレスを外し忘れていますよ。」と伝えた。 よくあるNG事例 上長が業務中にユニフォームを着用してないのを目撃した。 顧客の前に出る際はユニフォームを着用しないとならないことは分かっていたが、上長が守っていないため自身も良いかと思いユニフォーム以外の服を着用した。 電車遅延により数分遅刻をしそうなため上長及び当日シフトに入っているメンバーへ連絡しようとしたが、以前に上長も数分遅刻をした際連絡を入れてなかったことを思い出し自身もこれくらいなら良いだろうと思い、連絡を入れなかった。"}, {"title": "3. 仕事の進め方", "blocks": [{"t": "h2", "x": "3-1. あいまいな指示をそのままにしない"}, {"t": "p", "x": "あいまいな指示は、上長と部下の認識の違いを生み出し、結果として組織の生産性が低くなってしまうことにつながります。"}, {"t": "p", "x": "上長からの指示があいまい、不明瞭な場合には、明確な指示を仰ぎましょう。もし上長が求めるものと異なることをしてしまった場合に、手戻りが発生し、業務スピードが落ちてしまうことにつながります。"}, {"t": "p", "x": "※「明確な指示」とは「いつまでに」「どの状態か」について、お互いの認識のずれがないものを言います。（○月○日までに○が完了している状態など）"}, {"t": "p", "x": "「〜をできるようにする」などでもいいのですが、できるできないという状態の目標設定だとお互いの認識がズレてしまっていることが多いので、その状態がお互いの認識とずれないように設定する必要があります。"}, {"t": "h3", "x": "例（NGパターン）"}, {"t": "p", "x": "○月末日までに請求業務をできるようになる"}, {"t": "p", "x": "→× 何をもってできるといえるのかがあいまいです。できる、の認識が上長と部下で違うことがあります。"}, {"t": "h3", "x": "例（OKパターン）"}, {"t": "p", "x": "○月○日までに入浴介助が一人でできるようになり上長からOKをもらっている状態にする（できているかどうかの判断は上長が行う）"}, {"t": "p", "x": "→○ 理想ではないですが、最低限判断が本人ではなく上長になるので設定の仕方としてはOKです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から「２日後のイベントでつかう物の買い出し」を指示された。何をどのくらい買い出しにいったらいいのかわからなかったので、過去の同一イベントで使用した買い出しリストを調べ、「こちらのリストのものを買ってくればよろしいでしょうか。」と確認した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から「なるべく早めに、この荷物を移動させておいて」と指示された。いつまでに、どこへ移動させなければならないのかよくわからなかったので、とりあえず当日中にA室へ移動させてから帰宅した。翌日、荷物は当日中にB室へ移動させなければならなかったものと発覚し、その後のイベントの開始が遅れてしまった。", "l": 0}, {"t": "b", "x": "上長から「このリストを良い感じに見やすくしといて」と指示された。リスト内の必要か不明な項目を省き項目数を減らすことで見やすくし、上長へ提出をした。ところが、上長は項目は減らさずにレイアウトを変更することで見やすくなることを望んでおり、再度認識合わせから始めることとなった。", "l": 0}, {"t": "h2", "x": "3-2. 曖昧（あいまい）な状況に耐え、行動する（曖昧耐性）"}, {"t": "p", "x": "3-1にはあいまいな指示をそのままにしない、とありますが、仕事において、すべてが明瞭になっていたり、完全に納得できるものであるとは限りません。 ルールや指示は可能な限り明確にすることを目指していますが、現実の業務や新しい取り組みにおいては、どうしても明瞭にしきれない「曖昧な状況」が必ず発生します。 「すべてが明確にならないと動けない」「正解がわからないからできない」と行動を止めるのではなく、100%の正解がない状況であっても、その曖昧さに耐え、自分なりに考えて行動できる「曖昧耐性」を持ちましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新しい業務でマニュアルに書かれていない事象が発生したが、これまでの経験と会社の価値観（エフィラウェイ）に照らし合わせて自分なりに判断して対応し、事後で上長に報告・確認した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "指示された作業の手順に一部不明瞭な点があったため、「明確な指示がないからできない」と判断し、指示が来るまで作業をストップして何もしなかった。", "l": 0}, {"t": "h2", "x": "3-3. 「わからないから動かない」をしない"}, {"t": "p", "x": "何をしたらいいかわからない、具体的にどう動けばよいかわからないときは、まずはわかるための行動をとりましょう。仕事として任されている以上、「わからないからやらなくていい」「仕方ないよね」ということにはなりません。"}, {"t": "p", "x": "自分で調べたり、上長に聞くなりし、できるようになるところまで含めて自身の責任であると考え、行動を起こしましょう。対価が発生しているプロである以上、「教えてくれないからできません」は通用しないものと考えて自分から動きましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から新しい業務の指示を受けたが、教わったことがない業務だった。「教わったことのない業務なので本日教えていただけますか。」と確認したところ、上長は教えた業務を指示したと勘違いしていたようで、改めて教わり、無事業務を完了することができた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から新しい業務の指示を受けたが、マニュアルも渡されておらずどう動いていいかわからなかったため、後日詳細な指示がくるのを待って何もしなかった。", "l": 0}, {"t": "b", "x": "今月から新たに拠点長に就任した。拠点長および管理職としての役割に関する説明はとくになかったので、とりあえず直近の上長（拠点長）がやっていたことを思い出しながら行動した。後日、拠点長業務やマネジメントマニュアルがイントラにすべて掲載されていることに気づいたが、自身がやっていたことは間違っていた。", "l": 0}, {"t": "h2", "x": "3-4. 「やる気がでないからやらない」をしない"}, {"t": "p", "x": "やる気がでなかったとしても、仕事として任されている以上、当然のことながら「やる気が出ないからやらなくていい」「仕方ないよね」ということにはなりません。"}, {"t": "p", "x": "「やる気があるから行動するのではなく、行動するからやる気が出る」ということは心理学的にも証明されていることですので、まずは小さな行動からでも起こしてみる、ということをしてみましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から新しい業務の指示を受けたが、あまり好きなことではなかったのでやる気が出なかった。とはいえ仕事なので、最初の手順だけでもやってみようと思ってやり始めたところ、意外とすんなり進めることができ、無事業務を完了することができた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から新しい業務の指示を受けたが、あまり好きなことではなかったのでやる気が出なかった。やるのを先延ばしにしていたら、対応期日が来てしまった。", "l": 0}, {"t": "h2", "x": "3-5. 「納得してから動く」はNG"}, {"t": "p", "x": "上長が、ひとりひとりが納得するまで説明しようとすると、説得に時間を要したり、それぞれの考えとの違いをすり合わせないといけないなど、膨大な時間を要し、組織運営上の弊害が起きてしまう場合があります。さらに納得しなければ動かなくてもいいのであれば、ずっと納得しないから動かないという理屈がまかり通ってしまうことになります。"}, {"t": "p", "x": "納得できなくても上長の責任のもと実施することになった以上、決定事項はまずやってみましょう。"}, {"t": "p", "x": "また、経験してみたら考え方が変わることもあります。やってみたら気づくこともあります。腹落ちしなくともまずやってみて、それで違うと思ったら上長に報告をしましょう。納得する、しないではなく、まずは行動して経験してみてから上長へ意見を伝えましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長からの指示に対して、自分がやる意味があるのかわからなかったが、やってみたところ、拠点内の業務が円滑に進むようになったので、やってよかったと思った。", "l": 0}, {"t": "b", "x": "上長からの指示に対して、納得できなかったがまずやってみようと実施したところ、良い結果は得られなかった。その結果を上長に報告したところ、今回の反省を踏まえて改善し、今までやったことのないような新しい策を実施することとなり、今度は良い結果を出すことができた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長からの指示に対して、自分がやる意味があるのかわからない、と思った。納得するまで何度も説明を求めたが、まだ腹落ちしていないので業務にも着手していない。", "l": 0}, {"t": "b", "x": "納得したうえで指示内容を遂行すべきだと思うため、納得がいってない業務内容については必ず上長へ説明を求め、納得してから進めるようにしている。", "l": 0}, {"t": "h2", "x": "3-6. 疑念があったら、上長に確認すること"}, {"t": "p", "x": "「本当に上長の言う通りで正しいのか」「あの人はどうしてあんな行動をしたのだろう」"}, {"t": "p", "x": "こういった疑念を感じたら、直ちにその原因である疑念の発生元に確認し、疑念を解消しましょう。"}, {"t": "p", "x": "ひとりで悩み続けることは集中力を下げ、仕事のとりかかりも遅れてロスタイムを生んでしまうことでしょう。"}, {"t": "p", "x": "ただし、疑念が残っていたから業務をやらなくていい、ということにはなりません。疑念が上長に確認しても解消できなかった、という場合でも、まずは行動にうつしてみましょう。"}, {"t": "p", "x": "※疑念は必ずしも解消されるとは限らないが、解消のための行動はしましょうという趣旨です。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "いつも拠点内の慣習でやっていた業務の効率を上げられる方法を思いついたので、上長に「こうしたらもっと効率が上がるのではないでしょうか。」と提案した。", "l": 0}, {"t": "b", "x": "上長の方針について、納得できず疑念があったのでもやもやしていた。もやもやしたままにしているのは良くないと思い、上長に時間をもらい理由を聞いたところ納得でき、自身の仕事に集中できるようになった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "何となくいつも自分がやっているこの仕事。いつの間にか自分の役割のようになっているが、釈然としない想いがある。上長に確認するのも今さらなので、もやもやしながらもやり続けている。", "l": 0}, {"t": "b", "x": "新しいパートナーに対する支援について、上長の方針に疑問を感じるところがある。ただ、上長の方針に従わないと何か言われるので、そのままにしておこう。", "l": 0}, {"t": "h2", "x": "3-7. 直属の上長の指示だけを聞き入れる"}, {"t": "p", "x": "部下は、直属の上長の指示だけを聞き入れましょう。"}, {"t": "p", "x": "同僚などの並列関係や、他部署の先輩、他部署の拠点長に指示をしてはいけないし、そのような方たちに指示をされることがあったとしても聞き入れる必要はありません。なぜなら、それらの方たちはその指示によって起こった結果について責任をとる立場にないためです。部下の皆さんにとっては、直属の上司が結果の責任をとる立場なので、直属の上司の指示に従いましょう。"}, {"t": "p", "x": "同僚も、資格を持っているからといって他のメンバーに対して指示ができるわけではありません。仕事の指示や判断をする権限があるのは、その組織の結果に対して責任を負う上長のみである、ということを理解しておきましょう。"}, {"t": "p", "x": "たとえ上長が指示した業務分担が不適切だと思ってもメンバー同士で直接業務の担当を変更することはできません。必要な場合は必ず上長に相談して指示を仰ぎましょう。"}, {"t": "p", "x": "※責任がない人の指示を聞かないという趣旨のため、上長の上長や、本部の指示は例外として、聞かないといけません。"}, {"t": "p", "x": "※上長が今日はこの人の指示を聞いてください、と指定された人（同僚など）の指示は聞かないといけません。（上長から責任を与えられている人の指示は聞く必要があるためです）"}, {"t": "p", "x": "※ヘルプの場合は、直属の上長ではないですが、その日の現場の運営における指示はヘルプ先の責任者の指示を聞いて動きましょう。（ヘルプ先の運営の責任はヘルプ先の責任者にあるためです）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "今日は拠点長が休みなので、先輩メンバーAの指示に従って業務を行うように拠点長から指示があった。そのため、先輩メンバーAの指示にしたがって１日とおして業務を行った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "先輩メンバーからこれはあなたがやるべきだと、指示が来た。先輩でもあるので、自分の役割ではないと想いながらも実行した。", "l": 0}, {"t": "b", "x": "拠点長がいないところで、サビ管から計画書作成のための業務を振られた。業務知識はサビ管の方があるため、素直に従った", "l": 0}, {"t": "h2", "x": "3-8. 他部署の上長や先輩には仕事の相談はしない"}, {"t": "p", "x": "他部署の上長や先輩は、あなたの成長や組織の結果に責任はないため、無責任にアドバイスができてしまう立場にあります。"}, {"t": "p", "x": "相談にのってしまう他部署の上長や先輩は、より多くのメンバーから気に入られたいという心理が働いていることもあるかもしれません。相談にのる上長はその部下へのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、上位層に言われると、他部署の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。"}, {"t": "p", "x": "そのアドバイスに対して、あなたは「確かに、その通り」などと思ってしまい、上長に対しての信頼を失ってしまうこともあるでしょう。上長は常に責任のある中で判断をしていたりするため、所属しているメンバーに対して一見すると優しくない決定などもしているかもしれないが、それは責任がある故の判断であり、他部署の上長や拠点長にはわからないことです。"}, {"t": "p", "x": "※本部の定着支援課やメンターに相談することは問題ありません。"}, {"t": "p", "x": "※セクハラ/パワハラ/不正/明らかなルール違反の場合も、例外です。その際は事実情報を、職場相談窓口などの社内窓口に通報しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "仕事の進め方について悩みがあったので、ヘルプ先の拠点長に話せそうなタイミングがあり相談しようかと思ったが、まずは自分の拠点の拠点長に話してみようと考えなおした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "業務で困ったら、よく話を聞いてくれる隣の拠点（部署）の上長に相談している。参考になることがたくさんある。", "l": 0}, {"t": "b", "x": "拠点内のルールに疑問を感じたため他拠点の先輩メンバーに相談したところ、先輩が所属する拠点のルールは納得できるものばかりだった。自分の拠点がダメな拠点にみえてきた。", "l": 0}, {"t": "h2", "x": "3-9. 最終決定権は上長が持っている"}, {"t": "p", "x": "何かを最終決定する権限はその組織において責任を持つ人（上長）にあります。"}, {"t": "p", "x": "みんなで話し合って何か物事を決定したとしても、その上長から責任が無くなることはありません。ですので、例えみんなで話し合ったことであっても、決定事項は全て責任者の責任ということです。"}, {"t": "p", "x": "部下の皆さんにおいては、上長が物事を決定するに当たって必要な情報や意見を伝えるようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点長不在時、当日のレク担当だったため同僚にレク内容や流れを説明したところ複数名から良し悪しの意見が発生してしまった。事前に拠点長から決定の承認をもらっていた内容だったので、皆の意見を取りまとめて、修正案を考え、再度拠点長に承認をお願いした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点長Aが部下数名に対して「パートナーBさんにはどんなリハビリが必要かな？」と尋ねた。さまざま意見が出てきて迷ったAは多数決で方針を決めた。責任者であるAが最終決定をすべきでは？と思ったが、意見してギクシャクするのも嫌だったので何も言わなかった。", "l": 0}, {"t": "b", "x": "拠点長不在時、当日のレク担当だったため同僚にレク内容や流れを説明したところ複数名から良し悪しの意見が発生し、事前に上長承認もらっていたレク内容が当日に変更になった。", "l": 0}, {"t": "h2", "x": "3-10. 上長に対する報告では、あいまいな言葉を使わない"}, {"t": "p", "x": "「順調」「まあまあ」「ときどき」「多い」「だいたい」などの曖昧な表現は、話し手と聞き手で受け取り方が変わってしまうことがあるため、使用しないようにしましょう。"}, {"t": "p", "x": "数字や時刻など、双方の解釈がわかれない表現を使って報告をしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から作業の進捗を聞かれたので、「指示のあった〇件の内、〇件が完了しています。」と答えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から作業の進捗状況を聞かれた際、とっさに「順調です」と回答をした。", "l": 0}, {"t": "p", "x": "順調と回答を受けた上長は近日中には納品されるだろうと解釈をした。"}, {"t": "b", "x": "パートナーＡの不穏になる頻度について上長に聞かれ、「結構多いです」と回答した。", "l": 0}, {"t": "h2", "x": "3-11. 質問に対して結論から話す"}, {"t": "p", "x": "質問をされたら、結論から答えましょう。"}, {"t": "p", "x": "例えば、「なぜ～ですか？」と聞かれたら、その理由を聞かれているので「～だからです」と回答しましょう。「いつ〇〇ですか？」と聞かれたら時刻や日付を回答しましょう。"}, {"t": "p", "x": "仕事においては、だらだらと意見を言ったり、過程を話すことは質問をしている側の効率を落とすことになってしまいます。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "「いつまでに終わりますか？」と聞かれたので、「１２時までに終わります。」と答えた。", "l": 0}, {"t": "b", "x": "「指示した〇〇は終わりましたか？」と聞かれたことに対し、指示を忘れてしまっていたことを思い出した。「〇〇と〇〇で忙しかった、、、」等話したくなってしまったが、まず、「終わっていません。」と答え、「忘れていたので、これから取り掛かり、１５時までに終わらせます。申し訳ございません。」と付け加えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "「いつまでに終わりますか？」と聞かれたことに対し、完了するまでの工程を話す中で別の話題に逸れてしまい、結論いつまでに終わるかは回答をしなかった。", "l": 0}, {"t": "b", "x": "上長からなぜこのような対応をしたのかと聞かれたことに対し、責められたと感じたため時系列で話し始めた。", "l": 0}, {"t": "b", "x": "「指示した○○は終わりましたか？」と聞かれたことに対し、怒られると思い、今やっていますと回答した。本来は終わったか終わっていないかを回答するのが正しい。", "l": 0}, {"t": "h2", "x": "3-12. 誰の責任かわからない仕事は上長に確認する"}, {"t": "p", "x": "誰の責任かわからない仕事は勝手にやらずに、上長に確認してから進めましょう。"}, {"t": "p", "x": "そうしないと、自分がいないときにその仕事が宙に浮いてしまうし、気づいた人だけがやる風土が生まれてしまうことがあるでしょう。"}, {"t": "p", "x": "気づいた人がやるということになると、気づいた人が損してしまうことになります。"}, {"t": "p", "x": "誰がやるのか、あいまいなまま進めず、上長に確認をしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "担当が決まっていない作業の一部の業務が終わっていないことに気づいたので、上長に誰が対応するべきか指示を仰いだ。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "担当が決まっていない締め作業の一部の業務が、終わっていないことに気づき、残業して終わらせた。", "l": 0}, {"t": "b", "x": "担当というわけではないが、以前から自身がやることが常態化しているためいつも実施をしている。", "l": 0}, {"t": "h2", "x": "3-13. 上長は忙しいものだと認識し、時間を奪わないように心がけること"}, {"t": "p", "x": "上長は組織の結果をだすことを求められている忙しい存在であることを認識し、時間をとるときは慎重にとるようにしましょう。"}, {"t": "p", "x": "部下としては、上長の時間を必要以上に奪わないように配慮をする必要があります。"}, {"t": "p", "x": "ただし、相談したいことがある場合には、遠慮しすぎることはありません。あらかじめ相談の時間を取ってもらえるように約束をしておくなどしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点内の人間関係に困りごとがあり、今すぐに拠点長に話したかったが、まず、いつなら時間を取ってもらえるか確認し、勤務後に相談の時間をとってもらった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点内の人間関係に困りごとがあり、勤務後に上長との面談時間をもらった。", "l": 0}, {"t": "p", "x": "課題やどうしてほしいのかを事前にまとめてなかったため話が長くなり思ったよりも時間がかかってしまった。"}, {"t": "b", "x": "上長の業務が落ち着いているように見えたため、業務に関係ないことについて話を振った。", "l": 0}, {"t": "h2", "x": "3-14. 信頼されている人ほど話を聞いてもらいやすい"}, {"t": "p", "x": "上長に対して何か意見を言うことはできるが、上長も信頼していない人の話はなかなか聞こうと思えないものです。"}, {"t": "p", "x": "どうしても「何を言っているか」よりも「誰が言っているか」に影響を受けてしまうものなのです。"}, {"t": "p", "x": "もちろん上長はそれでも、部下の話を平等に聞く必要があるし、そのようなマニュアルが存在はしていますが、部下としてはその状況に甘えてはいけません。"}, {"t": "p", "x": "意見を聞き入れてもらえなかったとしても、「嫌われているのかな」とか、「不平等だ」などと思わず、まず自身が職場で信頼される行動を積み重ね、上長に耳を傾けてもらいやすい環境を作ることを考えましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長に意見を言ったが聞き入れてもらえなかった。だからといって変わらず任せられた仕事を全うし、何かあればまた意見を伝えようと思う。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "所属拠点内のルールに納得いかず無視し、上長から注意を受けることが多々あった。", "l": 0}, {"t": "p", "x": "自身で新しいルールを作り提案をすることもあるが上長からは承諾をもらえない。"}, {"t": "p", "x": "自身が遅刻や無断欠勤を繰り返していた時期、上長は自分の意見は聞かないが、同僚の意見はよく聞いているように感じた。上長は平等に意見を聞くべきなのにおかしい。"}, {"t": "h2", "x": "3-15. 誰かに意見をするときは、言い方に気を付ける"}, {"t": "p", "x": "誰かに何か意見や質問をする際に、言い方（伝え方）には十分気をつけましょう。"}, {"t": "p", "x": "相手も人なので、失礼な言い方や冷たい言い方をされたら、感情的にならずに対応していたとしても、内心思うところはあるものです。"}, {"t": "p", "x": "気持ちよく会話をするうえで、丁寧な会話を心掛けましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長の方針に納得がいかなかったため、つい感情的に言いかえしたくなってしまったが、上長にも考えがあって決めたことだろうと思い直し、どのような背景があって決めたことなのかを教えてもらえないか、と相談してみることにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "同僚Aさんの支援方法に違和感を感じたため、つい感情的になり「なんでこういうやり方をするんですか」と大きな声で問い詰めてしまった。", "l": 0}, {"t": "b", "x": "上長の方針に納得がいかなかったため、論理的にまくしたてるように思っていることを伝えた。ただ論破したような感じになった。", "l": 0}, {"t": "h2", "x": "3-16. 凡事（当たり前のこと）を徹底してやること"}, {"t": "p", "x": "ルールを守る、時間を守る、挨拶をする、期限を守る、約束を守る、返事をする、など当たり前のこと（凡事）を徹底しましょう。"}, {"t": "p", "x": "信頼は特別なことではなく、当たり前のことを積み重ねることで生まれます。信頼を失うのも凡事が徹底できていないときです。"}, {"t": "p", "x": "周囲の信頼を得て、自身が仕事をしやすい状況を作るためにも凡事は徹底しましょう。日頃、信頼を積み重ねる行動を徹底して行いましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "入社したばかりで支援スキルの面ではまだ周りのメンバーに頼ってばかりだが、自分のできることを一生懸命やっていたところ、頼ってもらえるようになってきた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "慣れ親しんだメンバーなので許してくれるだろうと思い、飲み会の次の日に二日酔いで遅刻した。", "l": 0}, {"t": "h2", "x": "3-17. 対立する議論を文書でしない（意見が対立した時は口頭で話す）"}, {"t": "p", "x": "業務の連絡や報告は、言った・言わないを防ぐために文書（チャットなど）に残すことが基本ですが、意見が対立したり議論になったりした場合は、文書でのやり取りをストップし、口頭（対面や電話など）で話すようにしましょう。"}, {"t": "p", "x": "文書で自分の意見を書き続けていると、「確証性バイアス」（自分の考えが正しいと思い込み、それに合う情報ばかりを集めてしまう心理）が強く働き、相手の意見を受け入れづらくなってしまうものです。文字を打っているうちに自分の中で正当化が進み、結果として平行線をたどったり、感情的な衝突を生んだりするデメリットしかありません。"}, {"t": "p", "x": "文字だけでは細かいニュアンスや感情が伝わりにくいため、議論になりそうな時は直接話して理解し合い、解決を図りましょう。（※口頭で話し合って決定した内容は、後から認識のズレが出ないように改めて文書に残しておきましょう。）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "チャットで業務の進め方について同僚と意見が分かれ、長文のやり取りになりそうだった。これ以上文字で打つと意地になってしまいそうだったので、「一度直接話しませんか？」と声をかけ、口頭で話して数分で解決した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "チャット上で他部署のメンバーから自分の業務に対する指摘が入り、納得がいかなかったため、長文で反論を書き送った。相手からもさらに長い反論が返ってきて、お互いに引けなくなり、険悪な雰囲気のまま業務が停滞してしまった。", "l": 0}, {"t": "h2", "x": "3-18. 上長からの指示に対し「それは私の仕事ではない」と拒否しない"}, {"t": "p", "x": "上長から業務指示を受けた際、「それは私の仕事（担当）ではありません」と自身の役割を限定し、拒否してはいけません。"}, {"t": "p", "x": "エフィラグループでは、役割が分かれていることで「自分の担当だけをやっておけばいい」「他の部署のせいだ」と責任を回避する“大企業病”を良しとしません。また、組織において責任を負っている上長の発言は「依頼」ではなく「指示」であり、メンバーはそれに従う必要があります。"}, {"t": "p", "x": "チームの目標達成のために上長が必要と判断して指示した業務です。上長からの指示には前向きに取り組みましょう。また、たとえ評価項目の中にその業務がなくても、指示された以上は自分の役割"}, {"t": "p", "x": "と考え、責任をもって実施しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から、本来の自分の担当外の業務を指示されたが、チームの目標達成に必要な業務であると理解し、自身の業務の調整を行ったうえで実行した。", "l": 0}, {"t": "b", "x": "上長から新しい業務の指示を受けた際、現在自分の担当業務が逼迫しており対応が難しかったため、「それは私の仕事ではない」と突き放すのではなく、「現在は〇〇の業務で手一杯のため、〇日以降であれば対応可能ですがいかがでしょうか」と状況を丁寧に説明し、上長の指示（判断）を仰いだ。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から急ぎの雑務を指示されたが、手の空いている状態だったにも関わらず「それは私の担当業務ではないのでやりません」と断り、指示に従わなかった。", "l": 0}, {"t": "b", "x": "上長から他部署のサポートに入るよう指示されたが、「自分の部署の仕事ではないから」と責任を回避し、指示を拒否した。", "l": 0}], "subsections": ["3-1. あいまいな指示をそのままにしない", "3-2. 曖昧（あいまい）な状況に耐え、行動する（曖昧耐性）", "3-3. 「わからないから動かない」をしない", "3-4. 「やる気がでないからやらない」をしない", "3-5. 「納得してから動く」はNG", "3-6. 疑念があったら、上長に確認すること", "3-7. 直属の上長の指示だけを聞き入れる", "3-8. 他部署の上長や先輩には仕事の相談はしない", "3-9. 最終決定権は上長が持っている", "3-10. 上長に対する報告では、あいまいな言葉を使わない", "3-11. 質問に対して結論から話す", "3-12. 誰の責任かわからない仕事は上長に確認する", "3-13. 上長は忙しいものだと認識し、時間を奪わないように心がけること", "3-14. 信頼されている人ほど話を聞いてもらいやすい", "3-15. 誰かに意見をするときは、言い方に気を付ける", "3-16. 凡事（当たり前のこと）を徹底してやること", "3-17. 対立する議論を文書でしない（意見が対立した時は口頭で話す）", "3-18. 上長からの指示に対し「それは私の仕事ではない」と拒否しない"], "text": "3-1. あいまいな指示をそのままにしない あいまいな指示は、上長と部下の認識の違いを生み出し、結果として組織の生産性が低くなってしまうことにつながります。 上長からの指示があいまい、不明瞭な場合には、明確な指示を仰ぎましょう。もし上長が求めるものと異なることをしてしまった場合に、手戻りが発生し、業務スピードが落ちてしまうことにつながります。 ※「明確な指示」とは「いつまでに」「どの状態か」について、お互いの認識のずれがないものを言います。（○月○日までに○が完了している状態など） 「〜をできるようにする」などでもいいのですが、できるできないという状態の目標設定だとお互いの認識がズレてしまっていることが多いので、その状態がお互いの認識とずれないように設定する必要があります。 例（NGパターン） ○月末日までに請求業務をできるようになる →× 何をもってできるといえるのかがあいまいです。できる、の認識が上長と部下で違うことがあります。 例（OKパターン） ○月○日までに入浴介助が一人でできるようになり上長からOKをもらっている状態にする（できているかどうかの判断は上長が行う） →○ 理想ではないですが、最低限判断が本人ではなく上長になるので設定の仕方としてはOKです。 よくあるOK事例 上長から「２日後のイベントでつかう物の買い出し」を指示された。何をどのくらい買い出しにいったらいいのかわからなかったので、過去の同一イベントで使用した買い出しリストを調べ、「こちらのリストのものを買ってくればよろしいでしょうか。」と確認した。 よくあるNG事例 上長から「なるべく早めに、この荷物を移動させておいて」と指示された。いつまでに、どこへ移動させなければならないのかよくわからなかったので、とりあえず当日中にA室へ移動させてから帰宅した。翌日、荷物は当日中にB室へ移動させなければならなかったものと発覚し、その後のイベントの開始が遅れてしまった。 上長から「このリストを良い感じに見やすくしといて」と指示された。リスト内の必要か不明な項目を省き項目数を減らすことで見やすくし、上長へ提出をした。ところが、上長は項目は減らさずにレイアウトを変更することで見やすくなることを望んでおり、再度認識合わせから始めることとなった。 3-2. 曖昧（あいまい）な状況に耐え、行動する（曖昧耐性） 3-1にはあいまいな指示をそのままにしない、とありますが、仕事において、すべてが明瞭になっていたり、完全に納得できるものであるとは限りません。 ルールや指示は可能な限り明確にすることを目指していますが、現実の業務や新しい取り組みにおいては、どうしても明瞭にしきれない「曖昧な状況」が必ず発生します。 「すべてが明確にならないと動けない」「正解がわからないからできない」と行動を止めるのではなく、100%の正解がない状況であっても、その曖昧さに耐え、自分なりに考えて行動できる「曖昧耐性」を持ちましょう。 よくあるOK事例 新しい業務でマニュアルに書かれていない事象が発生したが、これまでの経験と会社の価値観（エフィラウェイ）に照らし合わせて自分なりに判断して対応し、事後で上長に報告・確認した。 よくあるNG事例 指示された作業の手順に一部不明瞭な点があったため、「明確な指示がないからできない」と判断し、指示が来るまで作業をストップして何もしなかった。 3-3. 「わからないから動かない」をしない 何をしたらいいかわからない、具体的にどう動けばよいかわからないときは、まずはわかるための行動をとりましょう。仕事として任されている以上、「わからないからやらなくていい」「仕方ないよね」ということにはなりません。 自分で調べたり、上長に聞くなりし、できるようになるところまで含めて自身の責任であると考え、行動を起こしましょう。対価が発生しているプロである以上、「教えてくれないからできません」は通用しないものと考えて自分から動きましょう。 よくあるOK事例 上長から新しい業務の指示を受けたが、教わったことがない業務だった。「教わったことのない業務なので本日教えていただけますか。」と確認したところ、上長は教えた業務を指示したと勘違いしていたようで、改めて教わり、無事業務を完了することができた。 よくあるNG事例 上長から新しい業務の指示を受けたが、マニュアルも渡されておらずどう動いていいかわからなかったため、後日詳細な指示がくるのを待って何もしなかった。 今月から新たに拠点長に就任した。拠点長および管理職としての役割に関する説明はとくになかったので、とりあえず直近の上長（拠点長）がやっていたことを思い出しながら行動した。後日、拠点長業務やマネジメントマニュアルがイントラにすべて掲載されていることに気づいたが、自身がやっていたことは間違っていた。 3-4. 「やる気がでないからやらない」をしない やる気がでなかったとしても、仕事として任されている以上、当然のことながら「やる気が出ないからやらなくていい」「仕方ないよね」ということにはなりません。 「やる気があるから行動するのではなく、行動するからやる気が出る」ということは心理学的にも証明されていることですので、まずは小さな行動からでも起こしてみる、ということをしてみましょう。 よくあるOK事例 上長から新しい業務の指示を受けたが、あまり好きなことではなかったのでやる気が出なかった。とはいえ仕事なので、最初の手順だけでもやってみようと思ってやり始めたところ、意外とすんなり進めることができ、無事業務を完了することができた。 よくあるNG事例 上長から新しい業務の指示を受けたが、あまり好きなことではなかったのでやる気が出なかった。やるのを先延ばしにしていたら、対応期日が来てしまった。 3-5. 「納得してから動く」はNG 上長が、ひとりひとりが納得するまで説明しようとすると、説得に時間を要したり、それぞれの考えとの違いをすり合わせないといけないなど、膨大な時間を要し、組織運営上の弊害が起きてしまう場合があります。さらに納得しなければ動かなくてもいいのであれば、ずっと納得しないから動かないという理屈がまかり通ってしまうことになります。 納得できなくても上長の責任のもと実施することになった以上、決定事項はまずやってみましょう。 また、経験してみたら考え方が変わることもあります。やってみたら気づくこともあります。腹落ちしなくともまずやってみて、それで違うと思ったら上長に報告をしましょう。納得する、しないではなく、まずは行動して経験してみてから上長へ意見を伝えましょう。 よくあるOK事例 上長からの指示に対して、自分がやる意味があるのかわからなかったが、やってみたところ、拠点内の業務が円滑に進むようになったので、やってよかったと思った。 上長からの指示に対して、納得できなかったがまずやってみようと実施したところ、良い結果は得られなかった。その結果を上長に報告したところ、今回の反省を踏まえて改善し、今までやったことのないような新しい策を実施することとなり、今度は良い結果を出すことができた。 よくあるNG事例 上長からの指示に対して、自分がやる意味があるのかわからない、と思った。納得するまで何度も説明を求めたが、まだ腹落ちしていないので業務にも着手していない。 納得したうえで指示内容を遂行すべきだと思うため、納得がいってない業務内容については必ず上長へ説明を求め、納得してから進めるようにしている。 3-6. 疑念があったら、上長に確認すること 「本当に上長の言う通りで正しいのか」「あの人はどうしてあんな行動をしたのだろう」 こういった疑念を感じたら、直ちにその原因である疑念の発生元に確認し、疑念を解消しましょう。 ひとりで悩み続けることは集中力を下げ、仕事のとりかかりも遅れてロスタイムを生んでしまうことでしょう。 ただし、疑念が残っていたから業務をやらなくていい、ということにはなりません。疑念が上長に確認しても解消できなかった、という場合でも、まずは行動にうつしてみましょう。 ※疑念は必ずしも解消されるとは限らないが、解消のための行動はしましょうという趣旨です。 よくあるOK事例 いつも拠点内の慣習でやっていた業務の効率を上げられる方法を思いついたので、上長に「こうしたらもっと効率が上がるのではないでしょうか。」と提案した。 上長の方針について、納得できず疑念があったのでもやもやしていた。もやもやしたままにしているのは良くないと思い、上長に時間をもらい理由を聞いたところ納得でき、自身の仕事に集中できるようになった。 よくあるNG事例 何となくいつも自分がやっているこの仕事。いつの間にか自分の役割のようになっているが、釈然としない想いがある。上長に確認するのも今さらなので、もやもやしながらもやり続けている。 新しいパートナーに対する支援について、上長の方針に疑問を感じるところがある。ただ、上長の方針に従わないと何か言われるので、そのままにしておこう。 3-7. 直属の上長の指示だけを聞き入れる 部下は、直属の上長の指示だけを聞き入れましょう。 同僚などの並列関係や、他部署の先輩、他部署の拠点長に指示をしてはいけないし、そのような方たちに指示をされることがあったとしても聞き入れる必要はありません。なぜなら、それらの方たちはその指示によって起こった結果について責任をとる立場にないためです。部下の皆さんにとっては、直属の上司が結果の責任をとる立場なので、直属の上司の指示に従いましょう。 同僚も、資格を持っているからといって他のメンバーに対して指示ができるわけではありません。仕事の指示や判断をする権限があるのは、その組織の結果に対して責任を負う上長のみである、ということを理解しておきましょう。 たとえ上長が指示した業務分担が不適切だと思ってもメンバー同士で直接業務の担当を変更することはできません。必要な場合は必ず上長に相談して指示を仰ぎましょう。 ※責任がない人の指示を聞かないという趣旨のため、上長の上長や、本部の指示は例外として、聞かないといけません。 ※上長が今日はこの人の指示を聞いてください、と指定された人（同僚など）の指示は聞かないといけません。（上長から責任を与えられている人の指示は聞く必要があるためです） ※ヘルプの場合は、直属の上長ではないですが、その日の現場の運営における指示はヘルプ先の責任者の指示を聞いて動きましょう。（ヘルプ先の運営の責任はヘルプ先の責任者にあるためです） よくあるOK事例 今日は拠点長が休みなので、先輩メンバーAの指示に従って業務を行うように拠点長から指示があった。そのため、先輩メンバーAの指示にしたがって１日とおして業務を行った。 よくあるNG事例 先輩メンバーからこれはあなたがやるべきだと、指示が来た。先輩でもあるので、自分の役割ではないと想いながらも実行した。 拠点長がいないところで、サビ管から計画書作成のための業務を振られた。業務知識はサビ管の方があるため、素直に従った 3-8. 他部署の上長や先輩には仕事の相談はしない 他部署の上長や先輩は、あなたの成長や組織の結果に責任はないため、無責任にアドバイスができてしまう立場にあります。 相談にのってしまう他部署の上長や先輩は、より多くのメンバーから気に入られたいという心理が働いていることもあるかもしれません。相談にのる上長はその部下へのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、上位層に言われると、他部署の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。 そのアドバイスに対して、あなたは「確かに、その通り」などと思ってしまい、上長に対しての信頼を失ってしまうこともあるでしょう。上長は常に責任のある中で判断をしていたりするため、所属しているメンバーに対して一見すると優しくない決定などもしているかもしれないが、それは責任がある故の判断であり、他部署の上長や拠点長にはわからないことです。 ※本部の定着支援課やメンターに相談することは問題ありません。 ※セクハラ/パワハラ/不正/明らかなルール違反の場合も、例外です。その際は事実情報を、職場相談窓口などの社内窓口に通報しましょう。 よくあるOK事例 仕事の進め方について悩みがあったので、ヘルプ先の拠点長に話せそうなタイミングがあり相談しようかと思ったが、まずは自分の拠点の拠点長に話してみようと考えなおした。 よくあるNG事例 業務で困ったら、よく話を聞いてくれる隣の拠点（部署）の上長に相談している。参考になることがたくさんある。 拠点内のルールに疑問を感じたため他拠点の先輩メンバーに相談したところ、先輩が所属する拠点のルールは納得できるものばかりだった。自分の拠点がダメな拠点にみえてきた。 3-9. 最終決定権は上長が持っている 何かを最終決定する権限はその組織において責任を持つ人（上長）にあります。 みんなで話し合って何か物事を決定したとしても、その上長から責任が無くなることはありません。ですので、例えみんなで話し合ったことであっても、決定事項は全て責任者の責任ということです。 部下の皆さんにおいては、上長が物事を決定するに当たって必要な情報や意見を伝えるようにしましょう。 よくあるOK事例 拠点長不在時、当日のレク担当だったため同僚にレク内容や流れを説明したところ複数名から良し悪しの意見が発生してしまった。事前に拠点長から決定の承認をもらっていた内容だったので、皆の意見を取りまとめて、修正案を考え、再度拠点長に承認をお願いした。 よくあるNG事例 拠点長Aが部下数名に対して「パートナーBさんにはどんなリハビリが必要かな？」と尋ねた。さまざま意見が出てきて迷ったAは多数決で方針を決めた。責任者であるAが最終決定をすべきでは？と思ったが、意見してギクシャクするのも嫌だったので何も言わなかった。 拠点長不在時、当日のレク担当だったため同僚にレク内容や流れを説明したところ複数名から良し悪しの意見が発生し、事前に上長承認もらっていたレク内容が当日に変更になった。 3-10. 上長に対する報告では、あいまいな言葉を使わない 「順調」「まあまあ」「ときどき」「多い」「だいたい」などの曖昧な表現は、話し手と聞き手で受け取り方が変わってしまうことがあるため、使用しないようにしましょう。 数字や時刻など、双方の解釈がわかれない表現を使って報告をしましょう。 よくあるOK事例 上長から作業の進捗を聞かれたので、「指示のあった〇件の内、〇件が完了しています。」と答えた。 よくあるNG事例 上長から作業の進捗状況を聞かれた際、とっさに「順調です」と回答をした。 順調と回答を受けた上長は近日中には納品されるだろうと解釈をした。 パートナーＡの不穏になる頻度について上長に聞かれ、「結構多いです」と回答した。 3-11. 質問に対して結論から話す 質問をされたら、結論から答えましょう。 例えば、「なぜ～ですか？」と聞かれたら、その理由を聞かれているので「～だからです」と回答しましょう。「いつ〇〇ですか？」と聞かれたら時刻や日付を回答しましょう。 仕事においては、だらだらと意見を言ったり、過程を話すことは質問をしている側の効率を落とすことになってしまいます。 よくあるOK事例 「いつまでに終わりますか？」と聞かれたので、「１２時までに終わります。」と答えた。 「指示した〇〇は終わりましたか？」と聞かれたことに対し、指示を忘れてしまっていたことを思い出した。「〇〇と〇〇で忙しかった、、、」等話したくなってしまったが、まず、「終わっていません。」と答え、「忘れていたので、これから取り掛かり、１５時までに終わらせます。申し訳ございません。」と付け加えた。 よくあるNG事例 「いつまでに終わりますか？」と聞かれたことに対し、完了するまでの工程を話す中で別の話題に逸れてしまい、結論いつまでに終わるかは回答をしなかった。 上長からなぜこのような対応をしたのかと聞かれたことに対し、責められたと感じたため時系列で話し始めた。 「指示した○○は終わりましたか？」と聞かれたことに対し、怒られると思い、今やっていますと回答した。本来は終わったか終わっていないかを回答するのが正しい。 3-12. 誰の責任かわからない仕事は上長に確認する 誰の責任かわからない仕事は勝手にやらずに、上長に確認してから進めましょう。 そうしないと、自分がいないときにその仕事が宙に浮いてしまうし、気づいた人だけがやる風土が生まれてしまうことがあるでしょう。 気づいた人がやるということになると、気づいた人が損してしまうことになります。 誰がやるのか、あいまいなまま進めず、上長に確認をしましょう。 よくあるOK事例 担当が決まっていない作業の一部の業務が終わっていないことに気づいたので、上長に誰が対応するべきか指示を仰いだ。 よくあるNG事例 担当が決まっていない締め作業の一部の業務が、終わっていないことに気づき、残業して終わらせた。 担当というわけではないが、以前から自身がやることが常態化しているためいつも実施をしている。 3-13. 上長は忙しいものだと認識し、時間を奪わないように心がけること 上長は組織の結果をだすことを求められている忙しい存在であることを認識し、時間をとるときは慎重にとるようにしましょう。 部下としては、上長の時間を必要以上に奪わないように配慮をする必要があります。 ただし、相談したいことがある場合には、遠慮しすぎることはありません。あらかじめ相談の時間を取ってもらえるように約束をしておくなどしましょう。 よくあるOK事例 拠点内の人間関係に困りごとがあり、今すぐに拠点長に話したかったが、まず、いつなら時間を取ってもらえるか確認し、勤務後に相談の時間をとってもらった。 よくあるNG事例 拠点内の人間関係に困りごとがあり、勤務後に上長との面談時間をもらった。 課題やどうしてほしいのかを事前にまとめてなかったため話が長くなり思ったよりも時間がかかってしまった。 上長の業務が落ち着いているように見えたため、業務に関係ないことについて話を振った。 3-14. 信頼されている人ほど話を聞いてもらいやすい 上長に対して何か意見を言うことはできるが、上長も信頼していない人の話はなかなか聞こうと思えないものです。 どうしても「何を言っているか」よりも「誰が言っているか」に影響を受けてしまうものなのです。 もちろん上長はそれでも、部下の話を平等に聞く必要があるし、そのようなマニュアルが存在はしていますが、部下としてはその状況に甘えてはいけません。 意見を聞き入れてもらえなかったとしても、「嫌われているのかな」とか、「不平等だ」などと思わず、まず自身が職場で信頼される行動を積み重ね、上長に耳を傾けてもらいやすい環境を作ることを考えましょう。 よくあるOK事例 上長に意見を言ったが聞き入れてもらえなかった。だからといって変わらず任せられた仕事を全うし、何かあればまた意見を伝えようと思う。 よくあるNG事例 所属拠点内のルールに納得いかず無視し、上長から注意を受けることが多々あった。 自身で新しいルールを作り提案をすることもあるが上長からは承諾をもらえない。 自身が遅刻や無断欠勤を繰り返していた時期、上長は自分の意見は聞かないが、同僚の意見はよく聞いているように感じた。上長は平等に意見を聞くべきなのにおかしい。 3-15. 誰かに意見をするときは、言い方に気を付ける 誰かに何か意見や質問をする際に、言い方（伝え方）には十分気をつけましょう。 相手も人なので、失礼な言い方や冷たい言い方をされたら、感情的にならずに対応していたとしても、内心思うところはあるものです。 気持ちよく会話をするうえで、丁寧な会話を心掛けましょう。 よくあるOK事例 上長の方針に納得がいかなかったため、つい感情的に言いかえしたくなってしまったが、上長にも考えがあって決めたことだろうと思い直し、どのような背景があって決めたことなのかを教えてもらえないか、と相談してみることにした。 よくあるNG事例 同僚Aさんの支援方法に違和感を感じたため、つい感情的になり「なんでこういうやり方をするんですか」と大きな声で問い詰めてしまった。 上長の方針に納得がいかなかったため、論理的にまくしたてるように思っていることを伝えた。ただ論破したような感じになった。 3-16. 凡事（当たり前のこと）を徹底してやること ルールを守る、時間を守る、挨拶をする、期限を守る、約束を守る、返事をする、など当たり前のこと（凡事）を徹底しましょう。 信頼は特別なことではなく、当たり前のことを積み重ねることで生まれます。信頼を失うのも凡事が徹底できていないときです。 周囲の信頼を得て、自身が仕事をしやすい状況を作るためにも凡事は徹底しましょう。日頃、信頼を積み重ねる行動を徹底して行いましょう。 よくあるOK事例 入社したばかりで支援スキルの面ではまだ周りのメンバーに頼ってばかりだが、自分のできることを一生懸命やっていたところ、頼ってもらえるようになってきた。 よくあるNG事例 慣れ親しんだメンバーなので許してくれるだろうと思い、飲み会の次の日に二日酔いで遅刻した。 3-17. 対立する議論を文書でしない（意見が対立した時は口頭で話す） 業務の連絡や報告は、言った・言わないを防ぐために文書（チャットなど）に残すことが基本ですが、意見が対立したり議論になったりした場合は、文書でのやり取りをストップし、口頭（対面や電話など）で話すようにしましょう。 文書で自分の意見を書き続けていると、「確証性バイアス」（自分の考えが正しいと思い込み、それに合う情報ばかりを集めてしまう心理）が強く働き、相手の意見を受け入れづらくなってしまうものです。文字を打っているうちに自分の中で正当化が進み、結果として平行線をたどったり、感情的な衝突を生んだりするデメリットしかありません。 文字だけでは細かいニュアンスや感情が伝わりにくいため、議論になりそうな時は直接話して理解し合い、解決を図りましょう。（※口頭で話し合って決定した内容は、後から認識のズレが出ないように改めて文書に残しておきましょう。） よくあるOK事例 チャットで業務の進め方について同僚と意見が分かれ、長文のやり取りになりそうだった。これ以上文字で打つと意地になってしまいそうだったので、「一度直接話しませんか？」と声をかけ、口頭で話して数分で解決した。 よくあるNG事例 チャット上で他部署のメンバーから自分の業務に対する指摘が入り、納得がいかなかったため、長文で反論を書き送った。相手からもさらに長い反論が返ってきて、お互いに引けなくなり、険悪な雰囲気のまま業務が停滞してしまった。 3-18. 上長からの指示に対し「それは私の仕事ではない」と拒否しない 上長から業務指示を受けた際、「それは私の仕事（担当）ではありません」と自身の役割を限定し、拒否してはいけません。 エフィラグループでは、役割が分かれていることで「自分の担当だけをやっておけばいい」「他の部署のせいだ」と責任を回避する“大企業病”を良しとしません。また、組織において責任を負っている上長の発言は「依頼」ではなく「指示」であり、メンバーはそれに従う必要があります。 チームの目標達成のために上長が必要と判断して指示した業務です。上長からの指示には前向きに取り組みましょう。また、たとえ評価項目の中にその業務がなくても、指示された以上は自分の役割 と考え、責任をもって実施しましょう。 よくあるOK事例 上長から、本来の自分の担当外の業務を指示されたが、チームの目標達成に必要な業務であると理解し、自身の業務の調整を行ったうえで実行した。 上長から新しい業務の指示を受けた際、現在自分の担当業務が逼迫しており対応が難しかったため、「それは私の仕事ではない」と突き放すのではなく、「現在は〇〇の業務で手一杯のため、〇日以降であれば対応可能ですがいかがでしょうか」と状況を丁寧に説明し、上長の指示（判断）を仰いだ。 よくあるNG事例 上長から急ぎの雑務を指示されたが、手の空いている状態だったにも関わらず「それは私の担当業務ではないのでやりません」と断り、指示に従わなかった。 上長から他部署のサポートに入るよう指示されたが、「自分の部署の仕事ではないから」と責任を回避し、指示を拒否した。"}, {"title": "4. 同僚との関係", "blocks": [{"t": "h2", "x": "4-1. メンバーには敬意をもって接する"}, {"t": "p", "x": "上長に対しても、同僚に対しても、それが自身より後に入社したメンバーや、自身より年下であっても、敬意をもって礼儀正しく接すること。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新人メンバーAは自分より１０才も年下だが、他の同僚と同様に、一人の人として礼儀正しく接するようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "新人メンバーAは自分より社歴が浅いので、自身の仕事の邪魔になると思い、ぞんざいに扱った。", "l": 0}, {"t": "h2", "x": "4-2. 誰に対しても敬意と謙虚さを持つ"}, {"t": "p", "x": "組織における役職や等級、雇用形態（社員・パート）、所属部署（本部・現場）の違いは、ミッション達成のための「役割と責任」の違いに過ぎず、人間としての優劣を示すものではありません。 そのため、「正社員だから」「本部だから」「長くいるから」と自身が優れていると錯覚し、他者を見下したり偉そうに接したりしてはいけません。自分にはできない役割を担ってくれている他者に対し、常に敬意と感謝を持ちましょう。"}, {"t": "p", "x": "また、エフィラが地域で影響力を持つ会社に成長したとしても、「我々は特別な存在である」と勘違いしてはいけません。リーディングカンパニーの一員として、誰よりも腰が低く、感じが良い存在であることを心がけましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "自分は正社員で社歴も長いが、新しく入ったパートメンバーに対しても、自分にはできない役割を担ってくれていることに感謝し、フラットに敬語で丁寧に接している。", "l": 0}, {"t": "b", "x": "地域の他法人のスタッフや関係機関の方に対して、会社の看板に驕ることなく、常に謙虚で感じよく挨拶をしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自分が現場の最前線で稼いでいるという自負から、間接部門（本部など）のメンバーに対して「現場のことも知らないくせに」と見下した態度をとってしまった。", "l": 0}, {"t": "b", "x": "エフィラが地域で有名な会社になってきたため、求職者や他社の人に対して「自分たちは特別な会社で働いているんだ」と横柄な態度で接してしまった。", "l": 0}, {"t": "h2", "x": "4-3. 上長・同僚に対して、感情的にならない"}, {"t": "p", "x": "上長や同僚に対して、感情的に怒ったり、罵倒したりすることは組織の和を乱すことにつながります。周囲も気をつかって行動しないといけなくなります。"}, {"t": "p", "x": "メンバーは、本来は顧客への対応に集中すべきなのに、感情的になっている同僚に気をとられてしまうことでしょう。それでは本来大切にすべき顧客対応がおろそかになるし、組織としての仕事の質が落ちてしまうことにつながるでしょう。"}, {"t": "p", "x": "感情的になることを抑えて仕事をしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "同僚Aに対し、支援方法の相違で意見が食い違い、苛立ちを感じたが、自分が不愉快であることは目の前にいるパートナーや一緒に働くメンバーには関係のないことなので、いつもどおり仕事をした。支援方法については、後ほど上長に相談して指示を仰ぐことにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長が間違ったことをしているように感じたため正義感からか、上長に対して激怒してしまった。", "l": 0}, {"t": "b", "x": "同僚Aに対し、支援方法の相違で意見が食い違い、苛立ちを感じた。", "l": 0}, {"t": "p", "x": "その後も感情を抑えられないままイライラした態度で業務を行った。"}, {"t": "h2", "x": "4-4. 「ベテラン」かどうかは関係ない"}, {"t": "p", "x": "組織内の人と人との位置関係は役割や役職によって決まります。個人の経験値や経歴は関係ありませんし、ベテランだから等は関係ありません。"}, {"t": "p", "x": "組織に対しての責任を持つ上長の指示に対しては、いくらあなたがベテランでも従わないといけません。"}, {"t": "p", "x": "また、ベテランだからといって他のメンバーとは違う特権があることなどはないので、経験値や経歴に関係なく、全員が謙虚に仕事に向き合っていきましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "自分は拠点長より社歴が長く拠点のことは誰よりもわかっている自負はあるが、拠点で起こることの責任を取るのは拠点長なので、指示には従い、拠点長が何か決定するために必要な情報は積極的に伝えるようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点長は無資格で経歴も自分より浅いので、指示をされても聞く気にならない。", "l": 0}, {"t": "b", "x": "並列の関係であるベテランのメンバーから、「今日中に書類の整理をしておいて」と指示された。経歴も長く拠点業務のことは一番把握している方なので、上長では無いけれど指示を聞いた。", "l": 0}, {"t": "h2", "x": "4-5. 偉そうな態度をとってはいけない"}, {"t": "p", "x": "他のメンバーに対して、威張った態度・発言、無視する、武勇伝を語る、説教するなど、偉そうな態度をとらないようにしましょう。横柄にしないようにしましょう。仮に相手よりも経験があったり、年齢が上だったりしても、一緒に働くメンバーには丁寧に接しましょう。"}, {"t": "p", "x": "「お局」や「経験が長いことや知識の多さを偉そうに語る人」がいるところで働きたい人などいないでしょう。指摘や意見を伝える際には、口調や言葉選びに注意しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新入メンバーの教育担当に任命された。新入メンバーと接する時は、横柄な態度になってしまっていないか注意しながら、アドバイスや指導をするように気を付けている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "今の若い人は甘えている人が多いので、刺激を与えるために自分が若い頃どれだけ働いていたか、苦労したかについて語った。", "l": 0}, {"t": "b", "x": "自分がこの拠点で一番古株なので、新人からまずは挨拶すべきだと思っている。", "l": 0}, {"t": "h2", "x": "4-6. 何かしてもらったら「ありがとう」を伝える"}, {"t": "p", "x": "感謝していることは言葉に出さないと伝わらないもの。ありがとうの感謝を伝えるから、お互い気持ちよく仕事ができるものです。"}, {"t": "p", "x": "やってもらったら、それが当然のことと思っていても、「ありがとう」を伝えましょう。伝えるべきか迷ったら「ありがとう」というようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "いつも困った時に積極的に手を貸してくれる同僚がいる。いつものことで改めて伝えるのは恥ずかしかったが、「いつもありがとうございます」と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "人の手が必要となったとき同僚が真っ先に手を貸してくれた。仕事だから当たり前だと思い感謝の言葉は伝えなかった。", "l": 0}, {"t": "b", "x": "レクのために事前準備をしていた際、同僚が物を運ぶのを手伝ってくれた。", "l": 0}, {"t": "p", "x": "前から気が合わない同僚だったためありがとうと伝えなかった。"}, {"t": "h2", "x": "4-7. 自分の「常識」が他人の常識とは限らない"}, {"t": "p", "x": "自分がこれは当然と思っていることでも、それが他人や会社からして当然なのかどうかというとわかりません。"}, {"t": "p", "x": "育ってきた文化や環境が違えば、当たり前も違うものです。アフリカで育った人の文化と日本で育った人の文化は異なるため、常識も違います。どちらが正しいとかの問題ではありません"}, {"t": "p", "x": "自分の「常識」と違うからおかしい、「普通はこうあるべき」という考えをしていては、平行線をたどるため、相手にとっての常識をまず知ることから始めましょう。"}, {"t": "p", "x": "相手が会社である場合、会社のルールが会社の常識です。自身の常識と違っていても従いましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新入メンバーが派手なアクセサリーを付けて出勤してきた。仕事に来ているのに、社会人としてどうなのか、と思ってしまったが、業務時間中はルールに従ってきちんとアクセサリーを外して支援しているし、勤務時間外のおしゃれは個人の自由でいいのだと考えなおした。", "l": 0}, {"t": "b", "x": "研修中におしゃべりをしているメンバーがいて、良くないと思ったが、自分の常識と他人の常識が違うのかもしれないので、上長に報告し判断をゆだねた。", "l": 0}, {"t": "b", "x": "会社の身だしなみルールは厳しすぎておかしい、と思ったが、ルールをよく読み、いろいろな価値観や年齢の方から見て違和感を感じない身だしなみを目指しているから必要なことなのだと理解するようにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "遅刻したら本来全員に謝罪をするべきだと思うがしない人がいた。ルールにはなかったが、本人に対してしかりつけた。", "l": 0}, {"t": "b", "x": "「普通」新しいことを教わったらメモを取るものだと思うが、新人でしていない人がいる。その人を仕事ができない人だと認定した。", "l": 0}, {"t": "h2", "x": "4-8. 不機嫌な表情をしないこと"}, {"t": "p", "x": "常に笑顔でいることはできないかもしれないが、不機嫌な表情は出さないようにしましょう。それぞれのメンバーが機嫌がよくないときもあるかもしれないが、それを表情に出さないことはできるはずです。"}, {"t": "p", "x": "同僚や顧客は不機嫌な顔をしている人と一緒にいたいとは思わなくなるでしょう。"}, {"t": "p", "x": "自身をコントロールし、たとえ機嫌が悪くても表情には出さないようしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "プライベートで嫌なことがあって機嫌が悪いが、仕事中はパートナーや職場の皆には関係のないことだし、心配をかけないよう、極力普段どおりにふるまった。", "l": 0}, {"t": "h2", "x": "4-9. メンバー同士で結果や評価を「競う」ことはいいが、「争い」はしない"}, {"t": "p", "x": "「競う」ことは、お互いにより優れた結果を目指そうとするものであり、ポジティブに働きます。一方、「争う」は相手に勝つことが目的であり、優れた結果を出すことに重点が置かれなくなってしまいます。「争い」が肯定されてしまうと、相手を出し抜いたり、陥れたり、ということがまかり通ってしまうことになります。"}, {"t": "p", "x": "「争う」ことは、会社全体にとってメリットがないですし、メンバー個人の成長にもつながりません。"}, {"t": "p", "x": "ですので、メンバー同士が「競い」合って、切磋琢磨し、よりいっそうの成長をしていくことが望ましいです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "同期入社のメンバー同士で、どちらが先にキャリアアップできるか競い合った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点評価が気になるので、他拠点の悪評をケアマネに伝えている。", "l": 0}, {"t": "h2", "x": "4-10. 論破しようとせず、まず相手の意見を理解する"}, {"t": "p", "x": "意見が対立した際、相手を論破しようとしたり、批判したりしてはいけません。 議論をしていると、お互いが「自分が正しい」と思い始め、勝ち負けにこだわってしまいがちです。しかし、議論の目的は相互に力を合わせるためにあるのであり、論破しようとすることは目的に沿いません。論破して気持ちいいのは自分だけです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "同僚の支援方法が自分の考えと違った際、すぐに否定して自分の正しさを主張するのではなく、「なぜそのやり方をしているのですか？」と相手の意図を理解しようと努めた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "会議で自分と反対の意見が出た際、相手の矛盾点を論理的にまくしたて、言い負かしてしまった。自分はスッキリしたが、職場の空気は悪くなった。", "l": 0}, {"t": "h2", "x": "4-11.好き嫌いで仕事をしない"}, {"t": "p", "x": "職場の人間関係において、好き嫌いの感情で仕事をしてはいけません。 完璧な人など存在しません。、自分とは異なる役割や長所を持っていることに敬意を持ちましょう。"}, {"t": "p", "x": "万が一、考え方が合わない、または個人的に嫌いな人がいたとしても、それを態度や表情に出すことはプロフェッショナルとして不適切です。好き嫌いの感情に左右されず、誰に対しても平等でフラットに接しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "個人的に少し苦手意識のある同僚から業務の依頼を受けたが、感情や態度には一切出さず、他のメンバーと同じように快く引き受け、丁寧に対応した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自分と合わないメンバーのちょっとしたミスを見つけるたびに、「またあの人はミスをした」と周囲に言いふらしたり、その人が話しかけてきた時だけ冷たい態度をとったりしている。", "l": 0}, {"t": "h2", "x": "4-12. 誰かを批判する心の在り方を変える"}, {"t": "p", "x": "同僚や他者の考えに対して、「自分が100%正しい」と思い込み、相手を否定したり批判したりしてはいけません。"}, {"t": "p", "x": "エフィラグループのコミュニケーション基本ルールにおいて、同僚に対する愚痴や悪口を言うことは明確に禁止されていますが、ただ「言葉に出さなければいい」というわけではありません。一人ひとりにはそれぞれの正義や背景があるという前提に立ち、誰かを批判する心の在り方そのものを変えることが重要です。"}, {"t": "p", "x": "エフィラウェイにもあるように、まずは相手の話を最初から否定せず最後まで聞き、「自分が100%正しいとは限らない」「何か自分の知らないことがあるかもしれない」と謙虚に捉える『理解ファースト』の姿勢で相手と接しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "同僚の意見や支援方法が自分の考えと違った際、すぐに「それは間違っている」と心の中で否定するのではなく、「なぜそう考えたのだろうか」と相手の背景や意図を理解しようと努めた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "同僚の業務の進め方に対して、「自分のやり方の方が絶対に正しいのに」と心の中で批判的に捉え、直接悪口こそ言わないものの、見下したような態度をとってしまった。", "l": 0}, {"t": "h2", "x": "4-13. 人のあらさがしをせず、他者に敬意と感謝を持つ"}, {"t": "p", "x": "完璧な人は存在しません。同僚の欠点や至らない点にばかり目を向けて「あらさがし」をするのではなく、自分とは異なる役割や長所を持っていることに敬意を持ちましょう。"}, {"t": "p", "x": "エフィラグループのポリシーにもある通り、役職や職種、雇用形態などの違いは、ミッション達成のための「機能と責任」の違いに過ぎず、人間としての優劣を示すものではありません。自分が優れていると錯覚して他者を見下したり、欠点ばかりを指摘したりしてはいけません。"}, {"t": "p", "x": "悪いところや他人のミスはすぐに目につきやすいものですが、あらさがしをするのではなく、自分にはできない役割を担ってくれている他者に対し、常に敬意と感謝の念を持って接することが求められます。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "同僚が業務でミスをした際、そのミス（欠点）ばかりを取り上げて非難するのではなく、普段その同僚が自分にはできない役割を担ってくれていることに感謝し、お互いにフォローし合いながら前向きに業務を進めた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "完璧な人はいないにも関わらず、同僚のちょっとした言葉遣いのミスや手順の抜けなどの「あら」ばかりをわざわざ探して周囲に言いふらし、自分が優れていると錯覚して見下した態度をとっている。", "l": 0}], "subsections": ["4-1. メンバーには敬意をもって接する", "4-2. 誰に対しても敬意と謙虚さを持つ", "4-3. 上長・同僚に対して、感情的にならない", "4-4. 「ベテラン」かどうかは関係ない", "4-5. 偉そうな態度をとってはいけない", "4-6. 何かしてもらったら「ありがとう」を伝える", "4-7. 自分の「常識」が他人の常識とは限らない", "4-8. 不機嫌な表情をしないこと", "4-9. メンバー同士で結果や評価を「競う」ことはいいが、「争い」はしない", "4-10. 論破しようとせず、まず相手の意見を理解する", "4-11.好き嫌いで仕事をしない", "4-12. 誰かを批判する心の在り方を変える", "4-13. 人のあらさがしをせず、他者に敬意と感謝を持つ"], "text": "4-1. メンバーには敬意をもって接する 上長に対しても、同僚に対しても、それが自身より後に入社したメンバーや、自身より年下であっても、敬意をもって礼儀正しく接すること。 よくあるOK事例 新人メンバーAは自分より１０才も年下だが、他の同僚と同様に、一人の人として礼儀正しく接するようにしている。 よくあるNG事例 新人メンバーAは自分より社歴が浅いので、自身の仕事の邪魔になると思い、ぞんざいに扱った。 4-2. 誰に対しても敬意と謙虚さを持つ 組織における役職や等級、雇用形態（社員・パート）、所属部署（本部・現場）の違いは、ミッション達成のための「役割と責任」の違いに過ぎず、人間としての優劣を示すものではありません。 そのため、「正社員だから」「本部だから」「長くいるから」と自身が優れていると錯覚し、他者を見下したり偉そうに接したりしてはいけません。自分にはできない役割を担ってくれている他者に対し、常に敬意と感謝を持ちましょう。 また、エフィラが地域で影響力を持つ会社に成長したとしても、「我々は特別な存在である」と勘違いしてはいけません。リーディングカンパニーの一員として、誰よりも腰が低く、感じが良い存在であることを心がけましょう。 よくあるOK事例 自分は正社員で社歴も長いが、新しく入ったパートメンバーに対しても、自分にはできない役割を担ってくれていることに感謝し、フラットに敬語で丁寧に接している。 地域の他法人のスタッフや関係機関の方に対して、会社の看板に驕ることなく、常に謙虚で感じよく挨拶をしている。 よくあるNG事例 自分が現場の最前線で稼いでいるという自負から、間接部門（本部など）のメンバーに対して「現場のことも知らないくせに」と見下した態度をとってしまった。 エフィラが地域で有名な会社になってきたため、求職者や他社の人に対して「自分たちは特別な会社で働いているんだ」と横柄な態度で接してしまった。 4-3. 上長・同僚に対して、感情的にならない 上長や同僚に対して、感情的に怒ったり、罵倒したりすることは組織の和を乱すことにつながります。周囲も気をつかって行動しないといけなくなります。 メンバーは、本来は顧客への対応に集中すべきなのに、感情的になっている同僚に気をとられてしまうことでしょう。それでは本来大切にすべき顧客対応がおろそかになるし、組織としての仕事の質が落ちてしまうことにつながるでしょう。 感情的になることを抑えて仕事をしましょう。 よくあるOK事例 同僚Aに対し、支援方法の相違で意見が食い違い、苛立ちを感じたが、自分が不愉快であることは目の前にいるパートナーや一緒に働くメンバーには関係のないことなので、いつもどおり仕事をした。支援方法については、後ほど上長に相談して指示を仰ぐことにした。 よくあるNG事例 上長が間違ったことをしているように感じたため正義感からか、上長に対して激怒してしまった。 同僚Aに対し、支援方法の相違で意見が食い違い、苛立ちを感じた。 その後も感情を抑えられないままイライラした態度で業務を行った。 4-4. 「ベテラン」かどうかは関係ない 組織内の人と人との位置関係は役割や役職によって決まります。個人の経験値や経歴は関係ありませんし、ベテランだから等は関係ありません。 組織に対しての責任を持つ上長の指示に対しては、いくらあなたがベテランでも従わないといけません。 また、ベテランだからといって他のメンバーとは違う特権があることなどはないので、経験値や経歴に関係なく、全員が謙虚に仕事に向き合っていきましょう。 よくあるOK事例 自分は拠点長より社歴が長く拠点のことは誰よりもわかっている自負はあるが、拠点で起こることの責任を取るのは拠点長なので、指示には従い、拠点長が何か決定するために必要な情報は積極的に伝えるようにしている。 よくあるNG事例 拠点長は無資格で経歴も自分より浅いので、指示をされても聞く気にならない。 並列の関係であるベテランのメンバーから、「今日中に書類の整理をしておいて」と指示された。経歴も長く拠点業務のことは一番把握している方なので、上長では無いけれど指示を聞いた。 4-5. 偉そうな態度をとってはいけない 他のメンバーに対して、威張った態度・発言、無視する、武勇伝を語る、説教するなど、偉そうな態度をとらないようにしましょう。横柄にしないようにしましょう。仮に相手よりも経験があったり、年齢が上だったりしても、一緒に働くメンバーには丁寧に接しましょう。 「お局」や「経験が長いことや知識の多さを偉そうに語る人」がいるところで働きたい人などいないでしょう。指摘や意見を伝える際には、口調や言葉選びに注意しましょう。 よくあるOK事例 新入メンバーの教育担当に任命された。新入メンバーと接する時は、横柄な態度になってしまっていないか注意しながら、アドバイスや指導をするように気を付けている。 よくあるNG事例 今の若い人は甘えている人が多いので、刺激を与えるために自分が若い頃どれだけ働いていたか、苦労したかについて語った。 自分がこの拠点で一番古株なので、新人からまずは挨拶すべきだと思っている。 4-6. 何かしてもらったら「ありがとう」を伝える 感謝していることは言葉に出さないと伝わらないもの。ありがとうの感謝を伝えるから、お互い気持ちよく仕事ができるものです。 やってもらったら、それが当然のことと思っていても、「ありがとう」を伝えましょう。伝えるべきか迷ったら「ありがとう」というようにしましょう。 よくあるOK事例 いつも困った時に積極的に手を貸してくれる同僚がいる。いつものことで改めて伝えるのは恥ずかしかったが、「いつもありがとうございます」と伝えた。 よくあるNG事例 人の手が必要となったとき同僚が真っ先に手を貸してくれた。仕事だから当たり前だと思い感謝の言葉は伝えなかった。 レクのために事前準備をしていた際、同僚が物を運ぶのを手伝ってくれた。 前から気が合わない同僚だったためありがとうと伝えなかった。 4-7. 自分の「常識」が他人の常識とは限らない 自分がこれは当然と思っていることでも、それが他人や会社からして当然なのかどうかというとわかりません。 育ってきた文化や環境が違えば、当たり前も違うものです。アフリカで育った人の文化と日本で育った人の文化は異なるため、常識も違います。どちらが正しいとかの問題ではありません 自分の「常識」と違うからおかしい、「普通はこうあるべき」という考えをしていては、平行線をたどるため、相手にとっての常識をまず知ることから始めましょう。 相手が会社である場合、会社のルールが会社の常識です。自身の常識と違っていても従いましょう。 よくあるOK事例 新入メンバーが派手なアクセサリーを付けて出勤してきた。仕事に来ているのに、社会人としてどうなのか、と思ってしまったが、業務時間中はルールに従ってきちんとアクセサリーを外して支援しているし、勤務時間外のおしゃれは個人の自由でいいのだと考えなおした。 研修中におしゃべりをしているメンバーがいて、良くないと思ったが、自分の常識と他人の常識が違うのかもしれないので、上長に報告し判断をゆだねた。 会社の身だしなみルールは厳しすぎておかしい、と思ったが、ルールをよく読み、いろいろな価値観や年齢の方から見て違和感を感じない身だしなみを目指しているから必要なことなのだと理解するようにした。 よくあるNG事例 遅刻したら本来全員に謝罪をするべきだと思うがしない人がいた。ルールにはなかったが、本人に対してしかりつけた。 「普通」新しいことを教わったらメモを取るものだと思うが、新人でしていない人がいる。その人を仕事ができない人だと認定した。 4-8. 不機嫌な表情をしないこと 常に笑顔でいることはできないかもしれないが、不機嫌な表情は出さないようにしましょう。それぞれのメンバーが機嫌がよくないときもあるかもしれないが、それを表情に出さないことはできるはずです。 同僚や顧客は不機嫌な顔をしている人と一緒にいたいとは思わなくなるでしょう。 自身をコントロールし、たとえ機嫌が悪くても表情には出さないようしましょう。 よくあるOK事例 プライベートで嫌なことがあって機嫌が悪いが、仕事中はパートナーや職場の皆には関係のないことだし、心配をかけないよう、極力普段どおりにふるまった。 4-9. メンバー同士で結果や評価を「競う」ことはいいが、「争い」はしない 「競う」ことは、お互いにより優れた結果を目指そうとするものであり、ポジティブに働きます。一方、「争う」は相手に勝つことが目的であり、優れた結果を出すことに重点が置かれなくなってしまいます。「争い」が肯定されてしまうと、相手を出し抜いたり、陥れたり、ということがまかり通ってしまうことになります。 「争う」ことは、会社全体にとってメリットがないですし、メンバー個人の成長にもつながりません。 ですので、メンバー同士が「競い」合って、切磋琢磨し、よりいっそうの成長をしていくことが望ましいです。 よくあるOK事例 同期入社のメンバー同士で、どちらが先にキャリアアップできるか競い合った。 よくあるNG事例 拠点評価が気になるので、他拠点の悪評をケアマネに伝えている。 4-10. 論破しようとせず、まず相手の意見を理解する 意見が対立した際、相手を論破しようとしたり、批判したりしてはいけません。 議論をしていると、お互いが「自分が正しい」と思い始め、勝ち負けにこだわってしまいがちです。しかし、議論の目的は相互に力を合わせるためにあるのであり、論破しようとすることは目的に沿いません。論破して気持ちいいのは自分だけです。 よくあるOK事例 同僚の支援方法が自分の考えと違った際、すぐに否定して自分の正しさを主張するのではなく、「なぜそのやり方をしているのですか？」と相手の意図を理解しようと努めた。 よくあるNG事例 会議で自分と反対の意見が出た際、相手の矛盾点を論理的にまくしたて、言い負かしてしまった。自分はスッキリしたが、職場の空気は悪くなった。 4-11.好き嫌いで仕事をしない 職場の人間関係において、好き嫌いの感情で仕事をしてはいけません。 完璧な人など存在しません。、自分とは異なる役割や長所を持っていることに敬意を持ちましょう。 万が一、考え方が合わない
