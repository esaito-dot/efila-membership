、または個人的に嫌いな人がいたとしても、それを態度や表情に出すことはプロフェッショナルとして不適切です。好き嫌いの感情に左右されず、誰に対しても平等でフラットに接しましょう。 よくあるOK事例 個人的に少し苦手意識のある同僚から業務の依頼を受けたが、感情や態度には一切出さず、他のメンバーと同じように快く引き受け、丁寧に対応した。 よくあるNG事例 自分と合わないメンバーのちょっとしたミスを見つけるたびに、「またあの人はミスをした」と周囲に言いふらしたり、その人が話しかけてきた時だけ冷たい態度をとったりしている。 4-12. 誰かを批判する心の在り方を変える 同僚や他者の考えに対して、「自分が100%正しい」と思い込み、相手を否定したり批判したりしてはいけません。 エフィラグループのコミュニケーション基本ルールにおいて、同僚に対する愚痴や悪口を言うことは明確に禁止されていますが、ただ「言葉に出さなければいい」というわけではありません。一人ひとりにはそれぞれの正義や背景があるという前提に立ち、誰かを批判する心の在り方そのものを変えることが重要です。 エフィラウェイにもあるように、まずは相手の話を最初から否定せず最後まで聞き、「自分が100%正しいとは限らない」「何か自分の知らないことがあるかもしれない」と謙虚に捉える『理解ファースト』の姿勢で相手と接しましょう。 よくあるOK事例 同僚の意見や支援方法が自分の考えと違った際、すぐに「それは間違っている」と心の中で否定するのではなく、「なぜそう考えたのだろうか」と相手の背景や意図を理解しようと努めた。 よくあるNG事例 同僚の業務の進め方に対して、「自分のやり方の方が絶対に正しいのに」と心の中で批判的に捉え、直接悪口こそ言わないものの、見下したような態度をとってしまった。 4-13. 人のあらさがしをせず、他者に敬意と感謝を持つ 完璧な人は存在しません。同僚の欠点や至らない点にばかり目を向けて「あらさがし」をするのではなく、自分とは異なる役割や長所を持っていることに敬意を持ちましょう。 エフィラグループのポリシーにもある通り、役職や職種、雇用形態などの違いは、ミッション達成のための「機能と責任」の違いに過ぎず、人間としての優劣を示すものではありません。自分が優れていると錯覚して他者を見下したり、欠点ばかりを指摘したりしてはいけません。 悪いところや他人のミスはすぐに目につきやすいものですが、あらさがしをするのではなく、自分にはできない役割を担ってくれている他者に対し、常に敬意と感謝の念を持って接することが求められます。 よくあるOK事例 同僚が業務でミスをした際、そのミス（欠点）ばかりを取り上げて非難するのではなく、普段その同僚が自分にはできない役割を担ってくれていることに感謝し、お互いにフォローし合いながら前向きに業務を進めた。 よくあるNG事例 完璧な人はいないにも関わらず、同僚のちょっとした言葉遣いのミスや手順の抜けなどの「あら」ばかりをわざわざ探して周囲に言いふらし、自分が優れていると錯覚して見下した態度をとっている。"}, {"title": "5. 上長との関係", "blocks": [{"t": "h2", "x": "5-1. 上長を評価しない"}, {"t": "p", "x": "責任の大きさに応じて見える景色が異なるため、メンバーは上長の指示が正しいか、間違っているかを判断・評価することはできません。（基本的な考え方「責任の大きさ」参照）"}, {"t": "p", "x": "責任が大きい役職にいる人ほど、未来を見据えて、組織全体にとってどんな影響があるのかを判断しており、責任が小さいほど「今」に近い時間軸での影響で判断することが多いでしょう。"}, {"t": "p", "x": "したがって上長は、部下とは責任の大きさも見ている景色も異なるため、その判断や指示に対して部下が評価をすることはできません。"}, {"t": "p", "x": "例えば、親子関係において、親は子供の成長に責任を負っているからこそ、毎日子供がチョコレートを食べたいと言ってもダメと言います。子供はそれで親が嫌いになるかもしれないが、子供は将来まで考えられていないので、親の判断を理解できないことでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "パートナーの対応が忙しい時に拠点長が事務作業をしていた。皆が大変な時になぜ対応してくれないのだろう、ダメな上長だ、と思ってしまったが、上長しか対応できない本日締め切りの請求業務を行っていたと後ほど知った。上長は責任ある業務を任されているのだから、上長を評価することはせず、自身は自分の任された業務を全うしていこうと思った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "送迎の時間帯で慌ただしいときに上長から急ぎの業務指示があった。繁忙な状況を全く理解しておらずダメな上長だと思った。今後指示は聞きたくない。", "l": 0}, {"t": "b", "x": "指示を受けた新しい業務を他業務と比較し、優先度を高くして早く終わらせるべきと自己判断をし、上長から聞いている優先度を無視し取り掛かった。", "l": 0}, {"t": "h2", "x": "5-2. 上長と部下の関係に「好き・嫌い」を持ち込まない"}, {"t": "p", "x": "業務を行う上で、上長と部下の間に好き・嫌いという感情を持ち込まないようにしましょう。"}, {"t": "p", "x": "好きだから指示を聞く、嫌いだから聞かない、などは仕事において許されることではありません。感情に関係なく、指示を聞かないといけないものであることを考えると、好き嫌いを持ち込むこと自体、意味のないことだと考え、持ち込まないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点長が変わり、新任拠点長になった。前拠点長のことは人間的に好きだったが、新任拠点長のことはどんな人なのかまだわからない。不安があるが、新任拠点長の指示を聞いて業務を行っている。前拠点長とやり方が違うことがあるが、効率よく業務ができていると感じる。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "いまの上長とは気が合わず、支援の経験もなく頼り甲斐がないため、何か指示されても聞く気にならない。前の上長は好きだったから言われたことはすぐに対応していたが、今の上長は嫌いだから言われたことは後回しにすることが多い。", "l": 0}, {"t": "b", "x": "いまの上長は話しやすく親しみやすいため好きだ。そのため、上長からの指示にはすぐに取り組むようにしている。", "l": 0}, {"t": "h2", "x": "5-3. 上長に「理想の上長像」を求めない"}, {"t": "p", "x": "自身が思う理想の上長像を、上長に押し付けないようにしましょう。そもそも理想的な人間はなかなかいないものであるし、あなたの「理想の上長像」を実現できるから上長になったわけではないのです。"}, {"t": "p", "x": "理想と異なるから、指示を聞かないというわけにもいかないのだから、理想と比較することは辞め、ありのままに受け止め、それでも意見や懸念があれば伝えましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "今の拠点長は、前職の尊敬する拠点長とまったくタイプが違うが、指示を聞き、意見があればしっかり伝えるようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自身が考える上長のあるべき姿と今の上長が異なるため、上長と思えず指示を受け流した。", "l": 0}, {"t": "b", "x": "理想の上長像と今の上長が違うため、自分の上長はダメな上長だと思っている。だからついていこうとは思わない。", "l": 0}, {"t": "h2", "x": "5-4. 上長とは友達のように接してはいけない"}, {"t": "p", "x": "上長は友達ではありません。距離が近すぎると、上長の指示が感情的に受け入れられなくなることもでるなど、弊害が生まれることがあります。適度な距離をとるようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長とは趣味が同じなのでプライベートな話をしたくなってしまうが、上長はメンバー皆に平等に接してくれているので、自分だけが上長と心理的距離が近くなりすぎることのないようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長とは仲が良く、よく飲みに行くしプライベートでも会うことがある。組織上は上長部下の位置にいるが、正直上長として見ていない。気兼ねなく何でも話せる友達のように思っている。", "l": 0}, {"t": "b", "x": "上長はとてもフレンドリーで相談がしやすい。気が進まない業務を担当に任されたが、気乗りがしないため別の人を担当にしてくれないかと相談をした。", "l": 0}, {"t": "h2", "x": "5-5. 上長が教えてくれなくても自分ができることを考える"}, {"t": "p", "x": "業務を任された時点で自分に業務を行う責任があるため、教えてもらうことを待っているのは責任を放棄していることにもなります。知識を得る手段を自分で考えて動き、その責任を果たしましょう。"}, {"t": "p", "x": "教えてくれなかったから何をすればよいかわからなかった、教えてくれなかったから具体的に何を求められているのか曖昧なまま進めてしまった、などは言い訳にしかなりません。"}, {"t": "p", "x": "任されたことを遂行するために必要なことは自分から主体的に取りに行くことを心がけましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から新しく業務を任されたが、やり方がわからなかったので調べ、上長にそのやり方でいいか確認した上で業務に取りかかった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長がAさんにばかり新しい業務を教えていて、不平等だと思った。そのせいで目の前の仕事もやる気がなくなった。もっと色々な業務を覚えて貢献したいが、言っても無駄だろうからとくに上長には伝えていない。", "l": 0}, {"t": "b", "x": "新しい業務について、どうやってやったらいいか、上長が教えてくれない。本来、ちゃんと教えてくれるのが筋だろうと思う。同僚に不満を漏らした。", "l": 0}, {"t": "h2", "x": "5-6. 上長との立場の違いを理解するように努める"}, {"t": "p", "x": "上長は拠点に求められている目標に対する結果を求められている存在であり、その結果にたどり着くためにいろいろなことをするはずです。"}, {"t": "p", "x": "当然ルール違反や、法令違反はNGですが、自身が正しいと思う行動と仮に違うことをしていたとしても、そこに対しておかしいと思っても、上長の立場を理解するように努めましょう。"}, {"t": "p", "x": "目標に到達するための方法は一人ひとり違う可能性があるため、上長の立場で選択した行動なのだと理解することを心掛けましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "今日はとても忙しい状況だったが、上長は事務室で事務作業をしていた。上長は月初の請求作業があるからそれを優先してもらい、パートナーの対応は自分たちでなんとかするための方法を考えて行動した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長が新規パートナー獲得のため営業活動をするが、上長が行っている営業方法に対して違和感を感じ、上長へおかしいと意見を伝えた。", "l": 0}, {"t": "h2", "x": "5-7.根拠を示す"}, {"t": "p", "x": "上長に意見を伝える場合、根拠なく勢いだけで意見を通そうとするのではなく、可能な限り根拠となるデータや資料を用意しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "新規パートナーの支援方針について、アセスメント資料を用意し、上長にその資料に基づいた方針を提案した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "あるパートナーから、拠点内に掲示されているポスターの位置がわかりづらくてよくないので、位置を変えた方が良いと言われた。私もそう思うし、他のパートナーの多くがそう思っていると思う。この頃、利用終了して他の事業所に移っている方が出てきているのも、小さいことの積み重ねで起こっているはずなので、ポスターの位置を変えることがとても重要だと思う。\u000b上記の意見を、そのまま上長に伝えた。", "l": 0}], "subsections": ["5-1. 上長を評価しない", "5-2. 上長と部下の関係に「好き・嫌い」を持ち込まない", "5-3. 上長に「理想の上長像」を求めない", "5-4. 上長とは友達のように接してはいけない", "5-5. 上長が教えてくれなくても自分ができることを考える", "5-6. 上長との立場の違いを理解するように努める", "5-7.根拠を示す"], "text": "5-1. 上長を評価しない 責任の大きさに応じて見える景色が異なるため、メンバーは上長の指示が正しいか、間違っているかを判断・評価することはできません。（基本的な考え方「責任の大きさ」参照） 責任が大きい役職にいる人ほど、未来を見据えて、組織全体にとってどんな影響があるのかを判断しており、責任が小さいほど「今」に近い時間軸での影響で判断することが多いでしょう。 したがって上長は、部下とは責任の大きさも見ている景色も異なるため、その判断や指示に対して部下が評価をすることはできません。 例えば、親子関係において、親は子供の成長に責任を負っているからこそ、毎日子供がチョコレートを食べたいと言ってもダメと言います。子供はそれで親が嫌いになるかもしれないが、子供は将来まで考えられていないので、親の判断を理解できないことでしょう。 よくあるOK事例 パートナーの対応が忙しい時に拠点長が事務作業をしていた。皆が大変な時になぜ対応してくれないのだろう、ダメな上長だ、と思ってしまったが、上長しか対応できない本日締め切りの請求業務を行っていたと後ほど知った。上長は責任ある業務を任されているのだから、上長を評価することはせず、自身は自分の任された業務を全うしていこうと思った。 よくあるNG事例 送迎の時間帯で慌ただしいときに上長から急ぎの業務指示があった。繁忙な状況を全く理解しておらずダメな上長だと思った。今後指示は聞きたくない。 指示を受けた新しい業務を他業務と比較し、優先度を高くして早く終わらせるべきと自己判断をし、上長から聞いている優先度を無視し取り掛かった。 5-2. 上長と部下の関係に「好き・嫌い」を持ち込まない 業務を行う上で、上長と部下の間に好き・嫌いという感情を持ち込まないようにしましょう。 好きだから指示を聞く、嫌いだから聞かない、などは仕事において許されることではありません。感情に関係なく、指示を聞かないといけないものであることを考えると、好き嫌いを持ち込むこと自体、意味のないことだと考え、持ち込まないようにしましょう。 よくあるOK事例 拠点長が変わり、新任拠点長になった。前拠点長のことは人間的に好きだったが、新任拠点長のことはどんな人なのかまだわからない。不安があるが、新任拠点長の指示を聞いて業務を行っている。前拠点長とやり方が違うことがあるが、効率よく業務ができていると感じる。 よくあるNG事例 いまの上長とは気が合わず、支援の経験もなく頼り甲斐がないため、何か指示されても聞く気にならない。前の上長は好きだったから言われたことはすぐに対応していたが、今の上長は嫌いだから言われたことは後回しにすることが多い。 いまの上長は話しやすく親しみやすいため好きだ。そのため、上長からの指示にはすぐに取り組むようにしている。 5-3. 上長に「理想の上長像」を求めない 自身が思う理想の上長像を、上長に押し付けないようにしましょう。そもそも理想的な人間はなかなかいないものであるし、あなたの「理想の上長像」を実現できるから上長になったわけではないのです。 理想と異なるから、指示を聞かないというわけにもいかないのだから、理想と比較することは辞め、ありのままに受け止め、それでも意見や懸念があれば伝えましょう。 よくあるOK事例 今の拠点長は、前職の尊敬する拠点長とまったくタイプが違うが、指示を聞き、意見があればしっかり伝えるようにしている。 よくあるNG事例 自身が考える上長のあるべき姿と今の上長が異なるため、上長と思えず指示を受け流した。 理想の上長像と今の上長が違うため、自分の上長はダメな上長だと思っている。だからついていこうとは思わない。 5-4. 上長とは友達のように接してはいけない 上長は友達ではありません。距離が近すぎると、上長の指示が感情的に受け入れられなくなることもでるなど、弊害が生まれることがあります。適度な距離をとるようにしましょう。 よくあるOK事例 上長とは趣味が同じなのでプライベートな話をしたくなってしまうが、上長はメンバー皆に平等に接してくれているので、自分だけが上長と心理的距離が近くなりすぎることのないようにしている。 よくあるNG事例 上長とは仲が良く、よく飲みに行くしプライベートでも会うことがある。組織上は上長部下の位置にいるが、正直上長として見ていない。気兼ねなく何でも話せる友達のように思っている。 上長はとてもフレンドリーで相談がしやすい。気が進まない業務を担当に任されたが、気乗りがしないため別の人を担当にしてくれないかと相談をした。 5-5. 上長が教えてくれなくても自分ができることを考える 業務を任された時点で自分に業務を行う責任があるため、教えてもらうことを待っているのは責任を放棄していることにもなります。知識を得る手段を自分で考えて動き、その責任を果たしましょう。 教えてくれなかったから何をすればよいかわからなかった、教えてくれなかったから具体的に何を求められているのか曖昧なまま進めてしまった、などは言い訳にしかなりません。 任されたことを遂行するために必要なことは自分から主体的に取りに行くことを心がけましょう。 よくあるOK事例 上長から新しく業務を任されたが、やり方がわからなかったので調べ、上長にそのやり方でいいか確認した上で業務に取りかかった。 よくあるNG事例 上長がAさんにばかり新しい業務を教えていて、不平等だと思った。そのせいで目の前の仕事もやる気がなくなった。もっと色々な業務を覚えて貢献したいが、言っても無駄だろうからとくに上長には伝えていない。 新しい業務について、どうやってやったらいいか、上長が教えてくれない。本来、ちゃんと教えてくれるのが筋だろうと思う。同僚に不満を漏らした。 5-6. 上長との立場の違いを理解するように努める 上長は拠点に求められている目標に対する結果を求められている存在であり、その結果にたどり着くためにいろいろなことをするはずです。 当然ルール違反や、法令違反はNGですが、自身が正しいと思う行動と仮に違うことをしていたとしても、そこに対しておかしいと思っても、上長の立場を理解するように努めましょう。 目標に到達するための方法は一人ひとり違う可能性があるため、上長の立場で選択した行動なのだと理解することを心掛けましょう。 よくあるOK事例 今日はとても忙しい状況だったが、上長は事務室で事務作業をしていた。上長は月初の請求作業があるからそれを優先してもらい、パートナーの対応は自分たちでなんとかするための方法を考えて行動した。 よくあるNG事例 上長が新規パートナー獲得のため営業活動をするが、上長が行っている営業方法に対して違和感を感じ、上長へおかしいと意見を伝えた。 5-7.根拠を示す 上長に意見を伝える場合、根拠なく勢いだけで意見を通そうとするのではなく、可能な限り根拠となるデータや資料を用意しましょう。 よくあるOK事例 新規パートナーの支援方針について、アセスメント資料を用意し、上長にその資料に基づいた方針を提案した。 よくあるNG事例 あるパートナーから、拠点内に掲示されているポスターの位置がわかりづらくてよくないので、位置を変えた方が良いと言われた。私もそう思うし、他のパートナーの多くがそう思っていると思う。この頃、利用終了して他の事業所に移っている方が出てきているのも、小さいことの積み重ねで起こっているはずなので、ポスターの位置を変えることがとても重要だと思う。 上記の意見を、そのまま上長に伝えた。"}, {"title": "6. 会社との関係", "blocks": [{"t": "h2", "x": "6-1. 求められている役割・業務を行うから対価がもらえる"}, {"t": "p", "x": "※基本的な考え方「組織」参照"}, {"t": "p", "x": "例えば、私たちが狩りをする集団だとして、まず肉をもらってからじゃないと狩りに行かない、というメンバーだらけの組織は存続することが難しいでしょう。狩りをした結果、みんなで肉を分け合う、というのが正しい流れです。"}, {"t": "p", "x": "つまり、会社がモチベーションを上げてくれたりしないと動かない、ということは正しくなく、自分がまず会社に貢献することで会社から報酬や対価が得られる、という順番が正しいことになります。何かをもらわないと動かない、という考え方は×です。"}, {"t": "p", "x": "したがって、シフトに入っている時間、そこにいるだけではなく、求められている役割・業務を遂行して初めて対価を得るに値するものです。勤務時間中、ただ「いる」だけでは組織からすると存在価値がない、とみなさざるをえません。貢献している人のおかげで貢献できていない人がそれでも報酬を得て、組織に居続けられるという状況はいつか崩壊してしまうことでしょう。一人一人が組織に貢献することで、組織は個人に報いることができるでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "この拠点の中では社歴が長い方で、お給料ももらっている方だが、これからも新しい業務をどんどん覚えて、支援スキルも磨き、よりよい拠点づくりをしたいと思っている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "正直、自分が特別頑張らなくても拠点長や他のメンバーが頑張ってくれれば拠点順位もそれなりに上がるだろうし、給料ももらえるから、積極的に働こうとは思っていない。", "l": 0}, {"t": "b", "x": "入社したばかりでまだ業務を覚えておらず拠点に貢献できていないかもしれないが、自分は有能で前職での実績も豊富だから、他のメンバーより高い給与をもらうことは当たり前だと思っている。", "l": 0}, {"t": "b", "x": "上長の仕事は部下のモチベーションを上げることだと思う。だから、施設長がモチベーションを上げてくれないから、私が仕事を頑張れないのは仕方ない。", "l": 0}, {"t": "h2", "x": "6-2. 評価項目になくても、自分の役割の仕事はやる"}, {"t": "p", "x": "例え評価項目の中にその業務がなくても、自分の守備範囲(役割)なら、やらなければいけません。"}, {"t": "p", "x": "この仕事は評価されないからやらない、ではなく、役割である以上はやりましょう。"}, {"t": "p", "x": "もし、その仕事が役割であるにも関わらず、やらなかった場合、誰かがやらなければならず、チームのみんなに迷惑がかかることになってしまいます。任されている役割は、全部やるのが仕事です。"}, {"t": "p", "x": "※なお、自身の守備範囲(役割)を超えた仕事をする、ということではありません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "この業務は評価項目にはないが、自身の任せられた役割なので、責任をもって実施する。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "評価項目にない仕事を上長に指示されたので、「この仕事をやっても評価されないので、やりません」と言った。", "l": 0}, {"t": "h2", "x": "6-3. 会社の問題・課題については上長に相談する"}, {"t": "p", "x": "会社の問題や課題を同僚と議論したくなることがあると思いますが、現状責任を持っていないメンバー同士が会話をしても、解決できる範疇を超えているためすぐには何も変えられないことがほとんどでしょう。"}, {"t": "p", "x": "同僚同士の議論は、業務上の課題解決にはつながらないといえるでしょう。ですので、何か課題や気になることがあった場合、上長に相談して解決を図るようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "会社の制度について課題があると思ったので、上長に相談したところ、事業部全体で課題検討してくれることになった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "久しぶりに同期と集まり、会社への不満と愚痴で盛り上がった。みんなの話を聞いて会社の方針に疑問を感じ、このまま仕事をしていていいのか不安になった。", "l": 0}, {"t": "b", "x": "他拠点の同期と会社の制度がどうあるべきかについて議論をした。いろいろ意見を言いあえて有意義な時間だった。", "l": 0}, {"t": "h2", "x": "6-4. 外部で会社を批判しない"}, {"t": "p", "x": "「自分は〇〇高校出身です」と言ったら、その高校の評判と自身の評価は連動し、上がったり下がったりします。それと同様に自身は〇〇という会社にいます、と伝えたら、その会社の評判と自身の評価は連動します。"}, {"t": "p", "x": "世間からの会社の評価が高ければ、そこに所属するメンバーは高い評価を受けることが多く、反対に、世間からの会社の評価が低くなれば、その会社の一員であるというだけで世間からの評価は下がってしまいます。"}, {"t": "p", "x": "自ら会社というコミュニティを批判する人は、自覚のないまま、自分自身の評価を下げていることになります。外部の人から見たら、その人＝その会社であり、切り分けて考えられるものではないので、外部で会社を批判しないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "社外の友達と会う時は、それぞれの仕事の愚痴が話題になることが多いが、愚痴を言うだけで解決できていない自分も格好が悪い気がするので言わないようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自分の会社はよくわからないルールがたくさんあることで不満が多い、ということを社外の友人によく話す。", "l": 0}, {"t": "b", "x": "自身の働いている職場は〇〇ができてない、〇〇が不足しているためこうあるべきと持論を友人たちとの飲み会でよく話す。", "l": 0}, {"t": "h2", "x": "6-5. 会社やメンバーの噂話をしない、信じない"}, {"t": "p", "x": "事実かどうかわからない会社やメンバーの仕事上の話は噂話をしないようにしましょう。"}, {"t": "p", "x": "はじめは「〇〇かもしれない」という噂話でも、どこかのタイミングで事実のように伝わっていくことがあります。"}, {"t": "p", "x": "事実かどうかわからない噂のような話は、話を聞いた時点で真偽は不明だと思って、信じないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点長が他拠点に異動するらしいという話を他メンバーから聞いたが、拠点長本人から話を聞いたわけではないので信じないようにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点長とメンバーAさんが一緒に帰っているところを見かけたメンバーが、「二人は付き合っているかもしれない」と言うので、他メンバーともその話をして盛り上がった。", "l": 0}], "subsections": ["6-1. 求められている役割・業務を行うから対価がもらえる", "6-2. 評価項目になくても、自分の役割の仕事はやる", "6-3. 会社の問題・課題については上長に相談する", "6-4. 外部で会社を批判しない", "6-5. 会社やメンバーの噂話をしない、信じない"], "text": "6-1. 求められている役割・業務を行うから対価がもらえる ※基本的な考え方「組織」参照 例えば、私たちが狩りをする集団だとして、まず肉をもらってからじゃないと狩りに行かない、というメンバーだらけの組織は存続することが難しいでしょう。狩りをした結果、みんなで肉を分け合う、というのが正しい流れです。 つまり、会社がモチベーションを上げてくれたりしないと動かない、ということは正しくなく、自分がまず会社に貢献することで会社から報酬や対価が得られる、という順番が正しいことになります。何かをもらわないと動かない、という考え方は×です。 したがって、シフトに入っている時間、そこにいるだけではなく、求められている役割・業務を遂行して初めて対価を得るに値するものです。勤務時間中、ただ「いる」だけでは組織からすると存在価値がない、とみなさざるをえません。貢献している人のおかげで貢献できていない人がそれでも報酬を得て、組織に居続けられるという状況はいつか崩壊してしまうことでしょう。一人一人が組織に貢献することで、組織は個人に報いることができるでしょう。 よくあるOK事例 この拠点の中では社歴が長い方で、お給料ももらっている方だが、これからも新しい業務をどんどん覚えて、支援スキルも磨き、よりよい拠点づくりをしたいと思っている。 よくあるNG事例 正直、自分が特別頑張らなくても拠点長や他のメンバーが頑張ってくれれば拠点順位もそれなりに上がるだろうし、給料ももらえるから、積極的に働こうとは思っていない。 入社したばかりでまだ業務を覚えておらず拠点に貢献できていないかもしれないが、自分は有能で前職での実績も豊富だから、他のメンバーより高い給与をもらうことは当たり前だと思っている。 上長の仕事は部下のモチベーションを上げることだと思う。だから、施設長がモチベーションを上げてくれないから、私が仕事を頑張れないのは仕方ない。 6-2. 評価項目になくても、自分の役割の仕事はやる 例え評価項目の中にその業務がなくても、自分の守備範囲(役割)なら、やらなければいけません。 この仕事は評価されないからやらない、ではなく、役割である以上はやりましょう。 もし、その仕事が役割であるにも関わらず、やらなかった場合、誰かがやらなければならず、チームのみんなに迷惑がかかることになってしまいます。任されている役割は、全部やるのが仕事です。 ※なお、自身の守備範囲(役割)を超えた仕事をする、ということではありません。 よくあるOK事例 この業務は評価項目にはないが、自身の任せられた役割なので、責任をもって実施する。 よくあるNG事例 評価項目にない仕事を上長に指示されたので、「この仕事をやっても評価されないので、やりません」と言った。 6-3. 会社の問題・課題については上長に相談する 会社の問題や課題を同僚と議論したくなることがあると思いますが、現状責任を持っていないメンバー同士が会話をしても、解決できる範疇を超えているためすぐには何も変えられないことがほとんどでしょう。 同僚同士の議論は、業務上の課題解決にはつながらないといえるでしょう。ですので、何か課題や気になることがあった場合、上長に相談して解決を図るようにしましょう。 よくあるOK事例 会社の制度について課題があると思ったので、上長に相談したところ、事業部全体で課題検討してくれることになった。 よくあるNG事例 久しぶりに同期と集まり、会社への不満と愚痴で盛り上がった。みんなの話を聞いて会社の方針に疑問を感じ、このまま仕事をしていていいのか不安になった。 他拠点の同期と会社の制度がどうあるべきかについて議論をした。いろいろ意見を言いあえて有意義な時間だった。 6-4. 外部で会社を批判しない 「自分は〇〇高校出身です」と言ったら、その高校の評判と自身の評価は連動し、上がったり下がったりします。それと同様に自身は〇〇という会社にいます、と伝えたら、その会社の評判と自身の評価は連動します。 世間からの会社の評価が高ければ、そこに所属するメンバーは高い評価を受けることが多く、反対に、世間からの会社の評価が低くなれば、その会社の一員であるというだけで世間からの評価は下がってしまいます。 自ら会社というコミュニティを批判する人は、自覚のないまま、自分自身の評価を下げていることになります。外部の人から見たら、その人＝その会社であり、切り分けて考えられるものではないので、外部で会社を批判しないようにしましょう。 よくあるOK事例 社外の友達と会う時は、それぞれの仕事の愚痴が話題になることが多いが、愚痴を言うだけで解決できていない自分も格好が悪い気がするので言わないようにしている。 よくあるNG事例 自分の会社はよくわからないルールがたくさんあることで不満が多い、ということを社外の友人によく話す。 自身の働いている職場は〇〇ができてない、〇〇が不足しているためこうあるべきと持論を友人たちとの飲み会でよく話す。 6-5. 会社やメンバーの噂話をしない、信じない 事実かどうかわからない会社やメンバーの仕事上の話は噂話をしないようにしましょう。 はじめは「〇〇かもしれない」という噂話でも、どこかのタイミングで事実のように伝わっていくことがあります。 事実かどうかわからない噂のような話は、話を聞いた時点で真偽は不明だと思って、信じないようにしましょう。 よくあるOK事例 拠点長が他拠点に異動するらしいという話を他メンバーから聞いたが、拠点長本人から話を聞いたわけではないので信じないようにした。 よくあるNG事例 拠点長とメンバーAさんが一緒に帰っているところを見かけたメンバーが、「二人は付き合っているかもしれない」と言うので、他メンバーともその話をして盛り上がった。"}, {"title": "7. 自責で考える", "blocks": [{"t": "h2", "x": "7-1. 何かのせい（他責）にしない"}, {"t": "p", "x": "与えられた役割を果たせなかったとき、「人が足りないから」、「上長が教えてくれなかったから」、「同僚がやってくれなかったから」など、周りのせい（他責）にしてはいけません。"}, {"t": "p", "x": "他責にしても、結果は変わらないし、自身の成長も止まることになってしまいます。与えられた役割のすべてが自分自身の責任であると捉え、自分事として業務を全うすることで、解決策が生まれるし、より成長につながることでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "自身が担当として実施する予定のイベントを行うにはメンバー不足なので、中止を提案しようかと思ったが、楽しみにしてくれているパートナーもいるので、イベント内容を一部変更し実施できるように調整したところ、無事に実施することができ、パートナーにも喜んでいただけた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "当日中に支援計画の会議記録をシステムに登録しなければいけないルールになっているが、今日は休みのメンバーが多いせいで日中繁忙だったため、当日中にできなくても自分は悪くない。", "l": 0}, {"t": "b", "x": "ひと月前に指示されていたことを実施するのを忘れてしまったが、前日にリマインドを受けてないため忘れてもしょうがないと思うことにした。", "l": 0}, {"t": "h2", "x": "7-2. 「認められない」のを誰かのせいにしない"}, {"t": "p", "x": "「なぜあの人は自分のことをわかってくれないのか」、「こんなにやっているのに上長は自分のことを評価してくれない」などの発言は、自分は正しくて、他人が間違っているという認識からでてくる言葉です。往々にして、自己評価は高いものであり、そう思いがちなものです。"}, {"t": "p", "x": "ただ、それでは結果何も変わりません。事実、他人はあなたを評価していない、ということで、その評価を変えたければ人のせいにせず、自分が変わるしかない、ということです。"}, {"t": "p", "x": "相手から認められたい、信頼してほしいときは、どうすればそう思ってもらえるのかを考えて、自分自身の行動を変えていきましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "自分は正当な評価を受けていないような気がしてしまうことがあるが、上長からフィードバックをもらった自身の課題を再確認してみるとまだできていないことがあった。評価されるには、自分自身がさらに行動を起こさなければいけないと思う。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "パートナーになかなか心を開いてもらえない。自分は優しく丁寧に接してるつもりだから、それをわかってくれない相手が悪い。", "l": 0}, {"t": "b", "x": "営業先のケアマネとうまく信頼関係が築けず、パートナーを紹介してもらえない。ケアマネはいつも忙しそうだしこちらの話やチラシには興味を示してくれないからしかたない。", "l": 0}, {"t": "h2", "x": "7-3. 「他人が変わらない」と愚痴らない"}, {"t": "p", "x": "人は簡単には変わりません。他人を変えることはできないものと思っておいたほうが良いでしょう。期待をしないでおきましょう。他人を変えるのではなく、まずあなたが変化することを考えましょう。"}, {"t": "p", "x": "相手の行動を変えたいと思ったら、ただ愚痴るのではなく、自身の言動を変えることで、相手の変化を待つようにすることで、あなた自身の成長にも繋がるでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "掃除を雑に済ませる同僚がいる。皆同じレベルで掃除をできるようにしたいと思ったので、拠点の掃除マニュアルとチェックリストを作ることを拠点長に提案した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "拠点長に拠点業務の課題・改善点について定期的に伝えているが、いつも忙しいと言って相手にしてくれない。どうしていつもそうなんだといらだちを覚える。", "l": 0}, {"t": "b", "x": "掃除を雑に済ませる同僚に対し、パートナーも使用する場だから適当に済ませないように伝えるが改善されなかった。何度言っても変わらない同僚が何で変わらないんだ、といつも他の同僚と話をしている。", "l": 0}, {"t": "h2", "x": "7-4. 「モチベーション」のせいにしない"}, {"t": "p", "x": "人間誰しもにモチベーションは存在し、モチベーションが高い状態にあり続けることは仕事をしていくうえで望ましい状態ではあります。"}, {"t": "p", "x": "ただし、モチベーションが高かろうが低かろうが、給料をもらっている以上は会社に対して給料以上の対価を返さなくてはいけない存在であることに変わりありません。現在の職場で働くことを選択した以上は、モチベーションの高低によって「やる、やらない」を選択することはできません。上長がモチベーションを上げてくれないから、仕事に集中できない、などというのは言い訳です。"}, {"t": "p", "x": "そして、モチベーションは他者や環境が与えてくれるものではなく、自身の内側から内発的に発生してくるものです。集中して仕事することを通して、成長し、新たな景色が見えてくることでしょう。その中で、自然と湧き出てくるものが本来のモチベーションです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "今月は業務量が多いのに給料が変わらないなんてモチベーションが上がらない、と感じてしまうが、この拠点メンバーでこの業務量をやり遂げられたら成長できると思い直して取り組むことにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長の指示することばかりやらされても、モチベーションは上がらない。もっと自由に、クリエイティブにやらせてほしい", "l": 0}, {"t": "b", "x": "前月より給料が低くなり、モチベーションが下がった。モチベーションが下がったから、今月は仕事がちゃんとできなくても仕方ないと思っている。", "l": 0}], "subsections": ["7-1. 何かのせい（他責）にしない", "7-2. 「認められない」のを誰かのせいにしない", "7-3. 「他人が変わらない」と愚痴らない", "7-4. 「モチベーション」のせいにしない"], "text": "7-1. 何かのせい（他責）にしない 与えられた役割を果たせなかったとき、「人が足りないから」、「上長が教えてくれなかったから」、「同僚がやってくれなかったから」など、周りのせい（他責）にしてはいけません。 他責にしても、結果は変わらないし、自身の成長も止まることになってしまいます。与えられた役割のすべてが自分自身の責任であると捉え、自分事として業務を全うすることで、解決策が生まれるし、より成長につながることでしょう。 よくあるOK事例 自身が担当として実施する予定のイベントを行うにはメンバー不足なので、中止を提案しようかと思ったが、楽しみにしてくれているパートナーもいるので、イベント内容を一部変更し実施できるように調整したところ、無事に実施することができ、パートナーにも喜んでいただけた。 よくあるNG事例 当日中に支援計画の会議記録をシステムに登録しなければいけないルールになっているが、今日は休みのメンバーが多いせいで日中繁忙だったため、当日中にできなくても自分は悪くない。 ひと月前に指示されていたことを実施するのを忘れてしまったが、前日にリマインドを受けてないため忘れてもしょうがないと思うことにした。 7-2. 「認められない」のを誰かのせいにしない 「なぜあの人は自分のことをわかってくれないのか」、「こんなにやっているのに上長は自分のことを評価してくれない」などの発言は、自分は正しくて、他人が間違っているという認識からでてくる言葉です。往々にして、自己評価は高いものであり、そう思いがちなものです。 ただ、それでは結果何も変わりません。事実、他人はあなたを評価していない、ということで、その評価を変えたければ人のせいにせず、自分が変わるしかない、ということです。 相手から認められたい、信頼してほしいときは、どうすればそう思ってもらえるのかを考えて、自分自身の行動を変えていきましょう。 よくあるOK事例 自分は正当な評価を受けていないような気がしてしまうことがあるが、上長からフィードバックをもらった自身の課題を再確認してみるとまだできていないことがあった。評価されるには、自分自身がさらに行動を起こさなければいけないと思う。 よくあるNG事例 パートナーになかなか心を開いてもらえない。自分は優しく丁寧に接してるつもりだから、それをわかってくれない相手が悪い。 営業先のケアマネとうまく信頼関係が築けず、パートナーを紹介してもらえない。ケアマネはいつも忙しそうだしこちらの話やチラシには興味を示してくれないからしかたない。 7-3. 「他人が変わらない」と愚痴らない 人は簡単には変わりません。他人を変えることはできないものと思っておいたほうが良いでしょう。期待をしないでおきましょう。他人を変えるのではなく、まずあなたが変化することを考えましょう。 相手の行動を変えたいと思ったら、ただ愚痴るのではなく、自身の言動を変えることで、相手の変化を待つようにすることで、あなた自身の成長にも繋がるでしょう。 よくあるOK事例 掃除を雑に済ませる同僚がいる。皆同じレベルで掃除をできるようにしたいと思ったので、拠点の掃除マニュアルとチェックリストを作ることを拠点長に提案した。 よくあるNG事例 拠点長に拠点業務の課題・改善点について定期的に伝えているが、いつも忙しいと言って相手にしてくれない。どうしていつもそうなんだといらだちを覚える。 掃除を雑に済ませる同僚に対し、パートナーも使用する場だから適当に済ませないように伝えるが改善されなかった。何度言っても変わらない同僚が何で変わらないんだ、といつも他の同僚と話をしている。 7-4. 「モチベーション」のせいにしない 人間誰しもにモチベーションは存在し、モチベーションが高い状態にあり続けることは仕事をしていくうえで望ましい状態ではあります。 ただし、モチベーションが高かろうが低かろうが、給料をもらっている以上は会社に対して給料以上の対価を返さなくてはいけない存在であることに変わりありません。現在の職場で働くことを選択した以上は、モチベーションの高低によって「やる、やらない」を選択することはできません。上長がモチベーションを上げてくれないから、仕事に集中できない、などというのは言い訳です。 そして、モチベーションは他者や環境が与えてくれるものではなく、自身の内側から内発的に発生してくるものです。集中して仕事することを通して、成長し、新たな景色が見えてくることでしょう。その中で、自然と湧き出てくるものが本来のモチベーションです。 よくあるOK事例 今月は業務量が多いのに給料が変わらないなんてモチベーションが上がらない、と感じてしまうが、この拠点メンバーでこの業務量をやり遂げられたら成長できると思い直して取り組むことにした。 よくあるNG事例 上長の指示することばかりやらされても、モチベーションは上がらない。もっと自由に、クリエイティブにやらせてほしい 前月より給料が低くなり、モチベーションが下がった。モチベーションが下がったから、今月は仕事がちゃんとできなくても仕方ないと思っている。"}, {"title": "8. 成長", "blocks": [{"t": "h2", "x": "8-1. 指示に対して「まずはやってみる」精神"}, {"t": "p", "x": "うまくいくかわからなくても、まずは指示があったらやってみましょう。上長はできると思って指示をしています。はじめから拒否していたら、成長は得られないので、まずはやってみましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "メンバーが足りないのに追加業務の指示があり、無理だと思ったが、効率を意識してやってみたらできた。", "l": 0}, {"t": "b", "x": "業務指示があり、やってみたが膨大な業務量だったのですべてを完了させられなかった。今回終えられなかった理由と課題を上長と一緒に検討し改善したところ、次回、同じ業務量の業務を完了させることができた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "PCでのデータ集計作業の指示を受けたが、PC操作に苦手意識を持っており、やる前から「できないから他の作業に変えて欲しい」と上長へ伝えた。", "l": 0}, {"t": "b", "x": "業務の指示を受けたができるか分からないため、他スタッフへ移管されるように、うまい理由探しに時間を費やした。", "l": 0}, {"t": "h2", "x": "8-2. 日ごろから勉強すること"}, {"t": "p", "x": "私たちはお客様に貢献するためにこの仕事をしています。新たな知識があれば、貢献できることも増えるものです。より多くの方々に貢献できるように個人個人が日ごろから勉強し、自分自身を磨き続けることが必要です。"}, {"t": "p", "x": "それが会社のためにもなるし、個人のためにもなるでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "よりよい支援をするためには自分にはまだ知識が足りないと思う。資格取得した先輩の話を聞き、自分も挑戦してみるつもりだ。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から振られた仕事のみをこなせれば良いため、自身から積極的に支援の周辺知識を拾いにいくことはしていない。", "l": 0}, {"t": "b", "x": "介護福祉士の勉強をすればさらに知識がつきいいことはわかっているけど、勉強する時間をとることがばかばかしい。今のままで十分対応できているから問題ない。", "l": 0}, {"t": "h2", "x": "8-3. 他者評価を上げるために努力しましょう"}, {"t": "p", "x": "自分から見た自分の評価が自己評価、他者から見た自分の評価が他者評価です。"}, {"t": "p", "x": "エフィラグループのメンバーは社会への貢献や自分の所属する組織への貢献を求められているので、他者からの評価を上げていかなければいけません。たとえ自己評価が高く、貢献できていると思ってしまったとしても、他者からの評価が高くなければ、貢献できていないものと考えるようにしましょう。（自分を認めること自体はダメではありません））"}, {"t": "p", "x": "仕事における価値（役割価値）は他者が決めるものであり、自分では決められません。自己評価は他者からの評価より高くなってしまうものです。求められている役割をどれだけ果たせているかという他者評価を受け入れ、その評価が自己評価より低かったとしても、他者評価を高めるために努力しましょう。その行動が、自身の成長につながります。"}, {"t": "p", "x": "注意すべき点としては、仕事上で自分の他者評価が低かったとしても、それはその時に仕事における役割を果たせたかどうかの評価にすぎません。人柄が否定されたような気持ちになったり尊厳が傷つく気持ちになることがあるかもしれませんが、あなたの『人間』としての評価ではないので、混同しないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "上長から任せられた仕事について、自分としてはよくできたと思っていたが、上長の求めている品質には達していないというフィードバックをもらった。指摘をもらった点を受け止めて修正した上で、再度上長へ提出した。", "l": 0}, {"t": "b", "x": "良かれと思ってパートナーの問い合わせに回答したが、間違った回答だったことがわかりクレームに発展してしまった。事前に情報共有と確認をしていれば防げたことだったと反省した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "上長から任せられた仕事について、上長から改善するよう指摘があった。自分としてはよくできたと思っていたので、指摘は受け入れない。", "l": 0}, {"t": "b", "x": "良かれと思ってパートナーの問い合わせに回答したが、間違った回答だったことがわかりクレームに発展してしまった。自分は親切心でやったことなのにクレームを言うなんておかしいと思った。", "l": 0}, {"t": "h2", "x": "8-4. 他者評価を受け入れる"}, {"t": "p", "x": "自分から見た自身の評価（自己評価）は、自己肯定感を維持するためには大事かもしれませんが、どうしても高くなりがちです。しかし、仕事における自分の価値や貢献度は、自分で決めるものではなく「他者（上長や周囲）」が決めるものです。 自己評価がどれだけ高くても、他者からの評価が高くなければ、組織に貢献できているとは言えません。「他者評価こそが現在の自分の本当の評価である」と素直に受け入れましょう。"}, {"t": "p", "x": "他者評価を上げるためにどうすればよいかを考え、努力することでのみ、自身の成長につながります。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "自分ではよくできたと思っていた業務に対し、上長から改善の指摘を受けた。「相手にはそう見えているのだな」と他者評価を素直に受け入れ、次は指摘された部分を改善して提出した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "自分は誰よりもがんばって拠点に貢献しているのに、正当に評価されていない。「周りが自分の実力をわかっていないだけだ」と思い、自分の行動を変えようとしない。", "l": 0}], "subsections": ["8-1. 指示に対して「まずはやってみる」精神", "8-2. 日ごろから勉強すること", "8-3. 他者評価を上げるために努力しましょう", "8-4. 他者評価を受け入れる"], "text": "8-1. 指示に対して「まずはやってみる」精神 うまくいくかわからなくても、まずは指示があったらやってみましょう。上長はできると思って指示をしています。はじめから拒否していたら、成長は得られないので、まずはやってみましょう。 よくあるOK事例 メンバーが足りないのに追加業務の指示があり、無理だと思ったが、効率を意識してやってみたらできた。 業務指示があり、やってみたが膨大な業務量だったのですべてを完了させられなかった。今回終えられなかった理由と課題を上長と一緒に検討し改善したところ、次回、同じ業務量の業務を完了させることができた。 よくあるNG事例 PCでのデータ集計作業の指示を受けたが、PC操作に苦手意識を持っており、やる前から「できないから他の作業に変えて欲しい」と上長へ伝えた。 業務の指示を受けたができるか分からないため、他スタッフへ移管されるように、うまい理由探しに時間を費やした。 8-2. 日ごろから勉強すること 私たちはお客様に貢献するためにこの仕事をしています。新たな知識があれば、貢献できることも増えるものです。より多くの方々に貢献できるように個人個人が日ごろから勉強し、自分自身を磨き続けることが必要です。 それが会社のためにもなるし、個人のためにもなるでしょう。 よくあるOK事例 よりよい支援をするためには自分にはまだ知識が足りないと思う。資格取得した先輩の話を聞き、自分も挑戦してみるつもりだ。 よくあるNG事例 上長から振られた仕事のみをこなせれば良いため、自身から積極的に支援の周辺知識を拾いにいくことはしていない。 介護福祉士の勉強をすればさらに知識がつきいいことはわかっているけど、勉強する時間をとることがばかばかしい。今のままで十分対応できているから問題ない。 8-3. 他者評価を上げるために努力しましょう 自分から見た自分の評価が自己評価、他者から見た自分の評価が他者評価です。 エフィラグループのメンバーは社会への貢献や自分の所属する組織への貢献を求められているので、他者からの評価を上げていかなければいけません。たとえ自己評価が高く、貢献できていると思ってしまったとしても、他者からの評価が高くなければ、貢献できていないものと考えるようにしましょう。（自分を認めること自体はダメではありません）） 仕事における価値（役割価値）は他者が決めるものであり、自分では決められません。自己評価は他者からの評価より高くなってしまうものです。求められている役割をどれだけ果たせているかという他者評価を受け入れ、その評価が自己評価より低かったとしても、他者評価を高めるために努力しましょう。その行動が、自身の成長につながります。 注意すべき点としては、仕事上で自分の他者評価が低かったとしても、それはその時に仕事における役割を果たせたかどうかの評価にすぎません。人柄が否定されたような気持ちになったり尊厳が傷つく気持ちになることがあるかもしれませんが、あなたの『人間』としての評価ではないので、混同しないようにしましょう。 よくあるOK事例 上長から任せられた仕事について、自分としてはよくできたと思っていたが、上長の求めている品質には達していないというフィードバックをもらった。指摘をもらった点を受け止めて修正した上で、再度上長へ提出した。 良かれと思ってパートナーの問い合わせに回答したが、間違った回答だったことがわかりクレームに発展してしまった。事前に情報共有と確認をしていれば防げたことだったと反省した。 よくあるNG事例 上長から任せられた仕事について、上長から改善するよう指摘があった。自分としてはよくできたと思っていたので、指摘は受け入れない。 良かれと思ってパートナーの問い合わせに回答したが、間違った回答だったことがわかりクレームに発展してしまった。自分は親切心でやったことなのにクレームを言うなんておかしいと思った。 8-4. 他者評価を受け入れる 自分から見た自身の評価（自己評価）は、自己肯定感を維持するためには大事かもしれませんが、どうしても高くなりがちです。しかし、仕事における自分の価値や貢献度は、自分で決めるものではなく「他者（上長や周囲）」が決めるものです。 自己評価がどれだけ高くても、他者からの評価が高くなければ、組織に貢献できているとは言えません。「他者評価こそが現在の自分の本当の評価である」と素直に受け入れましょう。 他者評価を上げるためにどうすればよいかを考え、努力することでのみ、自身の成長につながります。 よくあるOK事例 自分ではよくできたと思っていた業務に対し、上長から改善の指摘を受けた。「相手にはそう見えているのだな」と他者評価を素直に受け入れ、次は指摘された部分を改善して提出した。 よくあるNG事例 自分は誰よりもがんばって拠点に貢献しているのに、正当に評価されていない。「周りが自分の実力をわかっていないだけだ」と思い、自分の行動を変えようとしない。"}, {"title": "9. 外部との関係", "blocks": [{"t": "h2", "x": "9-1. 外部（ご家族や関係機関）に見られていることを意識した行動をしましょう"}, {"t": "p", "x": "一人ひとりの態度・言動・行動が、会社全体の評判やイメージを作っています。"}, {"t": "p", "x": "いつでもグループの一員として見られていることを意識した行動をしましょう。"}, {"t": "p", "x": "一人ひとりが企業の顔であることを忘れてはいけません。"}, {"t": "p", "x": "ご家族やケアマネジャー、相談支援員など、外部の方に見られて「不快になる」「不適切だ」と思われるような態度・言動・行動は、例え見られていなくても、決してしてはいけません。 常に「今この瞬間を外部の方に見られても胸を張れるか」という基準で行動しましょう。"}, {"t": "p", "x": "もし、日々の対応の中で「これは外部に見せられる対応なのか」と判断に迷うような事象があれば、拠点長に判断を仰ぎましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "事業所の入っているテナントの入口にゴミが落ちていたので、事業所の印象を考えてゴミを拾った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "「今はご家族もケアマネジャーも見ていないから大丈夫だろう」と、パートナーに対してタメ口を使ったり、手順を省略した自己流の対応をしている。", "l": 0}, {"t": "h2", "x": "9-2. 一人ひとりが企業の顔として取引先・求職者と接する"}, {"t": "p", "x": "工事業者や配達業者などの取引先、または当社に応募してきた求職者などに対しては、自分たちの方が上だと奢ることなく、丁寧にかつ笑顔で接しましょう。"}, {"t": "p", "x": "一人ひとりの対応で、会社の評判やイメージが形成されます。"}, {"t": "p", "x": "誰にでも敬意を払い、丁寧に接することで尊敬される企業グループになれるものです。"}, {"t": "p", "x": "一人ひとりが企業の顔であることを忘れてはいけません。"}, {"t": "p", "x": "※自身の本来の役割を放棄してまで、どこまでもやる必要があるということではありません。笑顔や声かけなどの対応を自身の仕事に影響しない範囲で意識するということです。判断に迷う場合は上長に確認しましょう。また、こちらの項目がルールに優先されることもありません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "事業所の入っているテナントの管理人さんがエントランスの掃除をしてくれているのを見かけたので「おはようございます。いつもありがとうございます。」と声をかけた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "忙しい時間に配達業者が来たため、適当に対応した。", "l": 0}, {"t": "h2", "x": "9-3. 誰もが「パートナー」にも「求職者」にもなると思って接する"}, {"t": "p", "x": "私たちは、地域のリーディングカンパニーとして多くの人と関わっています。そのため、今目の前にいる人が、将来どのような関係になるかはわかりません。 パートナーのご家族が、将来私たちのメンバー（求職者・同僚）として加わるかもしれません。また、求職者や業者のような取引先の方が、将来パートナー（顧客）になることも大いにあり得ます。 つまり、あらゆる人との関わりが「接客」であるという認識を持ちましょう。相手の立場や関係性によって態度を変えることなく、誰に対しても常に「感じよく」接することが求められます。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "面接に来た求職者や、出入りの業者の方に対して、単なる外部の人としてではなく、「未来のパートナー（顧客）になるかもしれない」という意識を持ち、笑顔で丁寧にお迎えした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "パートナーやご家族の前では愛想よくしているが、求人応募者からの電話や、荷物を届けに来た配達員に対しては、ぶっきらぼうで冷たい対応をしてしまった。", "l": 0}, {"t": "h2", "x": "9-4. 外部業者や求職者に挨拶や声かけを積極的に行う"}, {"t": "p", "x": "業者や求職者が事業所に来ているときは、挨拶や声かけを怠ってはいけません。暖かく迎え入れる姿勢を持ちましょう。"}, {"t": "p", "x": "取引先も未来の顧客になる可能性もあります。評判というものは一人一人の言動によって作られるものだということを理解して行動しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "拠点での面接に来た方が道に迷い電話連絡をくれたので、わかりやすい場所まで迎えに行き歓迎の気持ちを伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "体験の方が入口に立っていたが、自分には関係ないと思い声をかけることもなく素通りした。", "l": 0}, {"t": "h2", "x": "9-5. 品のない発言や言葉遣いをしない"}, {"t": "p", "x": "品のない発言や言葉遣いをすると、組織の品格も落ちてしまいます。一人一人が組織の顔であることを理解し、品位を下げるような表現をしないようにしましょう。"}, {"t": "p", "x": "同じことを伝えたくても言葉の選択を改め、各人が今よりも一段高いレベルの言葉遣いを目指しましょう。"}, {"t": "p", "x": "品のない表現の一例："}, {"t": "p", "x": "・（同僚を指して）あの人は使えない →「使える」という表現が不適切"}, {"t": "p", "x": "・あの保護者はうざい。 →「うざい」が不適切"}, {"t": "p", "x": "・あのパートナーはもう切った方がいい。 →「切る」が不適切"}, {"t": "p", "x": "・あいつ →彼にすべき"}, {"t": "h2", "x": "9-6. 関わるすべての人を「エフィラのファン」にするつもりで接する"}, {"t": "p", "x": "パートナーやそのご家族はもちろん、取引先、行政、求職者、さらには退職された方に至るまで、エフィラに関わるすべての人を「エフィラのファン」にする意識を持って接しましょう"}, {"t": "p", "x": "。私たちは地域のリーディングカンパニーとして、誰に対しても常に「感じよく」接することが求められます。"}, {"t": "p", "x": "ただし、「ファンになってもらう」とは、相手の機嫌を取るためにルールを曲げることではありません。一人ひとりの個人的な事情に過度に寄り添い、ルールの例外を認めてしまうことは、組織の公平性を欠き、結果として真面目にミッションに向かう仲間に負担を強いることになります。"}, {"t": "p", "x": "たとえ相手の希望に沿えない「お断り」が必要な場面であっても、相手への敬意を忘れず、誠実な「伝え方」や「対応」を工夫することで、エフィラという組織の品格を感じてもらうことは可能です"}, {"t": "p", "x": "。全メンバーが「会社の顔」であるという自覚を持ち、誠実さと品位をもって地域社会に貢献しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "パートナーからルールの例外（特例）を求められた際、安易に受け入れるのではなく、「公平なサービス維持のため」という理由を誠実に説明し、納得はいただけなくとも、代替案を提示するなど毅然かつ丁寧な対応を貫いた。", "l": 0}, {"t": "b", "x": "拠点の近くですれ違った地域の方や、出入りの業者の方、面接に来られた求職者の方に対し、いつでも「未来のパートナー」になるかもしれないという意識を持ち、笑顔で自分から挨拶をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "「ファンになってもらいたい」「嫌われたくない」という一心で、上長の許可なくルールの例外を認めてしまい、他のパートナーとの公平性を崩してしまった。", "l": 0}, {"t": "b", "x": "退職したメンバーや、現在は利用契約のない方に対して、「もう自社には関係のない人だから」と、ぶっきらぼうで冷たい対応をしてしまった。", "l": 0}], "subsections": ["9-1. 外部（ご家族や関係機関）に見られていることを意識した行動をしましょう", "9-2. 一人ひとりが企業の顔として取引先・求職者と接する", "9-3. 誰もが「パートナー」にも「求職者」にもなると思って接する", "9-4. 外部業者や求職者に挨拶や声かけを積極的に行う", "9-5. 品のない発言や言葉遣いをしない", "9-6. 関わるすべての人を「エフィラのファン」にするつもりで接する"], "text": "9-1. 外部（ご家族や関係機関）に見られていることを意識した行動をしましょう 一人ひとりの態度・言動・行動が、会社全体の評判やイメージを作っています。 いつでもグループの一員として見られていることを意識した行動をしましょう。 一人ひとりが企業の顔であることを忘れてはいけません。 ご家族やケアマネジャー、相談支援員など、外部の方に見られて「不快になる」「不適切だ」と思われるような態度・言動・行動は、例え見られていなくても、決してしてはいけません。 常に「今この瞬間を外部の方に見られても胸を張れるか」という基準で行動しましょう。 もし、日々の対応の中で「これは外部に見せられる対応なのか」と判断に迷うような事象があれば、拠点長に判断を仰ぎましょう。 よくあるOK事例 事業所の入っているテナントの入口にゴミが落ちていたので、事業所の印象を考えてゴミを拾った。 よくあるNG事例 「今はご家族もケアマネジャーも見ていないから大丈夫だろう」と、パートナーに対してタメ口を使ったり、手順を省略した自己流の対応をしている。 9-2. 一人ひとりが企業の顔として取引先・求職者と接する 工事業者や配達業者などの取引先、または当社に応募してきた求職者などに対しては、自分たちの方が上だと奢ることなく、丁寧にかつ笑顔で接しましょう。 一人ひとりの対応で、会社の評判やイメージが形成されます。 誰にでも敬意を払い、丁寧に接することで尊敬される企業グループになれるものです。 一人ひとりが企業の顔であることを忘れてはいけません。 ※自身の本来の役割を放棄してまで、どこまでもやる必要があるということではありません。笑顔や声かけなどの対応を自身の仕事に影響しない範囲で意識するということです。判断に迷う場合は上長に確認しましょう。また、こちらの項目がルールに優先されることもありません。 よくあるOK事例 事業所の入っているテナントの管理人さんがエントランスの掃除をしてくれているのを見かけたので「おはようございます。いつもありがとうございます。」と声をかけた。 よくあるNG事例 忙しい時間に配達業者が来たため、適当に対応した。 9-3. 誰もが「パートナー」にも「求職者」にもなると思って接する 私たちは、地域のリーディングカンパニーとして多くの人と関わっています。そのため、今目の前にいる人が、将来どのような関係になるかはわかりません。 パートナーのご家族が、将来私たちのメンバー（求職者・同僚）として加わるかもしれません。また、求職者や業者のような取引先の方が、将来パートナー（顧客）になることも大いにあり得ます。 つまり、あらゆる人との関わりが「接客」であるという認識を持ちましょう。相手の立場や関係性によって態度を変えることなく、誰に対しても常に「感じよく」接することが求められます。 よくあるOK事例 面接に来た求職者や、出入りの業者の方に対して、単なる外部の人としてではなく、「未来のパートナー（顧客）になるかもしれない」という意識を持ち、笑顔で丁寧にお迎えした。 よくあるNG事例 パートナーやご家族の前では愛想よくしているが、求人応募者からの電話や、荷物を届けに来た配達員に対しては、ぶっきらぼうで冷たい対応をしてしまった。 9-4. 外部業者や求職者に挨拶や声かけを積極的に行う 業者や求職者が事業所に来ているときは、挨拶や声かけを怠ってはいけません。暖かく迎え入れる姿勢を持ちましょう。 取引先も未来の顧客になる可能性もあります。評判というものは一人一人の言動によって作られるものだということを理解して行動しましょう。 よくあるOK事例 拠点での面接に来た方が道に迷い電話連絡をくれたので、わかりやすい場所まで迎えに行き歓迎の気持ちを伝えた。 よくあるNG事例 体験の方が入口に立っていたが、自分には関係ないと思い声をかけることもなく素通りした。 9-5. 品のない発言や言葉遣いをしない 品のない発言や言葉遣いをすると、組織の品格も落ちてしまいます。一人一人が組織の顔であることを理解し、品位を下げるような表現をしないようにしましょう。 同じことを伝えたくても言葉の選択を改め、各人が今よりも一段高いレベルの言葉遣いを目指しましょう。 品のない表現の一例： ・（同僚を指して）あの人は使えない →「使える」という表現が不適切 ・あの保護者はうざい。 →「うざい」が不適切 ・あのパートナーはもう切った方がいい。 →「切る」が不適切 ・あいつ →彼にすべき 9-6. 関わるすべての人を「エフィラのファン」にするつもりで接する パートナーやそのご家族はもちろん、取引先、行政、求職者、さらには退職された方に至るまで、エフィラに関わるすべての人を「エフィラのファン」にする意識を持って接しましょう 。私たちは地域のリーディングカンパニーとして、誰に対しても常に「感じよく」接することが求められます。 ただし、「ファンになってもらう」とは、相手の機嫌を取るためにルールを曲げることではありません。一人ひとりの個人的な事情に過度に寄り添い、ルールの例外を認めてしまうことは、組織の公平性を欠き、結果として真面目にミッションに向かう仲間に負担を強いることになります。 たとえ相手の希望に沿えない「お断り」が必要な場面であっても、相手への敬意を忘れず、誠実な「伝え方」や「対応」を工夫することで、エフィラという組織の品格を感じてもらうことは可能です 。全メンバーが「会社の顔」であるという自覚を持ち、誠実さと品位をもって地域社会に貢献しましょう。 よくあるOK事例 パートナーからルールの例外（特例）を求められた際、安易に受け入れるのではなく、「公平なサービス維持のため」という理由を誠実に説明し、納得はいただけなくとも、代替案を提示するなど毅然かつ丁寧な対応を貫いた。 拠点の近くですれ違った地域の方や、出入りの業者の方、面接に来られた求職者の方に対し、いつでも「未来のパートナー」になるかもしれないという意識を持ち、笑顔で自分から挨拶をした。 よくあるNG事例 「ファンになってもらいたい」「嫌われたくない」という一心で、上長の許可なくルールの例外を認めてしまい、他のパートナーとの公平性を崩してしまった。 退職したメンバーや、現在は利用契約のない方に対して、「もう自社には関係のない人だから」と、ぶっきらぼうで冷たい対応をしてしまった。"}];

// ========== Build Glossary Dictionary from last section (blocks) ==========
var GLOSSARY_TERMS = (function() {
  var glossarySection = POLICY_DATA[POLICY_DATA.length - 1];
  if (!glossarySection || !glossarySection.blocks) return {};
  var terms = {};
  var currentTerm = null;
  var currentCategory = '';
  var currentDefParts = [];
  var termPattern = /^(\d+)[\.\uff0e]\s*(.+)/;

  function saveCurrent() {
    if (currentTerm) {
      var def = currentDefParts.join(' ').replace(/\u000b/g, ' ').trim();
      if (def.length > 220) def = def.substring(0, 220) + '...';
      terms[currentTerm] = { definition: def, category: currentCategory };
    }
  }

  glossarySection.blocks.forEach(function(b) {
    var t = b.t;
    var x = (b.x || '').replace(/\u000b/g, ' ').trim();
    if (!x) return;

    if (t === 'h2' || t === 'h3') {
      // Category boundary (Ⅰ., Ⅱ., etc.)
      saveCurrent();
      currentTerm = null;
      currentDefParts = [];
      currentCategory = x.replace(/^[\u2160-\u216F][\.\uff0e]\s*/, '');
      return;
    }

    var m = termPattern.exec(x);
    if (m) {
      // New term entry like "1．成長"
      saveCurrent();
      currentTerm = m[2];
      currentDefParts = [];
      return;
    }

    // Definition line (only collect a few)
    if (currentTerm && currentDefParts.length < 4) {
      currentDefParts.push(x);
    }
  });
  saveCurrent();
  return terms;
})();

var GLOSSARY_TERM_NAMES = Object.keys(GLOSSARY_TERMS).sort(function(a, b) {
  return b.length - a.length;
});
var GLOSSARY_SECTION_IDX = -1; GLOSSARY_TERM_NAMES = [];

</script>

<script>
(function() {
  'use strict';

  // ========== DOM Elements ==========
  var $ = function(id) { return document.getElementById(id); };
  var navList = $('navList');
  var searchInput = $('searchInput');
  var searchResultsCount = $('searchResultsCount');
  var mainContent = $('mainContent');
  var welcome = $('welcome');
  var contentCard = $('contentCard');
  var contentSectionNum = $('contentSectionNum');
  var contentTitle = $('contentTitle');
  var contentSubNav = $('contentSubNav');
  var contentBody = $('contentBody');
  var allSectionsContainer = $('allSectionsContainer');
  var searchResultsPanel = $('searchResultsPanel');
  var searchResultsSummary = $('searchResultsSummary');
  var searchResultsList = $('searchResultsList');
  var scrollTopBtn = $('scrollTop');
  var menuToggle = $('menuToggle');
  var sidebar = $('sidebar');
  var sidebarOverlay = $('sidebarOverlay');
  var searchShortcut = $('searchShortcut');
  var mobileSidebarFab = $('mobileSidebarFab');

  var activeSection = null;
  var searchTimeout = null;

  // ========== Initialize ==========
  function init() {
    if (typeof POLICY_DATA === 'undefined') {
      welcome.querySelector('p').textContent = 'policy-data.js が読み込めませんでした。';
      return;
    }

    // Set last updated
    if (typeof POLICY_LAST_UPDATED !== 'undefined') {
      $('lastUpdated').textContent = POLICY_LAST_UPDATED;
    }

    // Set doc link
    if (typeof POLICY_DOC_URL !== 'undefined') {
      $('docLink').href = POLICY_DOC_URL;
    }

    // Build navigation
    buildNav();

    // Render all sections continuously
    renderAllSections();

    // Events
    searchInput.addEventListener('input', onSearchInput);
    scrollTopBtn.addEventListener('click', function() {
      mainContent.scrollTo({ top: 0, behavior: 'smooth' });
    });
    mainContent.addEventListener('scroll', onMainScroll);
    menuToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', function() {
      closeSidebar();
      closeMobileSidebarOverlay();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', onKeyDown);

    // Mac detection for shortcut display
    if (navigator.platform && navigator.platform.indexOf('Mac') > -1) {
      searchShortcut.textContent = '\u2318K';
    }

    // (mobile-back-btn removed)

    // Mobile sidebar FAB
    if (mobileSidebarFab) {
      mobileSidebarFab.addEventListener('click', openMobileSidebarOverlay);
    }

    // Logo click → go home (mobile: back to sidebar, desktop: scroll to top)
    var logoImg = document.querySelector('.header-logo-img');
    if (logoImg) {
      logoImg.style.cursor = 'pointer';
      logoImg.addEventListener('click', function() {
        if (window.innerWidth <= 900) {
          mobileGoBack();
        } else {
          mainContent.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }

    // Check URL hash for direct section link
    handleHash();
    window.addEventListener('hashchange', handleHash);

    // Glossary tooltip click handler
    document.addEventListener('click', function(e) {
      var termEl = e.target.closest('.glossary-term');
      if (termEl) {
        e.preventDefault();
        e.stopPropagation();
        showGlossaryPopup(termEl);
        return;
      }
      // Close popup on outside click
      var popup = document.querySelector('.glossary-popup');
      var overlay = document.querySelector('.glossary-popup-overlay');
      if (overlay && !e.target.closest('.glossary-popup')) {
        closeGlossaryPopup();
      }
    });
  }

  // ========== Glossary Popup ==========
  function showGlossaryPopup(termEl) {
    closeGlossaryPopup();
    var termName = termEl.getAttribute('data-term');
    var termData = GLOSSARY_TERMS[termName];
    if (!termData) return;

    // Create overlay
    var overlay = document.createElement('div');
    overlay.className = 'glossary-popup-overlay';

    // Create popup
    var popup = document.createElement('div');
    popup.className = 'glossary-popup';

    popup.innerHTML =
      '<div class="glossary-popup-header">' +
        '<span class="glossary-popup-title">' + escapeHtml(termName) + '</span>' +
        '<button class="glossary-popup-close" aria-label="\u9589\u3058\u308b">&times;</button>' +
      '</div>' +
      (termData.category ? '<div style="padding:8px 14px 0"><span class="glossary-popup-category">' + escapeHtml(termData.category) + '</span></div>' : '') +
      '<div class="glossary-popup-body">' + escapeHtml(termData.definition) + '</div>' +
      '<div class="glossary-popup-footer"><a class="glossary-popup-link" data-action="goto-glossary">\u7528\u8a9e\u89e3\u8aac\u3067\u8a73\u3057\u304f\u898b\u308b \u2192</a></div>';

    document.body.appendChild(overlay);
    document.body.appendChild(popup);

    // Position popup near the term element
    var rect = termEl.getBoundingClientRect();
    var popupH = popup.offsetHeight;
    var popupW = popup.offsetWidth;
    var viewW = window.innerWidth;
    var viewH = window.innerHeight;

    var top = rect.bottom + 8;
    var left = rect.left;

    // Adjust if goes below viewport
    if (top + popupH > viewH - 16) {
      top = rect.top - popupH - 8;
    }
    // Adjust if goes off right
    if (left + popupW > viewW - 16) {
      left = viewW - popupW - 16;
    }
    // Adjust if goes off left
    if (left < 16) left = 16;

    // Mobile: center horizontally
    if (viewW <= 900) {
      left = (viewW - popupW) / 2;
      if (left < 16) left = 16;
    }

    popup.style.top = Math.max(8, top) + 'px';
    popup.style.left = left + 'px';

    // Close button
    popup.querySelector('.glossary-popup-close').addEventListener('click', function(e) {
      e.stopPropagation();
      closeGlossaryPopup();
    });

    // "Go to glossary" link
    popup.querySelector('.glossary-popup-link').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      closeGlossaryPopup();
      showSection(GLOSSARY_SECTION_IDX);
    });
  }

  function closeGlossaryPopup() {
    var existing = document.querySelectorAll('.glossary-popup, .glossary-popup-overlay');
    existing.forEach(function(el) { el.remove(); });
  }

  // ========== Mobile: back to home ==========
  function mobileGoBack() {
    document.body.classList.remove('mobile-content-open');
    document.body.classList.remove('mobile-sidebar-overlay');
    mainContent.scrollTo({ top: 0 });
  }

  // ========== Mobile: open sidebar as overlay ==========
  function openMobileSidebarOverlay() {
    document.body.classList.add('mobile-sidebar-overlay');
  }

  function closeMobileSidebarOverlay() {
    document.body.classList.remove('mobile-sidebar-overlay');
  }

  // ========== Handle URL hash ==========
  var initialLoad = true;
  function handleHash() {
    var hash = window.location.hash;
    if (hash && hash.startsWith('#sec-')) {
      var idx = parseInt(hash.replace('#sec-', ''), 10) - 1;
      if (idx >= 0 && idx < POLICY_DATA.length) {
        if (initialLoad && window.innerWidth <= 900) {
          // Mobile initial load: stay on category list, just scroll to section without sliding
          var target = document.getElementById('section-block-' + idx);
          if (target) {
            activeSection = idx;
            // Update nav active
            document.querySelectorAll('.nav-item').forEach(function(el) {
              var elIdx = parseInt(el.dataset.index, 10);
              el.classList.toggle('active', elIdx === idx);
            });
          }
        } else {
          showSection(idx);
        }
      }
    }
    initialLoad = false;
  }

  // ========== Build Navigation ==========
  function buildNav() {
    navList.innerHTML = '';

    POLICY_DATA.forEach(function(section, idx) {
      var sectionEl = document.createElement('div');
      sectionEl.className = 'nav-section';
      sectionEl.dataset.index = idx;

      var subSections = detectSubSections(section);
      var hasChildren = subSections.length > 0;

      var item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.index = idx;

      var numSpan = document.createElement('span');
      numSpan.className = 'nav-num';
      numSpan.textContent = idx + 1;

      var titleSpan = document.createElement('span');
      titleSpan.className = 'nav-item-title';
      titleSpan.textContent = section.title;

      item.appendChild(numSpan);
      item.appendChild(titleSpan);

      if (hasChildren) {
        var expandSpan = document.createElement('span');
        expandSpan.className = 'expand-icon';
        expandSpan.innerHTML = '&#9654;';
        item.appendChild(expandSpan);
      }

      item.addEventListener('click', function(e) {
        onNavClick(idx);
      });
      sectionEl.appendChild(item);

      if (hasChildren) {
        var subNav = document.createElement('div');
        subNav.className = 'sub-nav';
        subNav.dataset.index = idx;

        subSections.forEach(function(sub) {
          var subItem = document.createElement('div');
          subItem.className = 'sub-nav-item';
          subItem.textContent = sub.title;
          subItem.addEventListener('click', function(e) {
            e.stopPropagation();
            onSubNavClick(idx, sub.title);
          });
          subNav.appendChild(subItem);
        });

        sectionEl.appendChild(subNav);
      }

      navList.appendChild(sectionEl);
    });
  }

  // ========== Detect Sub-sections ==========
  function detectSubSections(section) {
    var subs = [];

    // From predefined subsections array
    if (section.subsections && section.subsections.length) {
      section.subsections.forEach(function(s) {
        subs.push({ title: s });
      });
    }

    // From content patterns
    if (section.content) {
      var lines = section.content.split('\n');
      var patterns = [
        /^[\u2160-\u216F][\uff0e\.]\s*(.+)/,       // Roman numerals
        /^[IVX]+[\.\uff0e]\s*(.+)/,                 // Latin roman numerals
        // Circled numbers excluded from sidebar navigation
      ];

      lines.forEach(function(line) {
        var trimmed = line.trim();
        for (var i = 0; i < patterns.length; i++) {
          if (patterns[i].test(trimmed)) {
            var title = trimmed.length > 50 ? trimmed.substring(0, 50) + '...' : trimmed;
            // Extract numeral prefix (e.g. "Ⅰ" or "XIII") for dedup
            var prefixMatch = trimmed.match(/^([\u2160-\u216F]|[IVX]+)[\uff0e\.]/);
            var prefix = prefixMatch ? prefixMatch[1] : trimmed.charAt(0);
            var dupIdx = -1;
            for (var j = 0; j < subs.length; j++) {
              var subPrefixMatch = subs[j].title.match(/^([\u2160-\u216F]|[IVX]+)[\uff0e\.]/);
              var subPrefix = subPrefixMatch ? subPrefixMatch[1] : subs[j].title.charAt(0);
              if (subPrefix === prefix) { dupIdx = j; break; }
            }
            if (dupIdx >= 0) {
              subs[dupIdx].title = title;
            } else {
              subs.push({ title: title });
            }
            break;
          }
        }
      });
    }

    return subs;
  }

  // ========== Navigation Click ==========
  function onNavClick(idx) {
    // Toggle accordion
    var navItems = document.querySelectorAll('.nav-item');
    var clickedItem = navItems[idx];
    var sectionEl = clickedItem.parentElement;
    var subNav = sectionEl.querySelector('.sub-nav');

    if (subNav) {
      var wasOpen = subNav.classList.contains('open');
      // Close all
      document.querySelectorAll('.sub-nav.open').forEach(function(el) {
        el.classList.remove('open');
        el.parentElement.querySelector('.nav-item').classList.remove('expanded');
      });
      if (!wasOpen) {
        subNav.classList.add('open');
        clickedItem.classList.add('expanded');
      }
    }

    // If searching, re-render content with highlights and scroll to first match
    var activeQuery = searchInput.value.trim();
    if (activeQuery) {
      var block = document.getElementById('section-block-' + idx);
      if (block) {
        var bodyEl = block.querySelector('.content-body');
        if (bodyEl) {
          bodyEl.innerHTML = formatContent(POLICY_DATA[idx].blocks, activeQuery, idx);
        }
      }
      showSection(idx, false, function() {
        scrollToFirstHighlight(idx);
      });
    } else {
      showSection(idx);
    }
    closeSidebar();
  }

  function onSubNavClick(idx, subTitle) {
    var isMobile = window.innerWidth <= 900;
    showSection(idx, true); // skip scroll — we handle it here
    closeSidebar();

    if (isMobile) {
      // Mobile: ensure slide-in transition happens
      document.body.classList.add('mobile-content-open');
      document.body.classList.remove('mobile-sidebar-overlay');
    }

    // Scroll to sub-section after mobile slide-in (350ms) or immediately on desktop
    var delay = isMobile ? 400 : 100;
    setTimeout(function() {
      var scroller = document.querySelector('main.main');
      var searchContainer = allSectionsContainer.style.display !== 'none' ? allSectionsContainer : contentBody;
      var sectionBlock = document.getElementById('section-block-' + idx);
      var searchScope = sectionBlock || searchContainer;
      var elements = searchScope.querySelectorAll('.policy-heading-1, .policy-heading-2, .policy-heading-3, .policy-line');
      for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.textContent.indexOf(subTitle) >= 0 || subTitle.indexOf(el.textContent.trim()) >= 0) {
          isScrollingToSection = true;
          var r = el.getBoundingClientRect();
          var cr = scroller.getBoundingClientRect();
          scroller.scrollTop = scroller.scrollTop + r.top - cr.top - 20;
          setTimeout(function() { isScrollingToSection = false; }, 800);
          el.style.transition = 'background 0.3s';
          el.style.background = '#ffeaa7';
          (function(target) {
            setTimeout(function() { target.style.background = 'transparent'; }, 2000);
          })(el);
          break;
        }
      }
    }, delay);
  }

  // ========== Render All Sections (continuous scroll) ==========
  function renderAllSections() {
    allSectionsContainer.innerHTML = '';
    welcome.style.display = 'none';
    allSectionsContainer.style.display = '';

    POLICY_DATA.forEach(function(section, idx) {
      var block = document.createElement('div');
      block.className = 'section-block';
      block.id = 'section-block-' + idx;

      // Header
      var header = document.createElement('div');
      header.className = 'content-header';

      var numEl = document.createElement('div');
      numEl.className = 'content-section-num';
      numEl.textContent = 'SECTION ' + (idx + 1);

      var titleEl = document.createElement('h1');
      titleEl.className = 'content-title';
      titleEl.textContent = section.title;

      // Sub-navigation chips
      var subNav = document.createElement('div');
      subNav.className = 'content-sub-nav';
      var subSections = detectSubSections(section);
      subSections.forEach(function(sub) {
        var chip = document.createElement('span');
        chip.className = 'content-sub-nav-item';
        chip.textContent = sub.title;
        chip.addEventListener('click', function() {
          var targets = body.querySelectorAll('.policy-heading-1, .policy-heading-2, .policy-heading-3, .policy-line');
          for (var i = 0; i < targets.length; i++) {
            if (targets[i].textContent.indexOf(sub.title) >= 0) {
              var r = targets[i].getBoundingClientRect();
              var cr = mainContent.getBoundingClientRect();
              mainContent.scrollTop = mainContent.scrollTop + r.top - cr.top - 20;
              targets[i].style.transition = 'background 0.3s';
              targets[i].style.background = '#ffeaa7';
              (function(t) {
                setTimeout(function() { t.style.background = 'transparent'; }, 2000);
              })(targets[i]);
              break;
            }
          }
        });
        subNav.appendChild(chip);
      });

      header.appendChild(numEl);
      header.appendChild(titleEl);
      if (subSections.length > 0) header.appendChild(subNav);

      // Body
      var body = document.createElement('div');
      body.className = 'content-body';
      body.innerHTML = formatContent(section.blocks, null, idx);

      block.appendChild(header);
      block.appendChild(body);
      allSectionsContainer.appendChild(block);
    });

    // Set first section active
    updateActiveFromScroll();
  }

  // ========== Show Section (scroll to) ==========
  var isScrollingToSection = false;
  function showSection(idx, skipScroll, onScrollDone) {
    var section = POLICY_DATA[idx];
    if (!section) return;

    activeSection = idx;

    // Update nav active state
    document.querySelectorAll('.nav-item').forEach(function(el) {
      var elIdx = parseInt(el.dataset.index, 10);
      if (elIdx === idx) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });

    // Hide search results, show all sections
    searchResultsPanel.classList.remove('visible');
    contentCard.classList.remove('visible');
    allSectionsContainer.style.display = '';

    // Update hash without triggering hashchange loop
    history.replaceState(null, '', '#sec-' + (idx + 1));

    // Skip scroll when called from onSubNavClick (it handles its own scroll)
    if (skipScroll) return;

    // Scroll to the section block
    var target = document.getElementById('section-block-' + idx);
    var isMobile = window.innerWidth <= 900;

    if (isMobile) {
      // Mobile: slide in first, then scroll after transition completes
      document.body.classList.add('mobile-content-open');
      document.body.classList.remove('mobile-sidebar-overlay');
      if (target) {
        setTimeout(function() {
          isScrollingToSection = true;
          var r = target.getBoundingClientRect();
          var cr = mainContent.getBoundingClientRect();
          mainContent.scrollTo({ top: mainContent.scrollTop + r.top - cr.top - 10, behavior: 'smooth' });
          setTimeout(function() {
            isScrollingToSection = false;
            if (onScrollDone) onScrollDone();
          }, 800);
        }, 350); // wait for slide transition (300ms) + buffer
      }
    } else {
      // Desktop: scroll immediately
      if (target) {
        isScrollingToSection = true;
        var r = target.getBoundingClientRect();
        var cr = mainContent.getBoundingClientRect();
        mainContent.scrollTo({ top: mainContent.scrollTop + r.top - cr.top - 10, behavior: 'smooth' });
        setTimeout(function() {
          isScrollingToSection = false;
          if (onScrollDone) onScrollDone();
        }, 800);
      }
    }
  }

  // ========== Update active nav from scroll position ==========
  function updateActiveFromScroll() {
    if (isScrollingToSection) return;
    var blocks = allSectionsContainer.querySelectorAll('.section-block');
    var scrollTop = mainContent.scrollTop;
    var offset = mainContent.getBoundingClientRect().top + 80;
    var newActive = 0;

    for (var i = 0; i < blocks.length; i++) {
      var rect = blocks[i].getBoundingClientRect();
      if (rect.top <= offset) {
        newActive = i;
      }
    }

    if (activeSection !== newActive) {
      activeSection = newActive;
      document.querySelectorAll('.nav-item').forEach(function(el) {
        var elIdx = parseInt(el.dataset.index, 10);
        if (elIdx === newActive) {
          el.classList.add('active');
          // Scroll nav item into view if needed
          var navListEl = document.getElementById('navList');
          var elRect = el.getBoundingClientRect();
          var navRect = navListEl.getBoundingClientRect();
          if (elRect.top < navRect.top || elRect.bottom > navRect.bottom) {
            el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
        } else {
          el.classList.remove('active');
        }
      });
      history.replaceState(null, '', '#sec-' + (newActive + 1));
    }
  }

  // ========== Format Content ==========
  function formatContent(blocksOrText, highlightTerm, sectionIdx) {
    // backward-compat: if string passed, render placeholder
    if (typeof blocksOrText === 'string') {
      return '<div class="placeholder-msg"><p>' + escapeHtml(blocksOrText) + '</p></div>';
    }
    var blocks = blocksOrText;
    if (!blocks || !blocks.length) {
      return '<div class="placeholder-msg"><p>コンテンツがありません</p></div>';
    }

    function inline(text) {
      if (!text) return '';
      var s = escapeHtml(text);
      // Soft line breaks (Google Docs Shift+Enter = vertical tab) → <br>
      s = s.replace(/\u000b\s*/g, '<br>');
      if (highlightTerm) {
        var regex = new RegExp('(' + escapeRegex(highlightTerm) + ')', 'gi');
        s = s.replace(regex, '<span class="search-highlight">$1</span>');
      }
      return s;
    }

    var html = '';
    blocks.forEach(function(b) {
      switch (b.t) {
        case 'sp':
          html += '<div class="policy-spacer"></div>';
          break;
        case 'h1':
          html += '<div class="policy-h1 policy-line">' + inline(b.x) + '</div>';
          break;
        case 'h2':
          html += '<div class="policy-h2 policy-line">' + inline(b.x) + '</div>';
          break;
        case 'h3':
          html += '<div class="policy-h3 policy-line">' + inline(b.x) + '</div>';
          break;
        case 'kt':
          html += '<div class="policy-kt policy-line">' + inline(b.x) + '</div>';
          break;
        case 'b':
          var lvl = Math.min(b.l || 0, 3);
          html += '<div class="policy-bullet policy-bullet-l' + lvl + ' policy-line">' + inline(b.x) + '</div>';
          break;
        case 'img':
          if (b.src) {
            var w = b.w ? Math.round(b.w * 1.33) : 0;  // PT to px (approx)
            var h = b.h ? Math.round(b.h * 1.33) : 0;
            html += '<div class="policy-img-wrap">' +
                    '<img class="policy-img" src="' + b.src + '"' +
                    (w ? ' width="' + w + '"' : '') +
                    (h ? ' height="' + h + '"' : '') +
                    ' alt="原本Docs図表" loading="lazy" />' +
                    '</div>';
          }
          break;
        case 'tbl':
          html += '<div class="policy-table-wrap"><table class="policy-table"><tbody>';
          (b.rows || []).forEach(function(row) {
            html += '<tr>';
            row.forEach(function(cell) {
              // Cell may contain newlines (\n or \u000b) — convert to <br>
              var cellHtml = escapeHtml(cell || '').replace(/[\n\u000b]\s*/g, '<br>');
              if (highlightTerm) {
                var rgx = new RegExp('(' + escapeRegex(highlightTerm) + ')', 'gi');
                cellHtml = cellHtml.replace(rgx, '<span class="search-highlight">$1</span>');
              }
              html += '<td>' + cellHtml + '</td>';
            });
            html += '</tr>';
          });
          html += '</tbody></table></div>';
          break;
        case 'p':
        default:
          html += '<div class="policy-p policy-line">' + inline(b.x) + '</div>';
          break;
      }
    });

    // Apply glossary term tooltips (skip glossary section itself)
    if (sectionIdx !== GLOSSARY_SECTION_IDX && GLOSSARY_TERM_NAMES.length > 0) {
      html = applyGlossaryTerms(html);
    }
    return html;
  }

  // ========== Apply Glossary Term Tooltips ==========
  function applyGlossaryTerms(html) {
    // Split HTML by tags to only replace in text nodes
    var parts = html.split(/(<[^>]+>)/);
    for (var i = 0; i < parts.length; i++) {
      // Skip HTML tags
      if (parts[i].charAt(0) === '<') continue;
      // Skip empty
      if (!parts[i].trim()) continue;

      var text = parts[i];
      for (var j = 0; j < GLOSSARY_TERM_NAMES.length; j++) {
        var term = GLOSSARY_TERM_NAMES[j];
        if (term.length < 2) continue; // skip very short terms
        var idx = text.indexOf(term);
        if (idx >= 0) {
          // Only replace first occurrence per text node
          text = text.substring(0, idx) +
            '<span class="glossary-term" data-term="' + escapeHtml(term) + '">' + escapeHtml(term) + '</span>' +
            text.substring(idx + term.length);
        }
      }
      parts[i] = text;
    }
    return parts.join('');
  }

  // ========== Search ==========
  function onSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(performSearch, 250);
  }

  function performSearch() {
    var query = searchInput.value.trim();

    if (!query) {
      clearSearch();
      return;
    }

    var queryLower = query.toLowerCase();

    // Filter nav items
    var sections = document.querySelectorAll('.nav-section');
    var matchCount = 0;

    sections.forEach(function(sectionEl, idx) {
      var section = POLICY_DATA[idx];
      var titleMatch = section.title.toLowerCase().indexOf(queryLower) >= 0;
      var contentMatch = section.text && section.text.toLowerCase().indexOf(queryLower) >= 0;
      var subMatch = section.subsections && section.subsections.some(function(s) {
        return s.toLowerCase().indexOf(queryLower) >= 0;
      });

      if (titleMatch || contentMatch || subMatch) {
        sectionEl.classList.remove('search-hidden');
        matchCount++;
      } else {
        sectionEl.classList.add('search-hidden');
      }
    });

    // Show results count
    searchResultsCount.textContent = matchCount + ' 件のセクションが一致';
    searchResultsCount.style.display = 'block';

    // Build search results in main area
    buildSearchResults(query);
  }

  function buildSearchResults(query) {
    var queryLower = query.toLowerCase();
    var results = [];

    POLICY_DATA.forEach(function(section, idx) {
      var content = section.text || '';
      var titleMatch = section.title.toLowerCase().indexOf(queryLower) >= 0;
      var contentIdx = content.toLowerCase().indexOf(queryLower);

      if (titleMatch || contentIdx >= 0) {
        var snippet = '';
        if (contentIdx >= 0) {
          var start = Math.max(0, contentIdx - 60);
          var end = Math.min(content.length, contentIdx + query.length + 60);
          snippet = (start > 0 ? '...' : '') +
            content.substring(start, end) +
            (end < content.length ? '...' : '');
        } else {
          snippet = content.substring(0, 120) + (content.length > 120 ? '...' : '');
        }

        results.push({ idx: idx, title: section.title, snippet: snippet });
      }
    });

    searchResultsSummary.textContent = '"' + query + '" で ' + results.length + ' 件のセクションに一致しました';
    searchResultsList.innerHTML = '';

    if (results.length === 0) {
      searchResultsList.innerHTML = '<div class="search-no-results">' +
        '<p>&#128269;</p>' +
        '<p>"' + escapeHtml(query) + '" に一致する結果はありませんでした</p>' +
        '</div>';
    } else {
      results.forEach(function(r) {
        var item = document.createElement('div');
        item.className = 'search-result-item';

        var highlightedTitle = escapeHtml(r.title);
        var highlightedSnippet = escapeHtml(r.snippet);
        var regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
        highlightedTitle = highlightedTitle.replace(regex, '<span class="search-highlight">$1</span>');
        highlightedSnippet = highlightedSnippet.replace(regex, '<span class="search-highlight">$1</span>');

        item.innerHTML =
          '<div class="search-result-section">SECTION ' + (r.idx + 1) + '</div>' +
          '<div style="font-weight:600; margin-bottom:4px;">' + highlightedTitle + '</div>' +
          '<div class="search-result-snippet">' + highlightedSnippet + '</div>';

        item.addEventListener('click', (function(idx, q) {
          return function() {
            clearSearch();
            // Highlight matching text in the section block
            var block = document.getElementById('section-block-' + idx);
            if (block) {
              var bodyEl = block.querySelector('.content-body');
              if (bodyEl) {
                bodyEl.innerHTML = formatContent(POLICY_DATA[idx].blocks, q, idx);
              }
            }
            // showSection scrolls to section, then callback scrolls to highlight
            showSection(idx, false, function() {
              scrollToFirstHighlight(idx);
            });
          };
        })(r.idx, query));

        searchResultsList.appendChild(item);
      });
    }

    // Show search results, hide all sections
    welcome.style.display = 'none';
    contentCard.classList.remove('visible');
    allSectionsContainer.style.display = 'none';
    searchResultsPanel.classList.remove('visible');
    void searchResultsPanel.offsetWidth;
    searchResultsPanel.classList.add('visible');
  }

  function clearSearch() {
    searchInput.value = '';
    searchResultsCount.style.display = 'none';

    document.querySelectorAll('.nav-section').forEach(function(el) {
      el.classList.remove('search-hidden');
    });

    searchResultsPanel.classList.remove('visible');
    allSectionsContainer.style.display = '';
  }

  // ========== Scroll to First Highlight ==========
  function scrollToFirstHighlight(sectionIdx) {
    var block = document.getElementById('section-block-' + sectionIdx);
    if (!block) return;
    var highlights = block.querySelectorAll('.search-highlight');
    if (highlights.length > 0) {
      var first = highlights[0];
      first.classList.add('search-highlight-focus');
      isScrollingToSection = true;
      var r = first.getBoundingClientRect();
      var cr = mainContent.getBoundingClientRect();
      mainContent.scrollTo({ top: mainContent.scrollTop + r.top - cr.top - (cr.height / 3), behavior: 'smooth' });
      setTimeout(function() {
        isScrollingToSection = false;
        first.classList.remove('search-highlight-focus');
      }, 2000);
    }
  }

  // ========== Keyboard Shortcuts ==========
  function onKeyDown(e) {
    // Ctrl+K or Cmd+K = focus search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
      // Open sidebar on mobile
      if (window.innerWidth <= 900) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      }
    }

    // Escape = clear search or close sidebar
    if (e.key === 'Escape') {
      if (searchInput.value) {
        clearSearch();
      }
      searchInput.blur();
      closeSidebar();
    }
  }

  // ========== Scroll ==========
  function onMainScroll() {
    var show = mainContent.scrollTop > 300;
    scrollTopBtn.classList.toggle('visible', show);
    // Update active nav from scroll position
    updateActiveFromScroll();
  }

  // ========== Mobile sidebar ==========
  function toggleSidebar() {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  // ========== Utilities ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ========== Start ==========
  init();

})();
</script>

<!-- ========== Password Gate Script ========== -->
<script>
(function(){
  var HASH = '8b31c9a45b795ff4e9c029aaa67444f02c3b6310c16298f300efc700ab80760f';
  async function sha256(str){
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
  }
  if(sessionStorage.getItem('efila_auth')==='1'){
    document.getElementById('passwordGate').style.display='none';
    document.getElementById('appContent').style.display='';
  }
  window.checkPw = async function(){
    var input = document.getElementById('pwInput').value;
    var hash = await sha256(input);
    if(hash === HASH){
      sessionStorage.setItem('efila_auth','1');
      document.getElementById('passwordGate').style.display='none';
      document.getElementById('appContent').style.display='';
    } else {
      document.getElementById('pwError').textContent='パスワードが正しくありません';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
    }
  };
  document.getElementById('pwInput').addEventListener('keydown',function(e){
    if(e.key==='Enter') checkPw();
  });
})();
</script>
